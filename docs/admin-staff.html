<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"/><meta content="width=device-width,initial-scale=1" name="viewport"/><title>Staff Roles | Starlight Card Binder</title><link href="css/style.css" rel="stylesheet"/><style>
body{min-height:100vh}.page{width:min(100%,1180px);margin:auto;padding:28px 18px 60px}.panel{padding:28px;border:2px solid rgba(107,198,248,.5);border-radius:24px;background:rgba(255,255,255,.96);box-shadow:0 20px 50px rgba(61,83,132,.16)}h1{color:#405fa1}.toolbar{display:flex;flex-wrap:wrap;gap:12px;margin:20px 0}.toolbar input{flex:1;min-width:230px;padding:12px;border:2px solid rgba(107,198,248,.35);border-radius:12px;font:inherit}.users{display:grid;gap:12px}.user{display:grid;grid-template-columns:minmax(0,1fr) 220px auto;gap:12px;align-items:center;padding:15px;border:1px solid rgba(255,130,200,.3);border-radius:15px;background:#fff}.user strong{color:#405fa1}.user small{display:block;color:#6b7089}.user select,.user button{min-height:43px;padding:9px 12px;border-radius:11px;font:inherit;font-weight:800}.user select{border:2px solid rgba(107,198,248,.35)}.save{border:0;background:linear-gradient(135deg,#6bc6f8,#ff82c8);color:#fff}.remove{border:2px solid rgba(180,35,63,.3);background:#fff;color:#b4233f}.status{font-weight:800;margin:15px 0}.error{color:#b4233f}.success{color:#167048}.hidden{display:none!important}.staff-back-link{display:inline-block;margin-bottom:18px;color:#405fa1;font-weight:900;text-decoration:none}@media(max-width:760px){.user{grid-template-columns:1fr}.user button{width:100%}}
</style></head><body><script src="js/embed-mode.js" type="module"></script><div class="sky"></div><main class="page"><a class="staff-back-link" href="admin-hub.html">← Administration Hub</a><section class="panel"><p class="eyebrow">Owner &amp; Administrator</p><h1>User &amp; Role Management</h1><p>Owners can assign every role. Administrators may assign Moderator and Super Moderator, but cannot modify owners or administrators.</p><p class="status" id="status">Loading users…</p><div class="hidden" id="content"><div class="toolbar"><input id="search" placeholder="Search email, username, or display name…" type="search"/></div><div class="users" id="users"></div></div></section></main><script type="module">
import {getMyStaffAccess,listStaffUsers,setStaffRole,removeStaffRole} from './js/staff-service.js';
const status=document.getElementById('status'),content=document.getElementById('content'),usersEl=document.getElementById('users'),search=document.getElementById('search');let access=null,users=[];
const roleNames={owner:'Owner',admin:'Admin',super_moderator:'Super Moderator',moderator:'Moderator','':'Collector'};
function options(user){const allowed=access.role==='owner'?['','moderator','super_moderator','admin','owner']:['','moderator','super_moderator'];return allowed.map(r=>`<option value="${r}" ${String(user.role||'')===r?'selected':''}>${roleNames[r]}</option>`).join('')}
function render(){const q=search.value.trim().toLowerCase();const list=users.filter(u=>`${u.email||''} ${u.username||''} ${u.displayName||''}`.toLowerCase().includes(q));usersEl.innerHTML=list.map(u=>`<article class="user" data-id="${u.userId}"><div><strong>${u.displayName||u.username||u.email||'Unnamed collector'}</strong><small>${u.email||''}${u.username?` · @${u.username}`:''}</small></div><select aria-label="Role for ${u.email||'user'}">${options(u)}</select><div><button class="save" type="button">Save Role</button>${u.role?'<button class="remove" type="button">Remove</button>':''}</div></article>`).join('');usersEl.querySelectorAll('.user').forEach(row=>{const id=row.dataset.id,select=row.querySelector('select');row.querySelector('.save').addEventListener('click',async()=>{try{if(!select.value){await removeStaffRole(id)}else{await setStaffRole(id,select.value)}status.textContent='Role updated successfully.';status.className='status success';await load()}catch(e){status.textContent=e.message;status.className='status error'}});row.querySelector('.remove')?.addEventListener('click',async()=>{if(!confirm('Remove this user’s staff access?'))return;try{await removeStaffRole(id);status.textContent='Staff access removed.';status.className='status success';await load()}catch(e){status.textContent=e.message;status.className='status error'}})})}
async function load(){access=await getMyStaffAccess();if(!access.canManageRoles)throw new Error('Administrator access is required.');users=await listStaffUsers();content.classList.remove('hidden');render()}
search.addEventListener('input',render);try{await load();status.textContent='Role management ready.'}catch(e){status.textContent=e.message;status.className='status error'}
</script></body></html>
