<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Website Editor | Starlight Card Binder</title>
  <link rel="stylesheet" href="css/style.css?v=1.0.2">
  <link rel="stylesheet" href="css/shared-ui.css?v=1.6.8">
  <link rel="stylesheet" href="css/pages/admin-website.css?v=1.4">
  <link rel="stylesheet" href="css/qol-ui.css?v=94.2.4">
  <script src="js/browser-performance.js?v=1.0.0" defer></script>
</head>
<body>
  <script src="js/embed-mode.js" type="module"></script>
  <div class="sky"></div>
  <main class="page">
    <section class="panel">
      <p class="eyebrow">Administration Hub</p>
      <div class="toolbar">
        <div>
          <h1>Website Editor</h1>
          <p class="lead">Edit marketing copy for every public left-nav page — heroes, splash headlines, portal states, CTAs, tabs, and empty states. Changes publish site-wide after Save.</p>
        </div>
        <div class="actions">
          <button id="resetPageBtn" class="btn" type="button" hidden>Reset This Page</button>
          <button id="saveBtn" class="btn primary" type="button" hidden>Save Changes</button>
          <button id="resetBtn" class="btn danger" type="button" hidden>Reset Everything</button>
        </div>
      </div>
      <p id="status" class="status" role="status">Checking staff access…</p>

      <div id="app" class="hidden" hidden>
        <div class="editor-chrome">
          <label class="field-search">
            <span class="sr-only">Search fields</span>
            <input id="fieldSearch" type="search" placeholder="Search fields on this page…" autocomplete="off">
          </label>
          <div id="pageMeta" class="page-meta"></div>
        </div>
        <div id="tablist" class="tabs" role="tablist" aria-label="Website pages"></div>
        <section id="editorPanel" class="tab-panel" role="tabpanel"></section>
      </div>
    </section>
  </main>

  <script src="js/shared-ui.js?v=1.6.7"></script>
  <script type="module" src="js/pages/admin-website-page.js?v=1.5"></script>
  <script src="js/qol-ui.js?v=94.2.4" defer></script>
</body>
</html>
