<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"/><meta content="width=device-width,initial-scale=1" name="viewport"/><title>Moderation Dashboard | Starlight Card Binder</title><link href="css/style.css" rel="stylesheet"/><style>
body{min-height:100vh}.mod-page{width:min(100%,1180px);margin:auto;padding:28px 18px 60px}.mod-panel{padding:30px;border:2px solid rgba(107,198,248,.5);border-radius:26px;background:rgba(255,255,255,.96);box-shadow:0 20px 55px rgba(61,83,132,.17)}h1,h2{color:#405fa1}.toolbar{display:flex;flex-wrap:wrap;gap:12px;align-items:center;margin:20px 0}.toolbar select,.toolbar button,.report-card button,.report-card textarea{font:inherit}.toolbar select{padding:10px 14px;border:2px solid #c9e8fb;border-radius:12px}.btnx{padding:10px 16px;border:0;border-radius:999px;background:linear-gradient(135deg,#6bc6f8,#ff82c8);color:#fff;font-weight:900;cursor:pointer}.report-list{display:grid;gap:17px}.report-card{padding:20px;border:1px solid rgba(255,130,200,.34);border-radius:18px;background:linear-gradient(145deg,#fff,#f6fbff)}.report-head{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap}.pill{padding:6px 10px;border-radius:999px;background:rgba(107,198,248,.17);font-weight:900}.muted{color:#6b7089}.report-card textarea{width:100%;min-height:75px;margin-top:12px;padding:10px;border:1px solid #c9e8fb;border-radius:12px}.actions{display:flex;flex-wrap:wrap;gap:9px;margin-top:12px}.actions button{padding:9px 13px;border:1px solid #c9e8fb;border-radius:999px;background:#fff;color:#405fa1;font-weight:900;cursor:pointer}.actions .danger{border:0;background:linear-gradient(135deg,#ff9bcf,#ff698f);color:#fff}.actions .restore{border:0;background:linear-gradient(135deg,#7ed9b5,#6bc6f8);color:#fff}.status{font-weight:900;margin:14px 0}.error{color:#b4233f}.empty{padding:35px;text-align:center;color:#6b7089}.staff-back-link{display:inline-block;margin-top:22px;color:#405fa1;font-weight:900;text-decoration:none}
</style><script src="js/firefox-performance.js" defer></script>
    <link rel="stylesheet" href="css/shared-ui.css">
</head><body><script src="js/embed-mode.js" type="module"></script><div class="sky"></div><main class="mod-page"><section class="mod-panel"><p class="eyebrow">Starlight Staff</p><h1>Moderation Dashboard</h1><p>Review collector-profile reports, document decisions, and temporarily hide or lock profiles.</p><p class="status" id="status">Checking moderation access…</p><div class="toolbar"><label>Status <select id="filter"><option value="open">Open</option><option value="reviewing">Reviewing</option><option value="resolved">Resolved</option><option value="dismissed">Dismissed</option><option value="all">All</option></select></label><button class="btnx" id="refresh" type="button">Refresh Queue</button></div><div class="report-list" id="list"></div><a class="staff-back-link" href="admin-hub.html">← Return to Administration Hub</a></section></main><script type="module">
import {getMyStaffAccess} from './js/staff-service.js';
import {listProfileReports,updateProfileReport,setProfileModeration} from './js/moderation-service.js';
const statusEl=document.getElementById('status'),list=document.getElementById('list'),filter=document.getElementById('filter');let access=null;
const esc=v=>String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
function setStatus(message,error=false){statusEl.textContent=message;statusEl.className='status'+(error?' error':'')}
function render(rows){if(!rows.length){list.innerHTML='<div class="empty">No reports match this view.</div>';return}list.innerHTML=rows.map(r=>`<article class="report-card" data-id="${r.id}" data-user="${r.targetUserId}"><div class="report-head"><div><h2>${esc(r.targetDisplayName||r.targetUsername)} <span class="muted">@${esc(r.targetUsername)}</span></h2><p class="muted">Reported by ${esc(r.reporterEmail)} • ${new Date(r.createdAt).toLocaleString()}</p></div><span class="pill">${esc(r.status)} · ${esc(r.category.replaceAll('_',' '))}</span></div><p>${esc(r.details)}</p>${r.profileHidden||r.profileEditLocked?`<p><b>Active moderation:</b> ${r.profileHidden?'Profile hidden. ':''}${r.profileEditLocked?'Editing locked.':''}<br><span class="muted">${esc(r.moderationReason||'')}</span></p>`:''}<textarea placeholder="Staff resolution note">${esc(r.resolutionNote||'')}</textarea><div class="actions"><button data-action="review">Mark Reviewing</button><button data-action="resolve">Resolve</button><button data-action="dismiss">Dismiss</button><button class="danger" data-action="hide">Hide + Lock Profile</button><button class="restore" data-action="restore">Restore Profile</button></div></article>`).join('')}
async function load(){try{setStatus('Loading moderation queue…');const rows=await listProfileReports(filter.value,150);render(rows);setStatus(`${rows.length} report${rows.length===1?'':'s'} loaded.`)}catch(e){setStatus(e.message,true)}}
try{access=await getMyStaffAccess();if(!access.canModerate)throw new Error('Moderator access is required.');setStatus(`Moderation access confirmed: ${String(access.role).replaceAll('_',' ')}`);await load()}catch(e){setStatus(e.message,true);document.querySelector('.toolbar').style.display='none'}
document.getElementById('refresh').addEventListener('click',load);filter.addEventListener('change',load);
list.addEventListener('click',async e=>{const btn=e.target.closest('button[data-action]');if(!btn)return;const card=btn.closest('.report-card'),id=Number(card.dataset.id),userId=card.dataset.user,note=card.querySelector('textarea').value.trim(),action=btn.dataset.action;btn.disabled=true;try{if(action==='review')await updateProfileReport(id,'reviewing',note);if(action==='resolve')await updateProfileReport(id,'resolved',note);if(action==='dismiss')await updateProfileReport(id,'dismissed',note);if(action==='hide'){const reason=note||prompt('Reason for hiding and locking this profile:')||'';if(!reason)return;await setProfileModeration(userId,true,true,reason);await updateProfileReport(id,'resolved',reason)}if(action==='restore'){if(!(await StarlightUI.confirm({title:'Restore this profile?',message:'The profile will become visible and editable again.',confirmText:'Restore Profile'})))return;await setProfileModeration(userId,false,false,note)}await load()}catch(err){setStatus(err.message,true)}finally{btn.disabled=false}});
</script>    <script src="js/shared-ui.js"></script>
</body></html>
