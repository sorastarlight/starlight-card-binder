<!DOCTYPE html>

<html lang="en"><head><meta charset="utf-8"/><meta content="width=device-width,initial-scale=1" name="viewport"/><title>Reward Code Admin | Starlight Card Binder</title><link href="css/style.css" rel="stylesheet"/><style>
body{min-height:100vh}.admin-page{width:min(100%,1100px);margin:auto;padding:28px 18px 60px}.panelx{padding:28px;border:2px solid rgba(107,198,248,.5);border-radius:24px;background:rgba(255,255,255,.96);box-shadow:0 20px 50px rgba(61,83,132,.16);margin-bottom:22px}.panelx h1,.panelx h2{color:#405fa1}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}.full{grid-column:1/-1}label{display:block;font-weight:800;margin-bottom:6px}input,select,textarea{width:100%;min-height:46px;padding:11px 13px;border:2px solid rgba(107,198,248,.35);border-radius:11px;font:inherit}.checks{display:flex;flex-wrap:wrap;gap:10px}.card-pick{max-height:260px;overflow:auto;padding:12px;border:1px solid rgba(107,198,248,.35);border-radius:14px;background:#f8fcff}.card-pick label{display:flex;gap:8px;align-items:center;margin:6px 0}.card-pick input{width:auto;min-height:0}.btnx{min-height:48px;padding:11px 20px;border:0;border-radius:999px;background:linear-gradient(135deg,#6bc6f8,#ff82c8);color:#fff;font-weight:900;cursor:pointer}.code-list{display:grid;gap:12px}.code-row{padding:15px;border:1px solid rgba(255,130,200,.3);border-radius:14px;background:white}.code-row header{display:flex;justify-content:space-between;gap:15px}.status{min-height:26px;margin-top:16px;font-weight:800}.error{color:#b4233f}.success{color:#167048}.hidden{display:none!important}@media(max-width:700px){.grid{grid-template-columns:1fr}.full{grid-column:auto}}
</style><script src="js/firefox-performance.js" defer></script>
    <link rel="stylesheet" href="css/shared-ui.css">
</head><body><script src="js/embed-mode.js" type="module"></script><div class="sky"></div><main class="admin-page"><p><a href="admin-hub.html" style="color:#405fa1;font-weight:900;text-decoration:none">← Administration Hub</a></p><section class="panelx"><p class="eyebrow">Administrator</p><h1>Reward Code Console</h1><p>Create single-card, booster, or Star Bits codes. Full codes are only shown when created, so copy them immediately.</p><p class="status" id="gate-status">Checking administrator access…</p></section>
<section class="hidden" id="admin-content"><section class="panelx"><h2>Create Reward Code</h2><form class="grid" id="create-form"><div><label for="code">Code</label><input id="code" maxlength="40" required=""/><button class="btnx" id="generate" style="margin-top:8px" type="button">Generate Code</button></div><div><label for="label">Internal label</label><input id="label" maxlength="80" required=""/></div><div><label for="reward-type">Reward type</label><select id="reward-type"><option value="single_card">Single Card</option><option value="booster">Booster / Multiple Cards</option><option value="star_bits">Star Bits</option></select></div><div><label for="max-uses">Maximum total uses</label><input id="max-uses" min="1" placeholder="Unlimited" type="number"/></div><div id="single-card-fields"><label for="single-card">Card</label><select id="single-card"></select><label for="card-quantity" style="margin-top:8px">Quantity</label><input id="card-quantity" min="1" type="number" value="1"/></div><div class="hidden" id="star-bits-fields"><label for="star-bits">Star Bits amount</label><input id="star-bits" min="1" type="number" value="100"/></div><div class="full hidden" id="booster-fields"><label>Booster cards</label><div class="card-pick" id="card-pick"></div></div><div><label for="starts-at">Starts at</label><input id="starts-at" type="datetime-local"/></div><div><label for="expires-at">Expires at</label><input id="expires-at" type="datetime-local"/></div><div class="full"><button class="btnx" id="create-button" type="submit">Create Reward Code</button></div></form><p class="status" id="create-status"></p></section>
<section class="panelx"><h2>Existing Codes</h2><div class="code-list" id="code-list"></div></section></section></main>
<script type="module">
import { isSiteAdmin,createRewardCode,listRewardCodes,setRewardCodeActive,loadAdminCardCatalog } from './js/redemption-service.js';
const gate=document.getElementById('gate-status'),content=document.getElementById('admin-content'),type=document.getElementById('reward-type'),single=document.getElementById('single-card-fields'),booster=document.getElementById('booster-fields'),bits=document.getElementById('star-bits-fields'),pick=document.getElementById('card-pick'),singleSelect=document.getElementById('single-card'),list=document.getElementById('code-list'),form=document.getElementById('create-form'),createStatus=document.getElementById('create-status');let catalog=[];
function randomCode(){const alphabet='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';const bytes=crypto.getRandomValues(new Uint8Array(12));return 'STAR-'+Array.from(bytes,b=>alphabet[b%alphabet.length]).join('')}
function toggleFields(){single.classList.toggle('hidden',type.value!=='single_card');booster.classList.toggle('hidden',type.value!=='booster');bits.classList.toggle('hidden',type.value!=='star_bits')}
function renderCatalog(){singleSelect.innerHTML=catalog.map(c=>`<option value="${c.id}">#${c.card_number} ${c.name} — ${c.rarity}</option>`).join('');pick.innerHTML=catalog.map(c=>`<label><input type="checkbox" value="${c.id}">#${c.card_number} ${c.name} — ${c.rarity}</label>`).join('')}
async function refresh(){const rows=await listRewardCodes();list.innerHTML=rows.length?rows.map(r=>`<article class="code-row"><header><strong>${r.label}</strong><span>••••${r.codePreview}</span></header><p>${r.rewardType} · ${r.currentUses}${r.maxUses?` / ${r.maxUses}`:''} uses</p><button class="btnx" data-id="${r.id}" data-active="${!r.active}">${r.active?'Deactivate':'Activate'}</button></article>`).join(''):'<p>No reward codes yet.</p>';list.querySelectorAll('[data-id]').forEach(b=>b.addEventListener('click',async()=>{await setRewardCodeActive(b.dataset.id,b.dataset.active==='true');await refresh()}))}
document.getElementById('generate').addEventListener('click',()=>document.getElementById('code').value=randomCode());type.addEventListener('change',toggleFields);
const admin=await isSiteAdmin();if(!admin.isAdmin){gate.textContent='Administrator access is required.';gate.classList.add('error')}else{gate.textContent='Administrator access confirmed.';gate.classList.add('success');content.classList.remove('hidden');catalog=await loadAdminCardCatalog();renderCatalog();toggleFields();await refresh()}
form.addEventListener('submit',async e=>{e.preventDefault();const selected=[...pick.querySelectorAll('input:checked')].map(x=>x.value);try{const result=await createRewardCode({code:document.getElementById('code').value,label:document.getElementById('label').value,rewardType:type.value,cardId:type.value==='single_card'?singleSelect.value:null,cardQuantity:type.value==='single_card'?Number(document.getElementById('card-quantity').value):null,boosterCardIds:type.value==='booster'?selected:null,starBitsAmount:type.value==='star_bits'?Number(document.getElementById('star-bits').value):null,maxUses:document.getElementById('max-uses').value?Number(document.getElementById('max-uses').value):null,startsAt:document.getElementById('starts-at').value?new Date(document.getElementById('starts-at').value).toISOString():null,expiresAt:document.getElementById('expires-at').value?new Date(document.getElementById('expires-at').value).toISOString():null});createStatus.textContent=`Created: ${result.code} — copy this code now.`;createStatus.className='status success';await refresh()}catch(error){createStatus.textContent=error.message;createStatus.className='status error'}});
</script>    <script src="js/shared-ui.js"></script>
</body></html>
