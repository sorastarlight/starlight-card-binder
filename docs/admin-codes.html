<!DOCTYPE html>

<html lang="en"><head><meta charset="utf-8"/><meta content="width=device-width,initial-scale=1" name="viewport"/><title>Reward Code Admin | Starlight Card Binder</title><link href="css/style.css?v=1.0.0" rel="stylesheet"/><link rel="stylesheet" href="css/pages/admin-codes.css?v=1.0"><script src="js/firefox-performance.js" defer></script>
    <link rel="stylesheet" href="css/shared-ui.css?v=1.3.0">
<link rel="stylesheet" href="css/qol-ui.css?v=94.2.0">
</head><body><script src="js/embed-mode.js" type="module"></script><div class="sky"></div><main class="admin-page"><p><a class="admin-back-link" href="admin-hub.html">← Administration Hub</a></p><section class="panelx"><p class="eyebrow">Administrator</p><h1>Reward Code Console</h1><p>Create single-card, booster, or Star Bits codes. Full codes are only shown when created, so copy them immediately.</p><p class="status" id="gate-status">Checking administrator access…</p></section>
<section class="hidden" id="admin-content"><section class="panelx"><h2>Create Reward Code</h2><form class="grid" id="create-form"><div><label for="code">Code</label><input id="code" maxlength="40" required=""/><button class="btnx space-top-sm" id="generate" type="button">Generate Code</button></div><div><label for="label">Internal label</label><input id="label" maxlength="80" required=""/></div><div><label for="reward-type">Reward type</label><select id="reward-type"><option value="single_card">Single Card</option><option value="booster">Booster / Multiple Cards</option><option value="star_bits">Star Bits</option></select></div><div><label for="max-uses">Maximum total uses</label><input id="max-uses" min="1" placeholder="Unlimited" type="number"/></div><div id="single-card-fields"><label for="single-card">Card</label><select id="single-card"></select><label class="space-top-sm" for="card-quantity">Quantity</label><input id="card-quantity" min="1" type="number" value="1"/></div><div class="hidden" id="star-bits-fields"><label for="star-bits">Star Bits amount</label><input id="star-bits" min="1" type="number" value="100"/></div><div class="full hidden" id="booster-fields"><label>Booster cards</label><div class="card-pick" id="card-pick"></div></div><div><label for="starts-at">Starts at</label><input id="starts-at" type="datetime-local"/></div><div><label for="expires-at">Expires at</label><input id="expires-at" type="datetime-local"/></div><div class="full"><button class="btnx" id="create-button" type="submit">Create Reward Code</button></div></form><p class="status" id="create-status"></p></section>
<section class="panelx"><h2>Existing Codes</h2><div class="code-list" id="code-list"></div></section></section></main>
<script type="module" src="js/pages/admin-codes-page.js?v=1.0"></script>    <script src="js/shared-ui.js?v=1.3.0"></script>
<script src="js/qol-ui.js?v=92.0.2" defer></script>
</body></html>
