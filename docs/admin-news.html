<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>News & Updates Management</title><link rel="stylesheet" href="css/style.css"><link rel="stylesheet" href="css/shared-ui.css"><style>*{box-sizing:border-box}body{min-height:100vh}.page{width:min(100%,1300px);margin:auto;padding:24px}.panel{padding:26px;border:2px solid rgba(107,198,248,.4);border-radius:25px;background:rgba(255,255,255,.96);box-shadow:0 20px 55px rgba(61,83,132,.14)}h1,h2,h3{color:#405fa1}.lead{color:#6d7692;line-height:1.55}.toolbar,.actions{display:flex;flex-wrap:wrap;gap:10px;align-items:center;justify-content:space-between}.btn{border:1px solid rgba(107,198,248,.45);border-radius:999px;padding:10px 16px;background:#fff;color:#405fa1;font-weight:900;cursor:pointer}.btn.primary{border:0;background:linear-gradient(135deg,#6bc6f8,#ff82c8);color:#fff}.btn.danger{color:#ad304a;border-color:#ef9daf}.list{display:grid;gap:13px;margin-top:20px}.post{display:grid;grid-template-columns:160px 1fr auto;gap:16px;padding:15px;border:1px solid rgba(255,130,200,.28);border-radius:18px;background:linear-gradient(145deg,#fff,#f7fbff)}.post img{width:160px;height:100px;object-fit:cover;border-radius:12px;background:#f2f8ff}.post p{color:#69738f}.status{font-weight:850}.editor{position:fixed;inset:0;z-index:6000;display:grid;place-items:center;padding:18px;background:rgba(31,39,75,.64);backdrop-filter:blur(7px)}.editor.hidden{display:none}.card{width:min(100%,900px);max-height:94vh;overflow:auto;padding:24px;border-radius:24px;background:#fff}.grid{display:grid;grid-template-columns:1fr 1fr;gap:13px}.field.full{grid-column:1/-1}.field label{display:block;margin-bottom:5px;color:#405fa1;font-weight:850}.field input,.field textarea{width:100%;padding:10px 12px;border:2px solid rgba(107,198,248,.28);border-radius:11px;font:inherit}.field textarea{min-height:120px}.preview{display:block;max-width:100%;height:180px;object-fit:contain;margin-top:9px;border-radius:13px;background:#f6fbff}@media(max-width:760px){.post{grid-template-columns:1fr}.post img{width:100%;height:180px}.grid{grid-template-columns:1fr}.field.full{grid-column:auto}}</style><link rel="stylesheet" href="css/qol-ui.css?v=92.0.2">
</head><body><script src="js/embed-mode.js" type="module"></script><div class="sky"></div><main class="page"><section class="panel"><p class="eyebrow">Administration Hub</p><div class="toolbar"><div><h1>News & Updates Management</h1><p class="lead">Publish announcements, development notes, event news, and featured updates to the Home page.</p></div><button id="newPost" class="btn primary">＋ New Update</button></div><p id="status" class="status">Loading news posts…</p><div id="list" class="list"></div></section></main><div id="editor" class="editor hidden" role="dialog" aria-modal="true"><section class="card"><div class="toolbar"><h2 id="editorTitle">New Update</h2><button id="close" class="btn">Close</button></div><div class="grid"><div class="field full"><label>Title<input id="title" maxlength="160"></label></div><div class="field full"><label>Short summary<input id="summary" maxlength="300"></label></div><div class="field full"><label>Full update<textarea id="body"></textarea></label></div><div class="field full"><label>Header image URL<input id="imageUrl" placeholder="Upload or paste an image URL"></label><label class="btn" style="display:inline-block;margin-top:8px">Browse & Upload Image<input id="imageFile" type="file" accept="image/*" hidden></label><img id="preview" class="preview" hidden></div><div class="field"><label>Publish date<input id="publishedAt" type="datetime-local"></label></div><div class="field"><label><input id="published" type="checkbox" checked> Published</label><label><input id="pinned" type="checkbox"> Pin as featured</label></div></div><div class="actions" style="margin-top:18px"><button id="save" class="btn primary">Save Update</button><button id="delete" class="btn danger" hidden>Delete</button></div><p id="editorStatus" class="status"></p></section></div><script type="module">
import{listAdminNews,saveNews,deleteNews}from'./js/news-service.js';import{uploadStudioAsset}from'./js/content-studio-service.js';import{getMyStaffAccess}from'./js/staff-service.js';
const $=id=>document.getElementById(id),esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));let posts=[],editing=null;
function render(){$('list').innerHTML=posts.length?posts.map(p=>`<article class="post">${p.imageUrl?`<img src="${esc(p.imageUrl)}" alt="">`:'<div></div>'}<div><small>${p.isPublished?'Published':'Draft'}${p.isPinned?' • Pinned':''}</small><h3>${esc(p.title)}</h3><p>${esc(p.summary||p.body||'')}</p></div><button class="btn" data-edit="${p.id}">Edit</button></article>`).join(''):'<p class="lead">No news posts yet.</p>'}
async function load(){try{const access=await getMyStaffAccess();if(!access.isStaff)throw new Error('Administration access is required.');posts=await listAdminNews();$('status').textContent='';render()}catch(e){$('status').textContent=e.message}}
function open(p=null){editing=p;$('editorTitle').textContent=p?'Edit Update':'New Update';$('title').value=p?.title||'';$('summary').value=p?.summary||'';$('body').value=p?.body||'';$('imageUrl').value=p?.imageUrl||'';$('published').checked=p?.isPublished??true;$('pinned').checked=Boolean(p?.isPinned);$('publishedAt').value=p?.publishedAt?new Date(p.publishedAt).toISOString().slice(0,16):new Date().toISOString().slice(0,16);$('delete').hidden=!p;$('preview').hidden=!p?.imageUrl;if(p?.imageUrl)$('preview').src=p.imageUrl;$('editorStatus').textContent='';$('editor').classList.remove('hidden')}
$('newPost').onclick=()=>open();$('close').onclick=()=> $('editor').classList.add('hidden');$('list').onclick=e=>{const id=e.target.closest('[data-edit]')?.dataset.edit;if(id)open(posts.find(x=>x.id===id))};
$('imageFile').onchange=async e=>{const f=e.target.files?.[0];if(!f)return;try{$('editorStatus').textContent='Uploading image…';const up=await uploadStudioAsset(f,'news');$('imageUrl').value=up.url;$('preview').src=up.url;$('preview').hidden=false;$('editorStatus').textContent='Image uploaded.'}catch(err){$('editorStatus').textContent=err.message}};
$('save').onclick=async()=>{try{$('editorStatus').textContent='Saving…';await saveNews({id:editing?.id||null,title:$('title').value.trim(),summary:$('summary').value.trim(),body:$('body').value.trim(),imageUrl:$('imageUrl').value.trim(),publishedAt:new Date($('publishedAt').value).toISOString(),isPublished:$('published').checked,isPinned:$('pinned').checked});$('editor').classList.add('hidden');await load()}catch(e){$('editorStatus').textContent=e.message}};
$('delete').onclick=async()=>{if(!editing||!confirm('Delete this news update?'))return;try{await deleteNews(editing.id);$('editor').classList.add('hidden');await load()}catch(e){$('editorStatus').textContent=e.message}};load();
</script><script src="js/shared-ui.js"></script><script src="js/qol-ui.js?v=92.0.2" defer></script>
</body></html>
