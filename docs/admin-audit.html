<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"/><meta content="width=device-width,initial-scale=1" name="viewport"/><title>Staff Audit Log | Starlight Card Binder</title><link href="css/style.css" rel="stylesheet"/><style>
body{min-height:100vh}.page{width:min(100%,1150px);margin:auto;padding:28px 18px 60px}.panel{padding:28px;border:2px solid rgba(107,198,248,.5);border-radius:24px;background:rgba(255,255,255,.96);box-shadow:0 20px 50px rgba(61,83,132,.16)}h1{color:#405fa1}.log{display:grid;gap:12px;margin-top:20px}.entry{padding:15px;border:1px solid rgba(107,198,248,.35);border-radius:14px;background:#fff}.entry header{display:flex;flex-wrap:wrap;justify-content:space-between;gap:10px}.entry strong{color:#405fa1}.entry pre{white-space:pre-wrap;overflow-wrap:anywhere;background:#f5f9fc;padding:10px;border-radius:9px}.status{font-weight:800}.error{color:#b4233f}.staff-back-link{display:inline-block;margin-bottom:18px;color:#405fa1;font-weight:900;text-decoration:none}
</style><script src="js/firefox-performance.js" defer></script>
    <link rel="stylesheet" href="css/shared-ui.css">
</head><body><script src="js/embed-mode.js" type="module"></script><div class="sky"></div><main class="page"><a class="staff-back-link" href="admin-hub.html">← Administration Hub</a><section class="panel"><p class="eyebrow">Administrator</p><h1>Staff Audit Log</h1><p class="status" id="status">Loading audit history…</p><div class="log" id="log"></div></section></main><script type="module">
import {getMyStaffAccess,listStaffAuditLog} from './js/staff-service.js';
const status=document.getElementById('status'),log=document.getElementById('log');try{const access=await getMyStaffAccess();if(!access.canViewAuditLog)throw new Error('Administrator access is required.');const rows=await listStaffAuditLog(150);log.innerHTML=rows.length?rows.map(r=>`<article class="entry"><header><strong>${String(r.action||'action').replaceAll('_',' ')}</strong><time>${new Date(r.createdAt).toLocaleString()}</time></header><p>Actor: ${r.actorEmail||r.actorUserId||'System'}${r.targetEmail?`<br>Target: ${r.targetEmail}`:''}</p><pre>${JSON.stringify(r.details||{},null,2)}</pre></article>`).join(''):'<p>No staff actions have been logged yet.</p>';status.textContent=`Showing ${rows.length} recent action${rows.length===1?'':'s'}.`}catch(e){status.textContent=e.message;status.className='status error'}
</script>    <script src="js/shared-ui.js"></script>
</body></html>
