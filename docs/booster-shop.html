<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Starlight Booster Shop | Starlight Card Binder</title><link rel="stylesheet" href="css/style.css"><style>
:root{--blue:#6bc6f8;--pink:#ff82c8;--gold:#fed334;--purple:#9f86ff;--muted:#6b7089}*{box-sizing:border-box}.shop-page{width:min(100%,1060px);margin:0 auto;padding:24px 18px 60px}.shop-panel{position:relative;overflow:hidden;padding:34px;border:2px solid rgba(255,130,200,.48);border-radius:30px;background:radial-gradient(circle at 50% 0,#fff,rgba(245,242,255,.97) 52%,rgba(228,246,255,.96));box-shadow:0 24px 70px rgba(80,88,155,.2)}.shop-panel:before{content:"✦  ✧  ⋆  ✦  ⋆  ✧";position:absolute;inset:0;display:grid;place-items:start center;padding-top:44px;color:rgba(255,255,255,.78);font-size:clamp(2rem,7vw,5rem);letter-spacing:.18em;pointer-events:none}.shop-head{position:relative;z-index:1;text-align:center}.shop-head h1{margin:0 0 10px;color:#405fa1;font-size:clamp(2.2rem,6vw,4rem)}.shop-head p{max-width:690px;margin:0 auto;color:var(--muted);line-height:1.6}.balance-card{position:relative;z-index:1;display:inline-flex;align-items:center;gap:8px;margin:22px auto 0;padding:10px 18px;border-radius:999px;background:#fff;color:#805e00;font-weight:950;box-shadow:0 8px 24px rgba(61,83,132,.13)}.product-stage{position:relative;z-index:1;display:grid;grid-template-columns:minmax(220px,330px) minmax(0,1fr);gap:28px;align-items:center;margin-top:28px;padding:26px;border:1px solid rgba(107,198,248,.36);border-radius:24px;background:linear-gradient(135deg,rgba(255,255,255,.95),rgba(255,241,250,.94))}.pack-wrap{display:grid;place-items:center}.pack-wrap img{width:min(100%,300px);filter:drop-shadow(0 22px 30px rgba(61,83,132,.25));animation:float 3.5s ease-in-out infinite}.product-copy h2{margin:0 0 8px;color:#405fa1;font-size:2rem}.product-copy p{color:var(--muted);line-height:1.55}.price{display:inline-flex;margin-top:10px;padding:8px 14px;border-radius:999px;background:linear-gradient(135deg,rgba(254,211,52,.28),rgba(255,130,200,.18));color:#8b6500;font-weight:950}.buy{display:block;width:100%;min-height:54px;margin-top:18px;border:0;border-radius:999px;background:linear-gradient(120deg,var(--blue),var(--purple),var(--pink),var(--gold));background-size:260% 100%;color:#fff;font:inherit;font-weight:950;cursor:pointer;box-shadow:0 10px 28px rgba(255,130,200,.28);animation:magic 4s linear infinite}.buy:disabled{cursor:not-allowed;opacity:.56}.reward-section{margin-top:28px}.reward-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:15px}.reward-card{padding:12px;border:1px solid rgba(255,130,200,.3);border-radius:17px;background:#fff;text-align:center}.reward-card img{width:100%;aspect-ratio:5/7;object-fit:cover;border-radius:10px}.reward-card h3{font-size:1rem;color:#405fa1}.status{min-height:24px;margin-top:18px;text-align:center;font-weight:850}.status.error{color:#b4233f}.status.success{color:#167048}.hidden{display:none!important}@keyframes float{0%,100%{transform:translateY(0) rotate(-1.5deg)}50%{transform:translateY(-16px) rotate(1.5deg)}}@keyframes magic{to{background-position:260% 0}}@media(max-width:720px){.product-stage{grid-template-columns:1fr}.reward-grid{grid-template-columns:repeat(2,1fr)}}@media(prefers-reduced-motion:reduce){.pack-wrap img,.buy{animation:none!important}}
</style><script src="js/firefox-performance.js" defer></script>
</head><body><script type="module" src="js/embed-mode.js"></script><div class="sky"></div><main class="shop-page"><section class="shop-panel"><header class="shop-head"><p class="eyebrow">Spend Your Star Bits</p><h1>✦ Starlight Booster Shop</h1><p>Open an extra Standard Booster using Star Bits earned from duplicate cards. It uses the same contents and odds as the Free Daily Booster.</p><div class="balance-card">Balance: <strong id="balance">0</strong> ✦</div></header><section class="product-stage"><div class="pack-wrap"><img id="booster-pack-image" src="site_assets/series01_rising_star_booster.png" alt="Standard Starlight booster pack"></div><div class="product-copy"><p class="eyebrow">Standard Booster</p><h2 id="booster-name">Rising Star Pack</h2><p id="booster-description">Loading booster contents…</p><span class="price" id="booster-price">— Star Bits</span><button id="buy" class="buy" type="button" disabled>Checking Balance…</button></div></section><section id="rewards" class="reward-section hidden"><h2>Your Pulls</h2><div id="reward-grid" class="reward-grid"></div></section><p id="status" class="status" role="status" aria-live="polite"></p></section></main><script type="module">
import { supabase } from './js/supabase-client.js';
import { openStarBitsBooster } from './js/daily-booster-service.js';
import { getStarBitsExchangePreview } from './js/star-bits-service.js';
import { revealRewardSequence } from './js/reward-reveal.js';
import { getPublicBoosterConfig, describeBoosterContents } from './js/booster-config-service.js';
const packImage=document.getElementById('booster-pack-image'),balance=document.getElementById('balance'),buy=document.getElementById('buy'),statusEl=document.getElementById('status'),rewards=document.getElementById('rewards'),grid=document.getElementById('reward-grid'),boosterName=document.getElementById('booster-name'),boosterDescription=document.getElementById('booster-description'),boosterPrice=document.getElementById('booster-price');let current=0,busy=false,boosterCost=100;
function status(m,t=''){statusEl.textContent=m;statusEl.className=`status ${t}`.trim()}
function render(cards){grid.replaceChildren();for(const card of cards||[]){const el=document.createElement('article');el.className='reward-card';el.innerHTML=`<img src="${card.imageUrl||card.thumbnailUrl||''}" alt="${card.name} card artwork"><h3>#${card.cardNumber} ${card.name}</h3><p>${card.rarity}</p><p>Quantity: ${card.quantity}</p>`;grid.append(el)}rewards.classList.remove('hidden')}
async function refresh(){buy.disabled=true;buy.textContent='Checking Balance…';try{const config=await getPublicBoosterConfig('standard_star_bits');if(config){packImage.src=config.pack_image_url||'site_assets/series01_rising_star_booster.png';boosterCost=Number(config.star_bits_cost||0);boosterName.textContent=config.name||'Standard Starlight Booster';boosterDescription.textContent=describeBoosterContents(config)||config.description||'Configured Starlight Booster';boosterPrice.textContent=`${boosterCost} Star Bits`;}const {data,error:userError}=await supabase.auth.getUser();if(userError)throw userError;if(!data?.user){buy.disabled=false;buy.textContent='Sign In to Open';buy.onclick=()=>window.parent!==window?window.parent.postMessage({type:'starlight-navigate',view:'profile'},location.origin):location.assign('login.html');window.parent?.postMessage({type:'starlight-content-ready',view:'shop'},location.origin);return}const {preview,error}=await getStarBitsExchangePreview();if(error)throw error;current=Number(preview?.starBitsBalance||0);balance.textContent=String(current);buy.disabled=current<boosterCost;buy.textContent=current<boosterCost?`Need ${boosterCost} Star Bits`:`Open Booster — ${boosterCost} ✦`;status('');window.parent?.postMessage({type:'starlight-content-ready',view:'shop'},location.origin)}catch(error){console.error('[Starlight] Booster Shop refresh failed',error);status(error?.message||'Could not load the Booster Shop.','error');buy.disabled=false;buy.textContent='Retry Loading';buy.onclick=()=>{buy.onclick=null;refresh()};window.parent?.postMessage({type:'starlight-content-ready',view:'shop'},location.origin)}}
buy.addEventListener('click',async()=>{if(busy||current<boosterCost)return;if(!confirm(`Spend ${boosterCost} Star Bits to open this booster?`))return;busy=true;buy.disabled=true;buy.textContent='Opening…';status('');try{const result=await openStarBitsBooster();current=Number(result.newStarBitsBalance||0);balance.textContent=String(current);await revealRewardSequence(result.cards||[]);render(result.cards||[]);status('Booster opened!','success');window.parent?.postMessage({type:'starlight-view-ready',view:'shop'},location.origin)}catch(e){status(e.message||'The booster could not be opened.','error')}finally{busy=false;await refresh()}});
let shopStarted=false;async function startShop(){if(shopStarted)return;shopStarted=true;await refresh()}
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',startShop,{once:true});else startShop();
window.addEventListener('pageshow',event=>{if(event.persisted){shopStarted=false;startShop()}});
</script></body></html>
