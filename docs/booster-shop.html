<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Starlight Booster Shop</title><link rel="stylesheet" href="css/style.css"><style>*{box-sizing:border-box}.page{width:min(100%,1180px);margin:auto;padding:24px 18px 60px}.panel{padding:30px;border:2px solid rgba(255,130,200,.45);border-radius:28px;background:rgba(255,255,255,.96);box-shadow:0 22px 60px rgba(61,83,132,.16)}h1,h2{color:#405fa1}.head{text-align:center}.head p{color:#6b7089}.balance{display:inline-flex;padding:9px 15px;border-radius:999px;background:#fff8d8;color:#815f00;font-weight:900}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:18px;margin-top:24px}.pack{padding:18px;border:1px solid rgba(107,198,248,.3);border-radius:20px;background:linear-gradient(145deg,#fff,#fff3fa);text-align:center}.pack img{width:100%;height:260px;object-fit:contain;filter:drop-shadow(0 16px 22px rgba(61,83,132,.2))}.pack p{color:#6b7089;line-height:1.5}.price{display:inline-block;padding:7px 12px;border-radius:999px;background:rgba(254,211,52,.2);color:#805e00;font-weight:900}.buy{display:block;width:100%;margin-top:13px;padding:12px;border:0;border-radius:999px;background:linear-gradient(135deg,#6bc6f8,#ff82c8);color:#fff;font-weight:900;cursor:pointer}.buy:disabled{opacity:.55}.status{min-height:24px;text-align:center;font-weight:800}.error{color:#b4233f}.empty{padding:38px;text-align:center;color:#6b7089}</style><script src="js/firefox-performance.js" defer></script></head><body><script type="module" src="js/embed-mode.js"></script><div class="sky"></div><main class="page"><section class="panel"><header class="head"><p class="eyebrow">Spend Your Star Bits</p><h1>✦ Starlight Booster Shop</h1><p>Choose from any active booster configured by the Starlight team.</p><span class="balance">Balance: <b id="balance">0</b> ✦</span></header><div id="packs" class="grid"></div><p id="status" class="status"></p></section></main><script type="module">
import{supabase}from'./js/supabase-client.js';import{getStarBitsExchangePreview}from'./js/star-bits-service.js';import{openStarBitsBoosterById}from'./js/daily-booster-service.js';import{revealRewardSequence}from'./js/reward-reveal.js';import{describeBoosterContents}from'./js/booster-config-service.js';
const packs=document.getElementById('packs'),balance=document.getElementById('balance'),status=document.getElementById('status');let current=0,busy=false;
const say=(m,e=false)=>{status.textContent=m;status.className=`status ${e?'error':''}`};
async function load(){try{const [{data:user},{preview,error},{data:boosters,error:be}]=await Promise.all([supabase.auth.getUser(),getStarBitsExchangePreview(),supabase.from('booster_types').select('id,name,description,star_bits_cost,pack_image_url,card_back_url,reward_mode,series_id,card_count,bonus_star_bits').eq('is_active',true).eq('archived',false).gt('star_bits_cost',0).order('sort_order')]);if(be)throw be;if(error)throw error;current=Number(preview?.starBitsBalance||0);balance.textContent=current;if(!user?.user){packs.innerHTML='<div class="empty">Log in to purchase booster packs.</div>';return}packs.innerHTML=(boosters||[]).map(b=>`<article class="pack"><img src="${b.pack_image_url||'site_assets/series01_rising_star_booster.png'}" alt=""><h2>${b.name}</h2><p>${b.description||'Configured Starlight booster pack.'}</p><span class="price">${b.star_bits_cost} Star Bits</span><button class="buy" data-id="${b.id}" data-cost="${b.star_bits_cost}" data-back="${b.card_back_url||''}" ${current<Number(b.star_bits_cost)?'disabled':''}>${current<Number(b.star_bits_cost)?'Not Enough Star Bits':'Open This Booster'}</button></article>`).join('')||'<div class="empty">No booster packs are currently available.</div>';say('');window.parent?.postMessage({type:'starlight-content-ready',view:'shop'},location.origin)}catch(e){say(e.message||'Could not load the Booster Shop.',true)}}
packs.addEventListener('click',async e=>{const btn=e.target.closest('[data-id]');if(!btn||busy)return;if(!confirm(`Spend ${btn.dataset.cost} Star Bits on this booster?`))return;busy=true;btn.disabled=true;try{const result=await openStarBitsBoosterById(btn.dataset.id);await revealRewardSequence(result.cards||[],{title:'Starlight Booster',cardBackUrl:btn.dataset.back||undefined});await load()}catch(err){say(err.message,true)}finally{busy=false}});load();
</script></body></html>
