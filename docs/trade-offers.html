<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Trade Offers | Starlight Card Binder</title><link rel="stylesheet" href="css/style.css"><link rel="stylesheet" href="css/app-shell.css"><style>
.trade-offers-page{padding:22px;max-width:1200px;margin:auto}.trade-hero,.trade-box{background:rgba(255,255,255,.96);border:2px solid rgba(107,198,248,.42);border-radius:24px;padding:24px;box-shadow:0 18px 45px rgba(61,83,132,.12)}.trade-hero h1{margin:.2rem 0;color:#405fa1;font-size:clamp(2rem,5vw,3.4rem)}.tabs{display:flex;gap:10px;flex-wrap:wrap;margin:18px 0}.tabs button{border:0;border-radius:999px;padding:11px 18px;font-weight:900;background:#fff;color:#405fa1;cursor:pointer;box-shadow:0 7px 18px rgba(61,83,132,.1)}.tabs button.active{background:linear-gradient(135deg,#6bc6f8,#ff82c8);color:#fff}.composer{display:grid;gap:18px}.collector-head{display:flex;align-items:center;gap:12px}.collector-head img{width:54px;height:54px;border-radius:50%;object-fit:cover;background:#eef6fb}.trade-columns{display:grid;grid-template-columns:1fr 1fr;gap:18px}.pick-panel{border:1px solid rgba(107,198,248,.35);border-radius:18px;padding:16px;background:linear-gradient(145deg,#f8fcff,#fff7fc)}.pick-panel h2{margin-top:0;color:#405fa1}.pick-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:11px;max-height:500px;overflow:auto}.pick-card{background:#fff;border:1px solid rgba(255,130,200,.3);border-radius:14px;padding:9px;text-align:center}.pick-card img{width:100%;aspect-ratio:5/7;object-fit:cover;border-radius:9px}.pick-card h3{font-size:.88rem;margin:7px 0;color:#405fa1}.pick-card select{width:100%;padding:7px;border-radius:9px;border:1px solid rgba(107,198,248,.45)}textarea{width:100%;min-height:80px;padding:12px;border:2px solid rgba(107,198,248,.3);border-radius:14px;font:inherit}.primary{border:0;border-radius:999px;padding:13px 22px;background:linear-gradient(135deg,#6bc6f8,#ff82c8);color:#fff;font-weight:900;cursor:pointer}.offer-list{display:grid;gap:14px}.offer-card{background:#fff;border:1px solid rgba(107,198,248,.35);border-radius:18px;padding:17px}.offer-top{display:flex;justify-content:space-between;gap:12px;align-items:center}.status-pill{padding:6px 10px;border-radius:999px;font-weight:900;text-transform:capitalize;background:#eef6fb;color:#405fa1}.status-pill.accepted{background:#e5f8ef;color:#167048}.status-pill.declined,.status-pill.cancelled{background:#f7e9ee;color:#9b3150}.offer-sides{display:grid;grid-template-columns:1fr auto 1fr;gap:12px;align-items:center;margin-top:14px}.offer-items{display:flex;gap:8px;flex-wrap:wrap}.mini-card{width:82px;text-align:center;font-size:.72rem}.mini-card img{width:100%;aspect-ratio:5/7;object-fit:cover;border-radius:8px}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}.actions button{border:0;border-radius:999px;padding:9px 14px;font-weight:900;cursor:pointer}.accept{background:#dff8eb;color:#167048}.decline,.cancel{background:#f8e7ee;color:#9b3150}.empty{text-align:center;padding:42px;color:#6b7089}.status{min-height:26px;text-align:center;font-weight:800;margin-top:12px}@media(max-width:760px){.trade-columns,.offer-sides{grid-template-columns:1fr}.offer-arrow{text-align:center}.trade-offers-page{padding:10px}}

/* V88.2.1 trade composer layout repair */
.trade-box{overflow:visible}.trade-columns{align-items:start}.pick-panel{min-width:0;overflow:hidden}.pick-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));padding:2px 6px 8px 2px;scrollbar-gutter:stable}.pick-card{display:flex;flex-direction:column;min-width:0;min-height:100%;overflow:hidden}.pick-card h3{min-height:2.8em;display:flex;align-items:center;justify-content:center;line-height:1.3;overflow-wrap:anywhere}.pick-card select{margin-top:auto}.composer>label{display:grid;gap:6px;font-weight:850;color:#405fa1}.composer textarea{box-sizing:border-box}.trade-error,.page-status{overflow-wrap:anywhere}
@media(max-width:980px){.trade-columns{grid-template-columns:1fr}.pick-grid{max-height:420px}}
</style><script src="js/firefox-performance.js" defer></script>
    <link rel="stylesheet" href="css/shared-ui.css">
</head><body><script src="js/embed-mode.js" type="module"></script><div class="sky"></div><main class="trade-offers-page"><section class="trade-hero"><p class="eyebrow">Collector Exchange</p><h1>🤝 Trade Offers</h1><p>Offer only duplicate cards. Every collector’s permanent first copy stays protected by the database.</p></section><div class="tabs"><button data-tab="compose" class="active">Create Offer</button><button data-tab="incoming">Incoming</button><button data-tab="outgoing">Sent</button></div><section class="trade-box"><div id="composeView" class="composer"><div id="recipientHead"></div><div id="composeMissing" class="empty"><p>Enter a collector username to start a trade offer.</p><div style="display:flex;gap:10px;max-width:520px;margin:15px auto"><input id="recipientUsername" style="flex:1;padding:11px;border:2px solid rgba(107,198,248,.35);border-radius:12px" placeholder="Collector username"><button id="loadRecipient" class="primary" type="button">Create Offer</button></div></div><div id="composeForm" hidden><div class="trade-columns"><div class="pick-panel"><h2>Your Offer</h2><div id="myCards" class="pick-grid"></div></div><div class="pick-panel"><h2>You Request</h2><div id="theirCards" class="pick-grid"></div></div></div><label><b>Optional note</b><textarea id="tradeNote" maxlength="300" placeholder="Add a friendly message..."></textarea></label><button id="sendOffer" class="primary">Send Trade Offer</button></div></div><div id="incomingView" hidden><div id="incomingList" class="offer-list"></div></div><div id="outgoingView" hidden><div id="outgoingList" class="offer-list"></div></div><p id="tradeStatus" class="status" role="status"></p></section></main><script type="module">
import{getTradeOfferContext,createTradeOffer,getMyTradeOffers,respondToTradeOffer}from'./js/trade-offer-service.js';
const q=new URLSearchParams(location.search);let username=q.get('username')||'';const status=document.querySelector('#tradeStatus');let context=null,offers={incoming:[],outgoing:[]};
const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
function pickHtml(c,side){return `<article class="pick-card"><img src="${esc(c.thumbnailUrl||c.imageUrl)}" alt="${esc(c.name)}"><h3>#${esc(c.cardNumber)} ${esc(c.name)}</h3><p>${c.wantedByOther||c.onMyWishlist?'✨ Match • ':''}${esc(c.rarity)}</p><select data-pick="${side}" data-card="${esc(c.id)}">${Array.from({length:Number(c.available)+1},(_,i)=>`<option value="${i}">${i===0?'Not selected':`×${i}`}</option>`).join('')}</select></article>`}
async function initCompose(){if(!username)return;try{context=await getTradeOfferContext(username);document.querySelector('#composeMissing').hidden=true;document.querySelector('#composeForm').hidden=false;const r=context.recipient;document.querySelector('#recipientHead').innerHTML=`<div class="collector-head">${r.avatarUrl?`<img src="${esc(r.avatarUrl)}" alt="">`:''}<div><b>Trading with ${esc(r.displayName||r.username)}</b><div>@${esc(r.username)}</div></div></div>`;document.querySelector('#myCards').innerHTML=(context.myAvailableCards||[]).map(c=>pickHtml(c,'offered')).join('')||'<div class="empty">You have no duplicate cards listed for trade.</div>';document.querySelector('#theirCards').innerHTML=(context.theirAvailableCards||[]).map(c=>pickHtml(c,'requested')).join('')||'<div class="empty">This collector has no duplicate cards listed.</div>'}catch(e){status.textContent=e.message}}
document.querySelector('#loadRecipient')?.addEventListener('click',async()=>{username=document.querySelector('#recipientUsername').value.trim().replace(/^@/,'');if(!username){status.textContent='Enter a collector username.';return}history.replaceState({},'',`${location.pathname}?${new URLSearchParams({...Object.fromEntries(q),username}).toString()}`);await initCompose()});
function chosen(side){return [...document.querySelectorAll(`[data-pick="${side}"]`)].map(s=>({cardId:s.dataset.card,quantity:Number(s.value)})).filter(x=>x.quantity>0)}
document.querySelector('#sendOffer').onclick=async()=>{const offered=chosen('offered'),requested=chosen('requested');if(!offered.length||!requested.length){status.textContent='Choose at least one card from each side.';return}status.textContent='Sending offer…';try{await createTradeOffer(username,offered,requested,document.querySelector('#tradeNote').value);status.textContent='Trade offer sent ✨';document.querySelectorAll('[data-pick]').forEach(s=>s.value='0');await loadOffers()}catch(e){status.textContent=e.message}};
function mini(items){return `<div class="offer-items">${(items||[]).map(c=>`<div class="mini-card"><img src="${esc(c.thumbnailUrl||c.imageUrl)}"><div>×${c.quantity} ${esc(c.name)}</div></div>`).join('')}</div>`}
function offerHtml(o,incoming){return `<article class="offer-card"><div class="offer-top"><b>${incoming?`From ${esc(o.proposer_name||o.proposer_username)}`:`To ${esc(o.recipient_name||o.recipient_username)}`}</b><span class="status-pill ${esc(o.status)}">${esc(o.status)}</span></div><div class="offer-sides"><div><b>Sender gives</b>${mini(o.proposer_items)}</div><div class="offer-arrow">⇄</div><div><b>Recipient gives</b>${mini(o.recipient_items)}</div></div>${o.note?`<p>“${esc(o.note)}”</p>`:''}${o.status==='pending'?`<div class="actions">${incoming?`<button class="accept" data-action="accept" data-id="${o.id}">Accept</button><button class="decline" data-action="decline" data-id="${o.id}">Decline</button>`:`<button class="cancel" data-action="cancel" data-id="${o.id}">Cancel Offer</button>`}</div>`:''}</article>`}
function renderOffers(){document.querySelector('#incomingList').innerHTML=offers.incoming.length?offers.incoming.map(o=>offerHtml(o,true)).join(''):'<div class="empty">No incoming offers.</div>';document.querySelector('#outgoingList').innerHTML=offers.outgoing.length?offers.outgoing.map(o=>offerHtml(o,false)).join(''):'<div class="empty">No sent offers.</div>'}
async function loadOffers(){try{offers=await getMyTradeOffers();renderOffers()}catch(e){status.textContent=e.message}}
document.addEventListener('click',async e=>{const b=e.target.closest('[data-action]');if(!b)return;const action=b.dataset.action;if(action==='accept'&&!(await StarlightUI.confirm({title:'Accept this trade?',message:'The listed duplicate cards will be exchanged immediately.',confirmText:'Accept Trade'})))return;status.textContent='Updating trade…';try{await respondToTradeOffer(b.dataset.id,action);status.textContent=`Trade ${action==='accept'?'completed':action+'d'}.`;await loadOffers()}catch(err){status.textContent=err.message}});
document.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>{document.querySelectorAll('[data-tab]').forEach(x=>x.classList.toggle('active',x===b));['compose','incoming','outgoing'].forEach(t=>document.querySelector(`#${t}View`).hidden=t!==b.dataset.tab)});
await Promise.all([initCompose(),loadOffers()]);
</script>    <script src="js/shared-ui.js"></script>
</body></html>
