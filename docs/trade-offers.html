<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"><title>Trade Offers | Starlight Card Binder</title><link rel="stylesheet" href="css/style.css?v=1.0.2"><link rel="stylesheet" href="css/app-shell.css?v=1.2.1"><link rel="stylesheet" href="css/pages/trade-offers.css?v=1.3"><script src="js/browser-performance.js?v=1.0.0" defer></script>

</head><body><script src="js/embed-mode.js" type="module"></script><div class="sky"></div><main class="trade-offers-page"><section class="trade-hero"><p class="eyebrow">Collector Exchange</p><h1>🤝 Trade Offers</h1><p>Offer only duplicate cards. Every collector’s permanent first copy stays protected by the database.</p></section><div class="tabs" role="tablist" aria-label="Trade offer views"><button data-tab="compose" class="active" type="button" aria-selected="true">Create Offer</button><button data-tab="incoming" type="button" aria-selected="false">Incoming</button><button data-tab="outgoing" type="button" aria-selected="false">Sent</button></div><section class="trade-box"><div id="composeView" class="composer"><div id="recipientHead"></div><div id="composeMissing" class="empty"><p>Search for a collector by username, display name, or email to start a trade offer.</p><div class="recipient-lookup"><div class="recipient-search"><label for="recipientUsername"><span class="visually-hidden">Search collectors</span><input id="recipientUsername" type="search" placeholder="Username, display name, or email…" aria-label="Search collectors by username, display name, or email" aria-autocomplete="list" aria-controls="recipientResults" aria-expanded="false" autocomplete="off"></label><div id="recipientResults" class="recipient-results" role="listbox" hidden></div></div><button id="loadRecipient" class="primary" type="button">Create Offer</button></div></div><div id="composeForm" hidden><div class="trade-columns"><div class="pick-panel"><h2>Your Offer</h2><label class="pick-search" for="myCardsSearch"><span class="visually-hidden">Search your offered cards</span><input id="myCardsSearch" type="search" placeholder="Search your cards…" aria-label="Search your offered cards"></label><div id="myCards" class="pick-grid"></div></div><div class="pick-panel"><h2>You Request</h2><label class="pick-search" for="theirCardsSearch"><span class="visually-hidden">Search their cards</span><input
