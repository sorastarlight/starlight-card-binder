<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Trade Offers | Starlight Card Binder</title><link rel="stylesheet" href="css/style.css?v=1.0.0"><link rel="stylesheet" href="css/app-shell.css"><link rel="stylesheet" href="css/pages/trade-offers.css?v=1.0"><script src="js/firefox-performance.js" defer></script>

</head><body><script src="js/embed-mode.js" type="module"></script><div class="sky"></div><main class="trade-offers-page"><section class="trade-hero"><p class="eyebrow">Collector Exchange</p><h1>🤝 Trade Offers</h1><p>Offer only duplicate cards. Every collector’s permanent first copy stays protected by the database.</p></section><div class="tabs"><button data-tab="compose" class="active">Create Offer</button><button data-tab="incoming">Incoming</button><button data-tab="outgoing">Sent</button></div><section class="trade-box"><div id="composeView" class="composer"><div id="recipientHead"></div><div id="composeMissing" class="empty"><p>Enter a collector username to start a trade offer.</p><div class="recipient-lookup"><input id="recipientUsername" placeholder="Collector username"><button id="loadRecipient" class="primary" type="button">Create Offer</button></div></div><div id="composeForm" hidden><div class="trade-columns"><div class="pick-panel"><h2>Your Offer</h2><div id="myCards" class="pick-grid"></div></div><div class="pick-panel"><h2>You Request</h2><div id="theirCards" class="pick-grid"></div></div></div><label><b>Optional note</b><textarea id="tradeNote" maxlength="300" placeholder="Add a friendly message..."></textarea></label><button id="sendOffer" class="primary">Send Trade Offer</button></div></div><div id="incomingView" hidden><div id="incomingList" class="offer-list"></div></div><div id="outgoingView" hidden><div id="outgoingList" class="offer-list"></div></div><p id="tradeStatus" class="status" role="status"></p></section></main><script type="module" src="js/pages/trade-offers-page.js?v=1.0"></script>    <script src="js/shared-ui.js?v=1.5.1"></script>
