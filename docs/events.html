<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Starlight Events</title><link rel="stylesheet" href="css/style.css"><link rel="stylesheet" href="css/shared-ui.css"><style>
.events-page{width:min(1100px,100%);margin:auto;padding:24px}.events-header,.event-card{border:2px solid rgba(107,198,248,.4);border-radius:26px;background:linear-gradient(145deg,#fff,#fff4fb);box-shadow:0 18px 44px rgba(65,78,137,.14)}.events-header{padding:26px;margin-bottom:20px}.events-header h1{margin:0;color:#405fa1}.event-card{overflow:hidden;margin:18px 0}.event-banner{min-height:230px;padding:28px;background:linear-gradient(135deg,rgba(107,198,248,.9),rgba(255,130,200,.88));background-size:cover;background-position:center;display:flex;align-items:end}.event-banner-copy{max-width:720px;padding:18px;border-radius:18px;background:rgba(255,255,255,.9);backdrop-filter:blur(8px)}.event-banner h2{margin:0;color:#405fa1;font-size:clamp(1.8rem,5vw,3rem)}.event-body{padding:22px}.countdown{font-weight:900;color:#b04f92}.event-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:14px}.mini{padding:14px;border:1px solid rgba(255,130,200,.3);border-radius:16px;background:#fff}.mini img{width:100%;height:180px;object-fit:contain}.empty{text-align:center;padding:50px;color:#6d7692}</style><link rel="stylesheet" href="css/qol-ui.css?v=92.0.2">
</head><body><script type="module" src="js/embed-mode.js"></script><main class="events-page"><header class="events-header"><p class="eyebrow">Seasonal Collections</p><h1>✨ Starlight Events</h1><p>Limited-time cards, boosters, achievements, and titles live here.</p></header><div id="events"><div class="empty">Loading active events…</div></div></main><script type="module">import{getActiveEvents}from'./js/event-service.js';const root=document.querySelector('#events');const esc=v=>String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));function countdown(end){const ms=new Date(end)-Date.now();if(ms<=0)return'Ending now';const d=Math.floor(ms/86400000),h=Math.floor(ms%86400000/3600000);return `${d} day${d===1?'':'s'}, ${h} hour${h===1?'':'s'} remaining`}try{const events=await getActiveEvents();if(!events.length)root.innerHTML='<div class="empty"><h2>No active events right now</h2><p>Check back soon for the next Starlight celebration.</p></div>';else root.innerHTML=events.map(e=>`<article class="event-card"><div class="event-banner" style="${e.bannerImageUrl?`background-image:linear-gradient(135deg,rgba(107,198,248,.45),rgba(255,130,200,.45)),url('${esc(e.bannerImageUrl)}')`:''}"><div class="event-banner-copy"><p class="countdown">${esc(countdown(e.endAt))}</p><h2>${esc(e.name)}</h2><p>${esc(e.description||'A limited Starlight event is underway!')}</p></div></div><div class="event-body"><h3>Event Booster Packs</h3><div class="event-grid">${(e.boosters||[]).map(b=>`<div class="mini">${b.packImageUrl?`<img src="${esc(b.packImageUrl)}" alt="">`:''}<h3>${esc(b.name)}</h3><p>${esc(b.description||'')}</p><a class="button primary" href="binder.html?view=shop" target="_top">Visit Card Shop</a></div>`).join('')||'<p>No event booster is available yet.</p>'}</div><h3>Event Achievements</h3><div class="event-grid">${(e.achievements||[]).map(a=>`<div class="mini"><strong>${esc(a.name)}</strong><p>${esc(a.description||'')}</p><small>${a.rewardTitle?`Title: ${esc(a.rewardTitle)}`:''}${a.rewardStarBits?` • ${a.rewardStarBits} Star Bits`:''}</small></div>`).join('')||'<p>No achievements configured yet.</p>'}</div></div></article>`).join('')}catch(e){root.innerHTML=`<div class="empty"><h2>Events could not load</h2><p>${esc(e.message)}</p></div>`}</script><script src="js/shared-ui.js"></script><script src="js/qol-ui.js?v=92.0.2" defer></script>
</body></html>
