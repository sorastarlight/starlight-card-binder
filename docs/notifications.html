<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Notifications | Starlight Card Binder</title>
<link rel="stylesheet" href="css/style.css"><link rel="stylesheet" href="css/shared-ui.css"><script src="js/firefox-performance.js" defer></script>
<style>
.notifications-page{width:min(100%,980px);margin:auto;padding:18px 16px 56px}.notifications-hero{padding:24px 26px;border:2px solid rgba(107,198,248,.48);border-radius:26px;background:linear-gradient(135deg,rgba(255,255,255,.98),rgba(244,250,255,.96) 48%,rgba(255,242,250,.96));box-shadow:0 18px 45px rgba(61,83,132,.14)}.notifications-hero h1{margin:.2rem 0;color:#405fa1}.notifications-toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin:18px 0}.notifications-actions{display:flex;gap:8px;flex-wrap:wrap}.notice-list{display:grid;gap:12px}.notice-card{position:relative;display:grid;grid-template-columns:48px 1fr auto;gap:14px;align-items:start;padding:17px;border:1px solid rgba(107,198,248,.35);border-radius:18px;background:rgba(255,255,255,.96);box-shadow:0 8px 22px rgba(61,83,132,.09);transition:.18s ease}.notice-card.unread{border-color:rgba(255,130,200,.62);background:linear-gradient(135deg,#fff,#fff5fb)}.notice-card.unread:before{content:"";position:absolute;top:13px;right:13px;width:9px;height:9px;border-radius:50%;background:#ff72bc;box-shadow:0 0 12px #ff72bc}.notice-icon{display:grid;place-items:center;width:44px;height:44px;border-radius:14px;background:linear-gradient(135deg,#eaf7ff,#ffe8f5);font-size:1.35rem}.notice-copy h2{margin:0 0 5px;color:#405fa1;font-size:1.04rem}.notice-copy p{margin:0;color:#626a82;line-height:1.5}.notice-meta{margin-top:8px!important;font-size:.8rem;color:#8990a4!important}.notice-controls{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}.notice-controls button,.notice-controls a{border:0;border-radius:999px;padding:8px 11px;font:inherit;font-size:.8rem;font-weight:850;cursor:pointer;text-decoration:none}.notice-open{background:linear-gradient(135deg,#6bc6f8,#ff82c8);color:#fff}.notice-muted{background:#eef4fa;color:#405fa1}.notice-empty{padding:48px 20px;text-align:center;border:2px dashed rgba(107,198,248,.4);border-radius:22px;background:rgba(255,255,255,.72)}@media(max-width:620px){.notice-card{grid-template-columns:42px 1fr}.notice-controls{grid-column:1/-1;justify-content:flex-start}}
.notice-preferences{margin:18px 0;padding:18px;border:1px solid rgba(107,198,248,.35);border-radius:18px;background:rgba(255,255,255,.92)}.notice-preferences h2{margin:0 0 12px;color:#405fa1}.preference-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:10px}.preference-grid label{display:flex;align-items:center;gap:9px;padding:11px 13px;border-radius:13px;background:#f6fbff;color:#405fa1;font-weight:800}.preference-grid input{accent-color:#ff82c8}.preference-actions{margin-top:12px;display:flex;justify-content:flex-end}</style></head><body><script type="module" src="js/embed-mode.js"></script><div class="sky"></div><main class="notifications-page"><section class="notifications-hero"><p class="eyebrow">Collector Activity</p><h1>🔔 Notifications</h1><p>Trade updates, event announcements, achievements, rewards, and other Starlight news all live here.</p></section><div class="notifications-toolbar"><strong id="summary">Loading notifications…</strong><div class="notifications-actions"><button class="btn" id="markAll" type="button">Mark All Read</button><button class="btn secondary" id="historyButton" type="button">Notification History</button><button class="btn" id="clearRead" type="button">Delete All Read</button></div></div><section class="notice-preferences"><h2>Notification Preferences</h2><div class="preference-grid" id="preferenceGrid">
<label><input type="checkbox" data-pref="daily_booster"> Daily Booster</label>
<label><input type="checkbox" data-pref="trade"> Trade Updates</label>
<label><input type="checkbox" data-pref="achievement"> Achievements</label>
<label><input type="checkbox" data-pref="reward"> Rewards & Codes</label>
<label><input type="checkbox" data-pref="event"> Events</label>
<label><input type="checkbox" data-pref="broadcast"> Announcements</label>
</div><div class="preference-actions"><button class="btn" id="savePreferences" type="button">Save Preferences</button></div></section><section class="notice-list" id="list" aria-live="polite"></section></main>
<script type="module">
import {getMyNotifications,markNotificationRead,markAllNotificationsRead,deleteNotification,deleteReadNotifications,getNotificationPreferences,saveNotificationPreferences} from './js/notification-service.js';
const list=document.getElementById('list'),summary=document.getElementById('summary');let state=[],historyMode=false;
document.addEventListener('pointerdown',()=>{if(window.parent!==window)window.parent.postMessage({type:'starlight-close-notifications'},location.origin)},{capture:true,once:true});
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function when(value){try{return new Intl.DateTimeFormat(undefined,{dateStyle:'medium',timeStyle:'short'}).format(new Date(value))}catch{return ''}}
function normalizeRoute(value,n={}){const hint=`${n.notification_type||''} ${n.title||''} ${n.body||''} ${n.source_key||''}`.toLowerCase();if(/reward|gift|twitch redeem|code accepted|booster.*waiting/.test(hint))return 'rewards';if(/daily.*booster/.test(hint))return 'daily';if(/trade/.test(hint)&&(!value||String(value).toLowerCase()==='binder'))return 'offers';const raw=String(value||'binder').trim();const clean=raw.replace(/^https?:\/\/[^/]+\/?/i,'').replace(/^\/?binder\.html\?view=/i,'').replace(/^\/?/,'');const key=clean.split(/[?&#]/)[0].toLowerCase();const aliases={daily:'daily','daily-booster':'daily','daily-booster.html':'daily','free-daily-booster':'daily',notifications:'notifications','notifications.html':'notifications',collection:'collection','collection.html':'collection',offers:'offers','trade-offers':'offers','trade-offers.html':'offers',trades:'trades','trade-lists':'trades','trade-lists.html':'trades',events:'events','events.html':'events',shop:'shop','booster-shop':'shop','booster-shop.html':'shop',profile:'profile','profile-settings':'profile','profile-settings.html':'profile',rewards:'rewards','received-rewards':'rewards','received-rewards.html':'rewards'};return aliases[key]||key||'binder'}
function shellUrl(n){const route=normalizeRoute(n.route,n);const raw=(n.route_params&&typeof n.route_params==='object')?n.route_params:{};const p=new URLSearchParams(raw);p.set('view',route);return `binder.html?${p.toString()}`}
function render(data){state=data.notifications||[];const visible=historyMode?state:state.filter(n=>!n.is_read);summary.textContent=`${data.unreadCount||0} unread • ${state.length} recent${historyMode?' • history':''}`;list.replaceChildren();if(!visible.length){list.innerHTML='<div class="notice-empty"><h2>All caught up ✨</h2><p>New collector activity will appear here.</p></div>';return}for(const n of visible){const card=document.createElement('article');card.className=`notice-card ${n.is_read?'':'unread'}`;card.innerHTML=`<div class="notice-icon">${esc(n.icon||'✦')}</div><div class="notice-copy"><h2>${esc(n.title)}</h2><p>${esc(n.body||'')}</p><p class="notice-meta">${esc(when(n.created_at))}</p></div><div class="notice-controls">${n.route?`<a class="notice-open" data-open href="${esc(shellUrl(n))}">Open</a>`:''}${n.is_read?'':`<button class="notice-muted" data-read type="button">Read</button>`}<button class="notice-muted" data-delete type="button">Delete</button></div>`;card.querySelector('[data-read]')?.addEventListener('click',async()=>{await markNotificationRead(n.id);await load()});card.querySelector('[data-delete]')?.addEventListener('click',async()=>{await deleteNotification(n.id);await load()});card.querySelector('[data-open]')?.addEventListener('click',async e=>{e.preventDefault();if(!n.is_read)await markNotificationRead(n.id);const route=normalizeRoute(n.route,n);const params=(n.route_params&&typeof n.route_params==='object')?n.route_params:{};window.parent!==window?window.parent.postMessage({type:'starlight-navigate',view:route,params},location.origin):location.href=shellUrl({...n,route})});list.append(card)}}
async function load(){try{render(await getMyNotifications())}catch(e){summary.textContent='Notifications could not be loaded.';list.innerHTML=`<div class="notice-empty"><h2>Unable to load</h2><p>${esc(e.message)}</p></div>`}}
async function loadPreferences(){try{const prefs=await getNotificationPreferences();document.querySelectorAll('[data-pref]').forEach(input=>{input.checked=prefs[input.dataset.pref]!==false})}catch(e){console.warn('[Starlight] Preferences failed',e)}}
document.getElementById('savePreferences').onclick=async()=>{const prefs={};document.querySelectorAll('[data-pref]').forEach(input=>prefs[input.dataset.pref]=input.checked);await saveNotificationPreferences(prefs);window.StarlightUI?.toast?.('Notification preferences saved.','success')};
document.getElementById('historyButton').onclick=()=>{historyMode=!historyMode;document.getElementById('historyButton').textContent=historyMode?'Show Unread':'Notification History';render({notifications:state,unreadCount:state.filter(n=>!n.is_read).length})};document.getElementById('markAll').onclick=async()=>{await markAllNotificationsRead();await load()};document.getElementById('clearRead').onclick=async()=>{await deleteReadNotifications();await load()};await Promise.all([load(),loadPreferences()]);
</script><script src="js/shared-ui.js"></script></body></html>
