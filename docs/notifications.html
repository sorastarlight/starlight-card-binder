<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Notifications | Starlight Card Binder</title>
<link rel="stylesheet" href="css/style.css?v=1.0.0"><link rel="stylesheet" href="css/shared-ui.css?v=1.6.2"><script src="js/firefox-performance.js" defer></script>
<link rel="stylesheet" href="css/pages/notifications.css?v=1.0"><link rel="stylesheet" href="css/qol-ui.css?v=94.2.0">
</head><body><script type="module" src="js/embed-mode.js"></script><div class="sky"></div><main class="notifications-page"><section class="notifications-hero"><p class="eyebrow">Collector Activity</p><h1>🔔 Notifications</h1><p>Trade updates, event announcements, achievements, rewards, and other Starlight news all live here.</p></section><div class="notifications-toolbar"><strong id="summary">Loading notifications…</strong><div class="notifications-actions"><button class="btn" id="markAll" type="button">Mark All Read</button><button class="btn secondary" id="historyButton" type="button">Notification History</button><button class="btn" id="clearRead" type="button">Delete All Read</button></div></div><section class="notice-preferences"><h2>Notification Preferences</h2><div class="preference-grid" id="preferenceGrid">
<label><input type="checkbox" data-pref="daily_booster"> Daily Booster</label>
<label><input type="checkbox" data-pref="trade"> Trade Updates</label>
<label><input type="checkbox" data-pref="achievement"> Achievements</label>
<label><input type="checkbox" data-pref="reward"> Rewards & Codes</label>
<label><input type="checkbox" data-pref="event"> Events</label>
<label><input type="checkbox" data-pref="broadcast"> Announcements</label>
</div><div class="preference-actions"><button class="btn" id="savePreferences" type="button">Save Preferences</button></div></section><section class="notice-list" id="list" aria-live="polite"></section></main>
<script type="module" src="js/pages/notifications-page.js?v=1.0"></script><script src="js/shared-ui.js?v=1.6.2"></script><script src="js/qol-ui.js?v=92.0.2" defer></script>
</body></html>
