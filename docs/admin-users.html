<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>User Directory | Starlight Card Binder</title><link rel="stylesheet" href="css/style.css"><style>
body{min-height:100vh}.page{width:min(100%,1320px);margin:auto;padding:28px 18px 60px}.panel{padding:28px;border:2px solid rgba(107,198,248,.5);border-radius:24px;background:rgba(255,255,255,.97);box-shadow:0 20px 50px rgba(61,83,132,.16)}h1{color:#405fa1}.back{display:inline-block;margin-bottom:18px;color:#405fa1;font-weight:900;text-decoration:none}.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin:18px 0}.toolbar input{flex:1;min-width:250px;padding:12px;border:2px solid rgba(107,198,248,.35);border-radius:12px;font:inherit}.toolbar button{padding:10px 18px;border:0;border-radius:12px;background:linear-gradient(135deg,#6bc6f8,#ff82c8);color:#fff;font-weight:900}.status{font-weight:800;min-height:24px}.error{color:#b4233f}.table-wrap{overflow:auto;max-height:72vh;border:1px solid rgba(107,198,248,.3);border-radius:15px}table{width:100%;border-collapse:collapse;min-width:1050px}th,td{padding:11px;border-bottom:1px solid rgba(107,198,248,.22);text-align:left}th{position:sticky;top:0;background:#edf8ff;color:#405fa1;z-index:1}.name{font-weight:900;color:#405fa1}.role{display:inline-block;padding:5px 9px;border-radius:999px;background:rgba(255,130,200,.14);font-weight:800}.muted{color:#6b7089;font-size:.9rem}
</style><script src="js/firefox-performance.js" defer></head><body><script src="js/embed-mode.js" type="module"></script><div class="sky"></div><main class="page"><a class="back" href="admin-hub.html">← Administration Hub</a><section class="panel"><p class="eyebrow">Owner &amp; Administrator</p><h1>Registered User Directory</h1><p>View the account email, chosen username, display name, staff role, profile visibility, join date, and most recent sign-in for registered accounts.</p><div class="toolbar"><input id="search" type="search" placeholder="Search email, username, or display name…"><button id="refresh" type="button">Search</button></div><p id="status" class="status">Loading users…</p><div class="table-wrap"><table><thead><tr><th>Display Name</th><th>Username</th><th>Email</th><th>Role</th><th>Visibility</th><th>Joined</th><th>Last Sign-in</th></tr></thead><tbody id="body"></tbody></table></div></section></main><script type="module">
import {getMyStaffAccess} from './js/staff-service.js';import {listUserDirectory} from './js/user-directory-service.js';
const search=document.getElementById('search'),status=document.getElementById('status'),body=document.getElementById('body');
const fmt=v=>v?new Date(v).toLocaleString():'—';const esc=v=>String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
async function load(){try{status.className='status';status.textContent='Loading users…';const access=await getMyStaffAccess();if(!access.canManageRoles)throw new Error('Administrator access is required.');const users=await listUserDirectory(search.value,1000);body.innerHTML=users.map(u=>`<tr><td class="name">${esc(u.displayName||'—')}</td><td>${u.username?`@${esc(u.username)}`:'—'}</td><td>${esc(u.email||'—')}</td><td><span class="role">${esc((u.role||'collector').replaceAll('_',' '))}</span></td><td>${esc(u.profileVisibility||'—')}</td><td class="muted">${fmt(u.accountCreatedAt)}</td><td class="muted">${fmt(u.lastSignInAt)}</td></tr>`).join('');status.textContent=''}catch(e){status.textContent=e.message||'Unable to load registered users.';status.className='status error'}}
document.getElementById('refresh').addEventListener('click',load);search.addEventListener('keydown',e=>{if(e.key==='Enter')load()});load();
</script></body></html>
