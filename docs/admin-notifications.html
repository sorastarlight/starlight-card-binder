<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Notification Broadcasts | Starlight Card Binder</title><link rel="stylesheet" href="css/style.css?v=1.0.0"><link rel="stylesheet" href="css/shared-ui.css?v=1.3.2"><link rel="stylesheet" href="css/pages/admin-notifications.css?v=1.0"><link rel="stylesheet" href="css/qol-ui.css?v=94.2.0">
</head><body><script type="module" src="js/embed-mode.js"></script><div class="sky"></div><main class="page"><section class="panel"><p class="eyebrow">Administration Hub</p><h1>📣 Notification Broadcasts</h1><p>Send an on-site announcement to every registered collector.</p><form id="form" class="form-grid"><label>Icon<input id="icon" maxlength="8" value="🌟"></label><label>Destination<select id="route"><option value="events">Starlight Events</option><option value="binder">Card Binder</option><option value="daily">Daily Free Booster</option><option value="shop">Starlight Card Shop</option><option value="collection">My Collection</option><option value="">No destination</option></select></label><label class="wide">Title<input id="title" maxlength="100" required placeholder="A new Starlight event has begun!"></label><label class="wide">Message<textarea id="body" maxlength="500" rows="5" required placeholder="Tell collectors what is happening..."></textarea></label><label>Expires (optional)<input id="expires" type="datetime-local"></label><div class="form-submit"><button class="btn primary" type="submit">Send Broadcast</button></div></form><div class="preview"><strong>Broadcasts appear in the notification bell and Notifications page.</strong><p id="status" role="status"></p></div></section></main><script type="module" src="js/pages/admin-notifications-page.js?v=1.0"></script><script src="js/shared-ui.js?v=1.3.1"></script><script src="js/qol-ui.js?v=92.0.2" defer></script>
</body></html>
