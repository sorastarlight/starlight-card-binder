<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Notification Broadcasts | Starlight Card Binder</title><link rel="stylesheet" href="css/style.css"><link rel="stylesheet" href="css/shared-ui.css"><style>.page{width:min(100%,900px);margin:auto;padding:24px 16px 60px}.panel{padding:28px;border:2px solid rgba(107,198,248,.48);border-radius:25px;background:rgba(255,255,255,.96);box-shadow:0 18px 48px rgba(61,83,132,.14)}.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:15px}.wide{grid-column:1/-1}.form-grid label{display:grid;gap:6px;color:#405fa1;font-weight:850}.form-grid input,.form-grid textarea,.form-grid select{width:100%;padding:11px 12px;border:1px solid rgba(107,198,248,.55);border-radius:12px;font:inherit}.preview{margin-top:20px;padding:18px;border-radius:18px;background:linear-gradient(135deg,#f4fbff,#fff3fa);border:1px solid rgba(255,130,200,.35)}@media(max-width:650px){.form-grid{grid-template-columns:1fr}.wide{grid-column:auto}}</style><link rel="stylesheet" href="css/qol-ui.css?v=91.1.1">
</head><body><script type="module" src="js/embed-mode.js"></script><div class="sky"></div><main class="page"><section class="panel"><p class="eyebrow">Administration Hub</p><h1>📣 Notification Broadcasts</h1><p>Send an on-site announcement to every registered collector.</p><form id="form" class="form-grid"><label>Icon<input id="icon" maxlength="8" value="🌟"></label><label>Destination<select id="route"><option value="events">Starlight Events</option><option value="binder">Card Binder</option><option value="daily">Daily Free Booster</option><option value="shop">Starlight Card Shop</option><option value="collection">My Collection</option><option value="">No destination</option></select></label><label class="wide">Title<input id="title" maxlength="100" required placeholder="A new Starlight event has begun!"></label><label class="wide">Message<textarea id="body" maxlength="500" rows="5" required placeholder="Tell collectors what is happening..."></textarea></label><label>Expires (optional)<input id="expires" type="datetime-local"></label><div style="align-self:end"><button class="btn primary" type="submit">Send Broadcast</button></div></form><div class="preview"><strong>Broadcasts appear in the notification bell and Notifications page.</strong><p id="status" role="status"></p></div></section></main><script type="module">import {adminBroadcastNotification} from './js/notification-service.js';import {getMyStaffAccess} from './js/staff-service.js';const status=document.getElementById('status'),iconInput=document.getElementById('icon'),titleInput=document.getElementById('title'),bodyInput=document.getElementById('body'),routeInput=document.getElementById('route'),expiresInput=document.getElementById('expires');const access=await getMyStaffAccess();if(!access?.isStaff){document.getElementById('form').hidden=true;status.textContent='Administration access is required.'}document.getElementById('form').addEventListener('submit',async e=>{e.preventDefault();const button=e.submitter;button.disabled=true;status.textContent='Sending…';try{const result=await adminBroadcastNotification({icon:iconInput.value,title:titleInput.value,body:bodyInput.value,route:routeInput.value||null,expiresAt:expiresInput.value?new Date(expiresInput.value).toISOString():null});status.textContent=`Broadcast sent to ${result.recipientCount||0} collectors.`;e.target.reset();iconInput.value='🌟'}catch(error){status.textContent=error.message}finally{button.disabled=false}});</script><script src="js/shared-ui.js"></script><script src="js/qol-ui.js?v=91.1.1" defer></script>
</body></html>
