<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Sign In | Starlight Card Binder</title>

    <style>
        :root {
            --starlight-blue: #6bc6f8;
            --starlight-pink: #ff82c8;
            --starlight-yellow: #fed334;
            --text-dark: #30344f;
            --panel-white: rgba(255, 255, 255, 0.94);
            --error-red: #b4233f;
            --success-green: #177245;
        }

        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            padding: 24px;

            display: flex;
            align-items: center;
            justify-content: center;

            font-family:
                Arial,
                Helvetica,
                sans-serif;

            color: var(--text-dark);

            background:
                radial-gradient(
                    circle at 20% 20%,
                    rgba(255, 130, 200, 0.3),
                    transparent 34%
                ),
                radial-gradient(
                    circle at 80% 15%,
                    rgba(107, 198, 248, 0.38),
                    transparent 36%
                ),
                linear-gradient(
                    145deg,
                    #edf9ff,
                    #fff0fa
                );
        }

        .login-panel {
            width: min(100%, 470px);
            padding: 34px;

            background: var(--panel-white);

            border:
                2px solid
                rgba(107, 198, 248, 0.55);

            border-radius: 24px;

            box-shadow:
                0 18px 50px
                rgba(67, 96, 150, 0.2);
        }

        .login-header {
            margin-bottom: 28px;
            text-align: center;
        }

        .login-header h1 {
            margin: 0 0 12px;

            font-size: clamp(
                1.8rem,
                5vw,
                2.5rem
            );

            color: #3d65a8;
        }

        .login-header p {
            margin: 0;
            line-height: 1.55;
        }

        .mode-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;

            margin-bottom: 24px;
        }

        .mode-button {
            padding: 12px 16px;

            border:
                2px solid
                rgba(107, 198, 248, 0.6);

            border-radius: 999px;

            background: #ffffff;
            color: var(--text-dark);

            font: inherit;
            font-weight: 700;

            cursor: pointer;
        }

        .mode-button.active {
            border-color: var(--starlight-pink);

            background:
                linear-gradient(
                    135deg,
                    var(--starlight-blue),
                    var(--starlight-pink)
                );

            color: #ffffff;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 7px;

            font-weight: 700;
        }

        input {
            width: 100%;
            min-height: 48px;
            padding: 12px 14px;

            border:
                2px solid
                rgba(75, 105, 155, 0.25);

            border-radius: 12px;

            background: #ffffff;
            color: var(--text-dark);

            font: inherit;
        }

        input:focus {
            outline:
                3px solid
                rgba(107, 198, 248, 0.3);

            border-color: var(--starlight-blue);
        }

        .password-wrapper {
            position: relative;
        }

        .password-wrapper input {
            padding-right: 82px;
        }

        .show-password {
            position: absolute;
            top: 50%;
            right: 8px;

            transform: translateY(-50%);

            padding: 7px 10px;

            border: 0;
            border-radius: 8px;

            background: #edf7ff;
            color: #3d65a8;

            font: inherit;
            font-size: 0.85rem;
            font-weight: 700;

            cursor: pointer;
        }

        .primary-button {
            width: 100%;
            min-height: 50px;
            padding: 12px 18px;

            border: 0;
            border-radius: 999px;

            background:
                linear-gradient(
                    135deg,
                    var(--starlight-blue),
                    var(--starlight-pink)
                );

            color: #ffffff;

            font: inherit;
            font-weight: 800;
            font-size: 1rem;

            cursor: pointer;

            box-shadow:
                0 8px 20px
                rgba(255, 130, 200, 0.24);
        }

        .primary-button:hover {
            filter: brightness(1.04);
        }

        .primary-button:disabled {
            cursor: wait;
            opacity: 0.65;
        }

        .status-message {
            min-height: 24px;
            margin: 18px 0 0;

            line-height: 1.45;
            text-align: center;
            font-weight: 700;
        }

        .status-message.error {
            color: var(--error-red);
        }

        .status-message.success {
            color: var(--success-green);
        }

        .back-link {
            display: block;
            margin-top: 22px;

            color: #3d65a8;
            text-align: center;
            font-weight: 700;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 520px) {
            body {
                padding: 14px;
            }

            .login-panel {
                padding: 25px 20px;
                border-radius: 18px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                scroll-behavior: auto !important;
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
<script src="js/firefox-performance.js" defer></script>
</head>

<body>
    <main class="login-panel">
        <header class="login-header">
            <h1>Starlight Card Binder</h1>

            <p id="page-description">
                Sign in to save your collection and keep it
                synchronized between devices.
            </p>
        </header>

        <div
            class="mode-buttons"
            aria-label="Choose account action"
        >
            <button
                id="sign-in-mode-button"
                class="mode-button active"
                type="button"
                aria-pressed="true"
            >
                Sign In
            </button>

            <button
                id="sign-up-mode-button"
                class="mode-button"
                type="button"
                aria-pressed="false"
            >
                Create Account
            </button>
        </div>

        <form id="auth-form">
            <div class="form-group">
                <label for="email">
                    Email Address
                </label>

                <input
                    id="email"
                    name="email"
                    type="email"
                    autocomplete="email"
                    inputmode="email"
                    required
                >
            </div>

            <div class="form-group">
                <label for="password">
                    Password
                </label>

                <div class="password-wrapper">
                    <input
                        id="password"
                        name="password"
                        type="password"
                        autocomplete="current-password"
                        minlength="8"
                        required
                    >

                    <button
                        id="show-password-button"
                        class="show-password"
                        type="button"
                        aria-controls="password"
                        aria-pressed="false"
                    >
                        Show
                    </button>
                </div>
            </div>

            <div
                id="confirm-password-group"
                class="form-group hidden"
            >
                <label for="confirm-password">
                    Confirm Password
                </label>

                <div class="password-wrapper">
                    <input
                        id="confirm-password"
                        name="confirm-password"
                        type="password"
                        autocomplete="new-password"
                        minlength="8"
                    >

                    <button
                        id="show-confirm-password-button"
                        class="show-password"
                        type="button"
                        aria-controls="confirm-password"
                        aria-pressed="false"
                    >
                        Show
                    </button>
                </div>
            </div>

            <button
                id="submit-button"
                class="primary-button"
                type="submit"
            >
                Sign In
            </button>
        </form>

        <p
            id="auth-status"
            class="status-message"
            role="status"
            aria-live="polite"
        ></p>

        <a
            class="back-link"
            href="./binder.html"
        >
            Return to the Binder
        </a>
    </main>

    <script type="module">
        import { supabase } from "./js/supabase-client.js";

        import {
            signIn,
            signUp
        } from "./js/auth.js";

        const form =
            document.getElementById("auth-form");

        const emailInput =
            document.getElementById("email");

        const passwordInput =
            document.getElementById("password");

        const confirmPasswordInput =
            document.getElementById("confirm-password");

        const confirmPasswordGroup =
            document.getElementById(
                "confirm-password-group"
            );

        const submitButton =
            document.getElementById("submit-button");

        const signInModeButton =
            document.getElementById(
                "sign-in-mode-button"
            );

        const signUpModeButton =
            document.getElementById(
                "sign-up-mode-button"
            );

        const pageDescription =
            document.getElementById(
                "page-description"
            );

        const statusElement =
            document.getElementById("auth-status");

        const showPasswordButton =
            document.getElementById(
                "show-password-button"
            );

        const showConfirmPasswordButton =
            document.getElementById(
                "show-confirm-password-button"
            );

        let currentMode = "signin";

        function displayStatus(message, type = "") {
            statusElement.textContent = message;

            statusElement.classList.remove(
                "error",
                "success"
            );

            if (type) {
                statusElement.classList.add(type);
            }
        }

        function setLoading(isLoading) {
            submitButton.disabled = isLoading;

            if (isLoading) {
                submitButton.textContent =
                    currentMode === "signin"
                        ? "Signing In..."
                        : "Creating Account...";

                return;
            }

            submitButton.textContent =
                currentMode === "signin"
                    ? "Sign In"
                    : "Create Account";
        }

        function setMode(mode) {
            currentMode = mode;

            const isSignUp =
                currentMode === "signup";

            signInModeButton.classList.toggle(
                "active",
                !isSignUp
            );

            signUpModeButton.classList.toggle(
                "active",
                isSignUp
            );

            signInModeButton.setAttribute(
                "aria-pressed",
                String(!isSignUp)
            );

            signUpModeButton.setAttribute(
                "aria-pressed",
                String(isSignUp)
            );

            confirmPasswordGroup.classList.toggle(
                "hidden",
                !isSignUp
            );

            confirmPasswordInput.required =
                isSignUp;

            passwordInput.autocomplete =
                isSignUp
                    ? "new-password"
                    : "current-password";

            pageDescription.textContent =
                isSignUp
                    ? "Create an account to protect your collection and synchronize it between devices."
                    : "Sign in to save your collection and keep it synchronized between devices.";

            submitButton.textContent =
                isSignUp
                    ? "Create Account"
                    : "Sign In";

            displayStatus("");

            emailInput.focus();
        }

        function setupPasswordToggle(
            button,
            input
        ) {
            button.addEventListener("click", () => {
                const passwordIsVisible =
                    input.type === "text";

                input.type =
                    passwordIsVisible
                        ? "password"
                        : "text";

                button.textContent =
                    passwordIsVisible
                        ? "Show"
                        : "Hide";

                button.setAttribute(
                    "aria-pressed",
                    String(!passwordIsVisible)
                );
            });
        }

        async function handleAuthenticationReturn() {
            const urlParameters =
                new URLSearchParams(
                    window.location.search
                );

            const urlError =
                urlParameters.get(
                    "error_description"
                );

            if (urlError) {
                displayStatus(
                    decodeURIComponent(urlError),
                    "error"
                );

                return;
            }

            const {
                data,
                error
            } = await supabase.auth.getSession();

            if (error) {
                console.error(
                    "Session check failed:",
                    error
                );

                displayStatus(
                    "We could not complete the account confirmation. Please try signing in.",
                    "error"
                );

                return;
            }

            if (data.session) {
                displayStatus(
                    "Your account is confirmed and you are signed in! Taking you to the binder...",
                    "success"
                );

                window.setTimeout(() => {
                    window.location.href =
                        "./binder.html";
                }, 1500);
            }
        }

        signInModeButton.addEventListener(
            "click",
            () => {
                setMode("signin");
            }
        );

        signUpModeButton.addEventListener(
            "click",
            () => {
                setMode("signup");
            }
        );

        setupPasswordToggle(
            showPasswordButton,
            passwordInput
        );

        setupPasswordToggle(
            showConfirmPasswordButton,
            confirmPasswordInput
        );

        form.addEventListener(
            "submit",
            async event => {
                event.preventDefault();

                displayStatus("");

                const email =
                    emailInput.value.trim();

                const password =
                    passwordInput.value;

                if (!email) {
                    displayStatus(
                        "Please enter your email address.",
                        "error"
                    );

                    emailInput.focus();
                    return;
                }

                if (password.length < 8) {
                    displayStatus(
                        "Your password must contain at least eight characters.",
                        "error"
                    );

                    passwordInput.focus();
                    return;
                }

                if (
                    currentMode === "signup" &&
                    password !==
                        confirmPasswordInput.value
                ) {
                    displayStatus(
                        "The two passwords do not match.",
                        "error"
                    );

                    confirmPasswordInput.focus();
                    return;
                }

                setLoading(true);

                try {
                    if (currentMode === "signup") {
                        const {
                            data,
                            error
                        } = await signUp(
                            email,
                            password
                        );

                        if (error) {
                            throw error;
                        }

                        if (data.session) {
                            displayStatus(
                                "Your account was created and you are signed in! Taking you to the binder...",
                                "success"
                            );

                            window.setTimeout(() => {
                                window.location.href =
                                    "./binder.html";
                            }, 1500);

                            return;
                        }

                        displayStatus(
                            "Your account was created! Check your email and click the confirmation link to finish signing up.",
                            "success"
                        );

                        form.reset();
                        return;
                    }

                    const {
                        error
                    } = await signIn(
                        email,
                        password
                    );

                    if (error) {
                        throw error;
                    }

                    displayStatus(
                        "You are signed in! Taking you to the binder...",
                        "success"
                    );

                    window.setTimeout(() => {
                        window.location.href =
                            "./binder.html";
                    }, 1000);
                } catch (error) {
                    console.error(
                        "Authentication failed:",
                        error
                    );

                    displayStatus(
                        error.message ||
                            "Something went wrong. Please try again.",
                        "error"
                    );
                } finally {
                    setLoading(false);
                }
            }
        );

        handleAuthenticationReturn();
    </script>
</body>
</html>
