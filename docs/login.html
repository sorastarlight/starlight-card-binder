<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Sign In | Starlight Card Binder</title>

    <link rel="stylesheet" href="css/pages/login.css?v=1.0">
<script src="js/firefox-performance.js" defer></script>
    <link rel="stylesheet" href="css/shared-ui.css?v=1.5.0">
<link rel="stylesheet" href="css/qol-ui.css?v=94.2.0">
</head>

<body>
    <main class="login-panel">
        <header class="login-header">
            <h1>Starlight Card Binder</h1>

            <p id="page-description">
                Sign in to save your collection and keep it
                synchronized between devices.
            </p>
        </header>

        <div
            class="mode-buttons"
            aria-label="Choose account action"
        >
            <button
                id="sign-in-mode-button"
                class="mode-button active"
                type="button"
                aria-pressed="true"
            >
                Sign In
            </button>

            <button
                id="sign-up-mode-button"
                class="mode-button"
                type="button"
                aria-pressed="false"
            >
                Create Account
            </button>
        </div>

        <section class="provider-login" aria-label="Sign in providers"><button id="twitch-auth-button" class="primary-button twitch-button" type="button">💜 Continue with Twitch</button><div class="provider-divider"><span>or continue with email</span></div></section><form id="auth-form">
            <div class="form-group">
                <label for="email">
                    Email Address
                </label>

                <input
                    id="email"
                    name="email"
                    type="email"
                    autocomplete="email"
                    inputmode="email"
                    required
                >
            </div>

            <div class="form-group">
                <label for="password">
                    Password
                </label>

                <div class="password-wrapper">
                    <input
                        id="password"
                        name="password"
                        type="password"
                        autocomplete="current-password"
                        minlength="8"
                        required
                    >

                    <button
                        id="show-password-button"
                        class="show-password"
                        type="button"
                        aria-controls="password"
                        aria-pressed="false"
                    >
                        Show
                    </button>
                </div>
            </div>

            <div
                id="confirm-password-group"
                class="form-group hidden"
            >
                <label for="confirm-password">
                    Confirm Password
                </label>

                <div class="password-wrapper">
                    <input
                        id="confirm-password"
                        name="confirm-password"
                        type="password"
                        autocomplete="new-password"
                        minlength="8"
                    >

                    <button
                        id="show-confirm-password-button"
                        class="show-password"
                        type="button"
                        aria-controls="confirm-password"
                        aria-pressed="false"
                    >
                        Show
                    </button>
                </div>
            </div>

            <button
                id="submit-button"
                class="primary-button"
                type="submit"
            >
                Sign In
            </button>
        </form>

        <p
            id="auth-status"
            class="status-message"
            role="status"
            aria-live="polite"
        ></p>

        <a
            class="back-link"
            href="./binder.html"
        >
            Return to the Binder
        </a>
    </main>

    <script type="module" src="js/pages/login-page.js?v=1.0"></script>
    <script src="js/shared-ui.js?v=1.5.0"></script>
<script src="js/qol-ui.js?v=92.0.2" defer></script>
</body>
</html>
