<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Wishlist & Trades | Starlight Card Binder</title><link rel="stylesheet" href="css/style.css"><link rel="stylesheet" href="css/app-shell.css"><style>
.trade-page{padding:22px;max-width:1200px;margin:auto}.trade-head,.trade-panel{background:rgba(255,255,255,.95);border:2px solid rgba(107,198,248,.42);border-radius:24px;padding:24px;box-shadow:0 18px 45px rgba(61,83,132,.12)}.trade-head h1{margin:.2rem 0;color:#405fa1;font-size:clamp(2rem,5vw,3.5rem)}.trade-tabs{display:flex;flex-wrap:wrap;gap:10px;margin:20px 0}.trade-tabs button{border:0;border-radius:999px;padding:11px 18px;font:inherit;font-weight:900;background:#fff;color:#405fa1;box-shadow:0 7px 18px rgba(61,83,132,.1);cursor:pointer}.trade-tabs button.active{background:linear-gradient(135deg,#6bc6f8,#ff82c8);color:#fff}.trade-tools{display:flex;flex-wrap:wrap;gap:12px;align-items:center;margin-bottom:18px}.trade-tools input[type=search]{flex:1;min-width:220px;padding:12px 15px;border:2px solid rgba(107,198,248,.35);border-radius:999px}.trade-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:16px}.trade-card{background:#fff;border:1px solid rgba(255,130,200,.3);border-radius:18px;padding:13px;text-align:center;box-shadow:0 10px 24px rgba(61,83,132,.1)}.trade-card img{width:100%;aspect-ratio:5/7;object-fit:cover;border-radius:12px}.trade-card h3{font-size:1rem;color:#405fa1;margin:10px 0 4px}.trade-card p{margin:4px 0;color:#6b7089;font-size:.88rem}.trade-actions{display:grid;gap:8px;margin-top:10px}.trade-actions label{display:flex;justify-content:center;align-items:center;gap:7px;font-weight:800;color:#405fa1}.trade-actions select{padding:7px;border-radius:10px;border:1px solid rgba(107,198,248,.45)}.trade-empty{text-align:center;padding:45px 20px;color:#6b7089}.trade-status{text-align:center;min-height:26px;margin-top:14px;font-weight:800;color:#167048}.privacy-toggle{display:flex;gap:8px;align-items:center;font-weight:800;color:#405fa1}@media(max-width:520px){.trade-page{padding:10px}.trade-head,.trade-panel{padding:16px}.trade-grid{grid-template-columns:1fr 1fr;gap:10px}}
</style><script src="js/firefox-performance.js" defer></script>
    <link rel="stylesheet" href="css/shared-ui.css">
</head><body><div class="sky"></div><main class="trade-page"><section class="trade-head"><p class="eyebrow">Collector Connections</p><h1>💫 Wishlist & Trade Binder</h1><p>Mark cards you are searching for and list only your extra copies for future trades. Your permanent first copy is always protected.</p></section><div class="trade-tabs"><button class="active" data-tab="wishlist">♡ Wishlist</button><button data-tab="trade">↔ For Trade</button><button data-tab="all">📚 All Cards</button></div><section class="trade-panel"><div class="trade-tools"><input id="tradeSearch" type="search" placeholder="Search cards..."><label class="privacy-toggle"><input id="publicLists" type="checkbox" checked> Show these lists on my public profile</label></div><div id="tradeGrid" class="trade-grid"></div><p id="tradeStatus" class="trade-status" role="status"></p></section></main><script type="module">
import {getMyTradeLists,setCardTradePreference,setTradeListVisibility} from './js/trade-list-service.js';
const grid=document.querySelector('#tradeGrid'),search=document.querySelector('#tradeSearch'),status=document.querySelector('#tradeStatus'),publicToggle=document.querySelector('#publicLists');let data=[],tab='wishlist';
const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
function filtered(){const q=search.value.trim().toLowerCase();return data.filter(c=>{const match=!q||`${c.cardNumber} ${c.name} ${c.rarity} ${c.seriesName}`.toLowerCase().includes(q);if(!match)return false;if(tab==='wishlist')return c.wishlisted;if(tab==='trade')return c.tradeQuantity>0;return true})}
function render(){const list=filtered();grid.innerHTML=list.length?list.map(c=>`<article class="trade-card"><img src="${esc(c.thumbnailUrl||c.imageUrl)}" alt="${esc(c.name)}"><h3>#${esc(c.cardNumber)} ${esc(c.name)}</h3><p>${esc(c.rarity)} • ${esc(c.seriesName)}</p><p>Owned: ${c.ownedQuantity} • Extras: ${c.duplicateQuantity}</p><div class="trade-actions"><label><input type="checkbox" data-wish="${esc(c.id)}" ${c.wishlisted?'checked':''}> Add to Wishlist</label><label>For Trade <select data-trade="${esc(c.id)}">${Array.from({length:c.duplicateQuantity+1},(_,i)=>`<option value="${i}" ${i===c.tradeQuantity?'selected':''}>${i}</option>`).join('')}</select></label></div></article>`).join(''):`<div class="trade-empty"><h2>Nothing here yet</h2><p>${tab==='wishlist'?'Browse All Cards and add the ones you are searching for.':tab==='trade'?'Only duplicate copies can be offered for trade.':'No cards matched your search.'}</p></div>`}
async function save(id){const c=data.find(x=>x.id===id);if(!c)return;status.textContent='Saving…';try{const result=await setCardTradePreference(id,c.wishlisted,c.tradeQuantity);c.tradeQuantity=result.tradeQuantity;status.textContent='Trade lists saved ✨';render()}catch(e){status.textContent=e.message||'Could not save.'}}
document.addEventListener('change',e=>{if(e.target.matches('[data-wish]')){const c=data.find(x=>x.id===e.target.dataset.wish);c.wishlisted=e.target.checked;save(c.id)}if(e.target.matches('[data-trade]')){const c=data.find(x=>x.id===e.target.dataset.trade);c.tradeQuantity=Number(e.target.value);save(c.id)}});document.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>{tab=b.dataset.tab;document.querySelectorAll('[data-tab]').forEach(x=>x.classList.toggle('active',x===b));render()});search.oninput=render;publicToggle.onchange=async()=>{try{await setTradeListVisibility(publicToggle.checked);status.textContent='Profile visibility updated.'}catch(e){status.textContent=e.message}};
try{const result=await getMyTradeLists();data=result.cards||[];publicToggle.checked=result.publicLists!==false;render();status.textContent='Wishlist and trade binder loaded.'}catch(e){status.textContent=e.message||'Please sign in.'}
</script>    <script src="js/shared-ui.js"></script>
</body></html>
