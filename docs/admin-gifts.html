<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Send Gifts | Starlight Cards</title><link rel="stylesheet" href="css/style.css?v=1.0.0"><link rel="stylesheet" href="css/shared-ui.css?v=1.1.0"><link rel="stylesheet" href="css/pages/admin-gifts.css?v=1.0"><link rel="stylesheet" href="css/qol-ui.css?v=94.2.0">
</head><body><script type="module" src="js/embed-mode.js"></script><main class="page"><section class="hero"><p class="eyebrow">Administration Hub</p><h1>🎁 Send Gifts</h1><p>Send claimable Star Bits, cards, or booster packs to any registered Starlight collector.</p><div class="tabs"><button class="tab active" data-tab="send">Send a Gift</button><button class="tab" data-tab="history">Gift History</button></div></section><section class="panel"><p id="status" class="status"></p><div class="view active" data-view="send"><div class="grid"><label>Registered Collector<select id="recipient"><option value="">Loading registered users…</option></select></label><label>Gift Type<select id="rewardType"><option value="star_bits">Star Bits</option><option value="single_card">Single Card</option><option value="booster">Booster Pack</option></select></label><label class="full">Gift Title<input id="giftTitle" value="A gift from the Starlight team"></label><label class="full">Message<textarea id="giftMessage">A special gift is ready for you.</textarea></label></div><div class="conditional active" data-reward="star_bits"><label>Star Bits Amount<input id="bits" type="number" min="1" value="100"></label></div><div class="conditional" data-reward="single_card"><label>Search Cards<input id="cardSearch" type="search" placeholder="Search number, name, rarity, or series"></label><input id="cardId" type="hidden"><div id="cardResults" class="card-results"></div><label>Quantity<input id="cardQty" type="number" min="1" value="1"></label></div><div class="conditional" data-reward="booster"><label>Booster Pack<select id="booster"><option value="">Select a booster…</option></select></label></div><div id="preview" class="preview"></div><div class="actions"><button class="btn" id="send">🎁 Send Gift</button><button class="btn secondary" id="reset">Reset</button></div></div><div class="view" data-view="history"><div id="history" class="history"></div></div></section></main><div id="receipt" class="receipt" hidden aria-hidden="true"><div class="receipt-card" role="dialog" aria-modal="true" aria-labelledby="receiptTitle" tabindex="-1"><p class="eyebrow">Gift Sent</p><h2 id="receiptTitle">✓ Delivery confirmed</h2><div id="receiptBody"></div><div class="actions"><button class="btn" id="closeReceipt" type="button" data-st-modal-close>Done</button></div></div></div><script type="module" src="js/pages/admin-gifts-page.js?v=1.0"></script><script src="js/shared-ui.js?v=1.1.0"></script><script src="js/qol-ui.js?v=92.0.2" defer></script>
</body></html>
