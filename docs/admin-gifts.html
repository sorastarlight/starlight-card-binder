<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Send Gifts | Starlight Cards</title><link rel="stylesheet" href="css/style.css"><link rel="stylesheet" href="css/shared-ui.css"><style>
body{min-height:100vh}.page{width:min(1180px,100%);margin:auto;padding:24px 16px 60px}.hero,.panel{background:rgba(255,255,255,.97);border:2px solid rgba(107,198,248,.4);border-radius:26px;box-shadow:0 18px 48px rgba(61,83,132,.13)}.hero{padding:28px;background:linear-gradient(135deg,#fff7fc,#f4fbff,#fff8da);margin-bottom:18px}.hero h1,.panel h2{color:#405fa1;margin:.15rem 0}.tabs{display:flex;gap:9px;margin-top:18px}.tab{border:0;border-radius:999px;padding:10px 18px;font-weight:900;background:#edf7ff;color:#405fa1}.tab.active{color:#fff;background:linear-gradient(135deg,#ff82c8,#75c9f7)}.panel{padding:24px}.view{display:none}.view.active{display:block}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}.full{grid-column:1/-1}label{display:grid;gap:7px;color:#405fa1;font-weight:850}input,select,textarea{width:100%;box-sizing:border-box;padding:12px 14px;border:2px solid rgba(107,198,248,.32);border-radius:14px;background:#fff;font:inherit}textarea{min-height:100px}.conditional{display:none}.conditional.active{display:block}.card-results{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:10px;max-height:330px;overflow:auto;padding:10px;border:1px solid rgba(107,198,248,.25);border-radius:16px}.card-choice{border:2px solid transparent;border-radius:14px;background:#f7fbff;padding:9px;text-align:left;cursor:pointer}.card-choice.selected{border-color:#ff82c8;background:#fff2fa}.card-choice img{width:100%;aspect-ratio:2/3;object-fit:contain}.preview{margin:18px 0;padding:16px;border-radius:17px;background:linear-gradient(135deg,#fff2fa,#eef9ff);color:#405fa1}.actions{display:flex;gap:10px;flex-wrap:wrap}.btn{border:0;border-radius:999px;padding:11px 18px;font-weight:900;cursor:pointer;background:linear-gradient(135deg,#ff82c8,#75c9f7);color:#fff}.btn.secondary{background:#edf7ff;color:#405fa1}.history{display:grid;gap:12px}.history-card{padding:16px;border:1px solid rgba(107,198,248,.3);border-radius:17px;background:#fff}.receipt{position:fixed;inset:0;display:grid;place-items:center;background:rgba(35,43,74,.48);z-index:9999}.receipt[hidden]{display:none}.receipt-card{width:min(520px,calc(100% - 32px));padding:28px;border-radius:25px;background:#fff;box-shadow:0 28px 90px rgba(20,28,60,.3)}@media(max-width:720px){.grid{grid-template-columns:1fr}.full{grid-column:auto}}
</style></head><body><script type="module" src="js/embed-mode.js"></script><main class="page"><section class="hero"><p class="eyebrow">Administration Hub</p><h1>🎁 Send Gifts</h1><p>Send claimable Star Bits, cards, or booster packs to any registered Starlight collector.</p><div class="tabs"><button class="tab active" data-tab="send">Send a Gift</button><button class="tab" data-tab="history">Gift History</button></div></section><section class="panel"><p id="status" class="status"></p><div class="view active" data-view="send"><div class="grid"><label>Registered Collector<select id="recipient"><option value="">Loading registered users…</option></select></label><label>Gift Type<select id="rewardType"><option value="star_bits">Star Bits</option><option value="single_card">Single Card</option><option value="booster">Booster Pack</option></select></label><label class="full">Gift Title<input id="giftTitle" value="A gift from the Starlight team"></label><label class="full">Message<textarea id="giftMessage">A special gift is ready for you.</textarea></label></div><div class="conditional active" data-reward="star_bits"><label>Star Bits Amount<input id="bits" type="number" min="1" value="100"></label></div><div class="conditional" data-reward="single_card"><label>Search Cards<input id="cardSearch" type="search" placeholder="Search number, name, rarity, or series"></label><input id="cardId" type="hidden"><div id="cardResults" class="card-results"></div><label>Quantity<input id="cardQty" type="number" min="1" value="1"></label></div><div class="conditional" data-reward="booster"><label>Booster Pack<select id="booster"><option value="">Select a booster…</option></select></label></div><div id="preview" class="preview"></div><div class="actions"><button class="btn" id="send">🎁 Send Gift</button><button class="btn secondary" id="reset">Reset</button></div></div><div class="view" data-view="history"><div id="history" class="history"></div></div></section></main><div id="receipt" class="receipt" hidden><div class="receipt-card"><p class="eyebrow">Gift Sent</p><h2>✓ Delivery confirmed</h2><div id="receiptBody"></div><div class="actions"><button class="btn" id="closeReceipt">Done</button></div></div></div><script type="module">
import{listUserDirectory}from'./js/user-directory-service.js';import{sendAdminGift,getAdminGiftHistory}from'./js/gift-service.js';import{supabase}from'./js/supabase-client.js';
const $=id=>document.getElementById(id),esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));let cards=[],selectedCard=null,boosters=[];
function setType(){document.querySelectorAll('[data-reward]').forEach(x=>x.classList.toggle('active',x.dataset.reward===$('rewardType').value));preview()}
function preview(){const user=$('recipient').selectedOptions[0]?.textContent||'Choose a collector';let reward='';if($('rewardType').value==='star_bits')reward=`${Number($('bits').value||0).toLocaleString()} Star Bits`;if($('rewardType').value==='single_card')reward=selectedCard?`${$('cardQty').value||1} × ${selectedCard.name}`:'Choose a card';if($('rewardType').value==='booster')reward=$('booster').selectedOptions[0]?.textContent||'Choose a booster';$('preview').innerHTML=`<strong>Gift Preview</strong><br>${esc(user)} → ${esc(reward)}`}
function renderCards(){const q=$('cardSearch').value.trim().toLowerCase();const rows=cards.filter(c=>!q||`${c.card_number} ${c.name} ${c.rarity} ${c.series_name||''}`.toLowerCase().includes(q)).slice(0,80);$('cardResults').innerHTML=rows.map(c=>`<button class="card-choice ${selectedCard?.id===c.id?'selected':''}" data-id="${esc(c.id)}"><img src="${esc(c.thumbnail_url||c.image_url||'')}" alt=""><strong>#${esc(c.card_number)} ${esc(c.name)}</strong><small>${esc(c.rarity||'')}</small></button>`).join('')||'<p>No matching cards.</p>';document.querySelectorAll('.card-choice').forEach(b=>b.onclick=()=>{selectedCard=cards.find(c=>c.id===b.dataset.id);$('cardId').value=selectedCard?.id||'';renderCards();preview()})}
async function load(){try{const [usersRes,cardsRes,boostersRes]=await Promise.all([listUserDirectory('',1000),supabase.from('cards').select('id,card_number,name,rarity,image_url,thumbnail_url,series_id').eq('is_visible',true).order('sort_order'),supabase.from('booster_types').select('id,name,is_active,archived_at').eq('is_active',true).is('archived_at',null).order('name')]);$('recipient').innerHTML='<option value="">Select a registered collector…</option>'+usersRes.map(u=>`<option value="${esc(u.userId||u.id)}">${esc(u.displayName||u.username||u.email)}${u.username?` (@${esc(u.username)})`:''}</option>`).join('');cards=cardsRes.data||[];boosters=boostersRes.data||[];$('booster').innerHTML='<option value="">Select a booster…</option>'+boosters.map(b=>`<option value="${esc(b.id)}">${esc(b.name)}</option>`).join('');renderCards();preview()}catch(e){$('status').textContent=e.message}}
async function loadHistory(){try{const rows=await getAdminGiftHistory();$('history').innerHTML=rows.map(r=>`<article class="history-card"><strong>${esc(r.title)}</strong><p>${esc(r.recipient)} · ${esc(r.rewardType.replaceAll('_',' '))}</p><small>${esc(r.status)} · ${new Date(r.createdAt).toLocaleString()}</small></article>`).join('')||'<p>No gifts sent yet.</p>'}catch(e){$('history').textContent=e.message}}
$('rewardType').onchange=setType;['recipient','bits','cardQty','booster'].forEach(id=>$(id).addEventListener('input',preview));$('cardSearch').oninput=renderCards;$('send').onclick=async()=>{try{$('send').disabled=true;const out=await sendAdminGift({userId:$('recipient').value,title:$('giftTitle').value,message:$('giftMessage').value,rewardType:$('rewardType').value,starBitsAmount:$('rewardType').value==='star_bits'?$('bits').value:'',cardId:$('rewardType').value==='single_card'?$('cardId').value:'',cardQuantity:$('rewardType').value==='single_card'?$('cardQty').value:'',boosterId:$('rewardType').value==='booster'?$('booster').value:''});$('receiptBody').innerHTML=`<p><strong>Recipient:</strong> ${esc(out.recipientLabel)}</p><p><strong>Status:</strong> Pending claim</p><p><strong>Gift ID:</strong> ${esc(out.giftId)}</p>`;$('receipt').hidden=false;window.StarlightUI?.toast?.(`Gift sent to ${out.recipientLabel}.`,'success');await loadHistory()}catch(e){$('status').textContent=e.message;window.StarlightUI?.toast?.(e.message,'error')}finally{$('send').disabled=false}};$('closeReceipt').onclick=()=>$('receipt').hidden=true;$('reset').onclick=()=>location.reload();document.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>{document.querySelectorAll('[data-tab]').forEach(x=>x.classList.toggle('active',x===b));document.querySelectorAll('[data-view]').forEach(x=>x.classList.toggle('active',x.dataset.view===b.dataset.tab));if(b.dataset.tab==='history')loadHistory()});load();
</script><script src="js/shared-ui.js"></script></body></html>
