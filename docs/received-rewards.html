<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Received Rewards | Starlight Cards</title><link rel="stylesheet" href="css/style.css"><link rel="stylesheet" href="css/shared-ui.css"><style>
body{min-height:100vh}.page{width:min(1180px,100%);margin:auto;padding:24px 16px 60px}.hero,.panel{background:rgba(255,255,255,.96);border:2px solid rgba(107,198,248,.38);border-radius:26px;box-shadow:0 18px 48px rgba(61,83,132,.13)}.hero{padding:28px;margin-bottom:18px;background:linear-gradient(135deg,#fff7fc,#f4fbff,#fff8da)}.hero h1{color:#405fa1;margin:.15rem 0}.hero p{color:#697591}.tabs{display:flex;gap:9px;flex-wrap:wrap;margin-top:18px}.tab{border:0;border-radius:999px;padding:10px 17px;font-weight:900;background:#edf7ff;color:#405fa1}.tab.active{color:#fff;background:linear-gradient(135deg,#ff82c8,#75c9f7)}.panel{padding:20px}.rewards{display:grid;gap:14px}.reward{display:grid;grid-template-columns:auto 1fr auto;gap:16px;align-items:center;padding:18px;border:1px solid rgba(255,130,200,.28);border-radius:20px;background:linear-gradient(145deg,#fff,#f8fbff)}.icon{width:58px;height:58px;border-radius:18px;display:grid;place-items:center;font-size:1.8rem;background:linear-gradient(135deg,#ffe2f2,#dff4ff)}.reward h2{margin:0;color:#405fa1;font-size:1.18rem}.meta{color:#75809a;font-size:.88rem;margin-top:5px}.desc{color:#596683;margin:.45rem 0 0}.actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}.btn{border:0;border-radius:999px;padding:10px 16px;font-weight:900;cursor:pointer}.claim{background:linear-gradient(135deg,#ff82c8,#75c9f7);color:#fff}.secondary{background:#edf7ff;color:#405fa1}.empty{text-align:center;padding:50px 20px;color:#73809b}.status{min-height:24px;font-weight:800;color:#b4233f}.reward.claimed{opacity:.76}.preview{margin-top:8px;display:flex;gap:8px;flex-wrap:wrap}.chip{padding:5px 9px;border-radius:999px;background:#f4eefe;color:#65559b;font-size:.8rem;font-weight:850}@media(max-width:720px){.reward{grid-template-columns:auto 1fr}.actions{grid-column:1/-1;justify-content:flex-start}}
</style><script src="js/firefox-performance.js" defer></script></head><body><script type="module" src="js/embed-mode.js"></script><main class="page"><section class="hero"><p class="eyebrow">Your Starlight Mailbox</p><h1>🎁 Received Rewards</h1><p>Open gifts from Twitch redeems, reward codes, staff, events, and special promotions whenever you are ready.</p><div class="tabs"><button class="tab active" data-filter="pending">Ready to Claim</button><button class="tab" data-filter="claimed">Claimed</button><button class="tab" data-filter="all">All Rewards</button></div></section><section class="panel"><p id="status" class="status"></p><div id="list" class="rewards"></div></section></main><script type="module">
import{getReceivedRewards,claimReceivedReward,dismissReceivedReward}from'./js/received-rewards-service.js';import{revealRewardSequence}from'./js/reward-reveal.js';
const list=document.getElementById('list'),status=document.getElementById('status');let rewards=[],filter='pending';const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function label(r){const p=r.rewardPayload||{};if(r.rewardType==='star_bits')return `★ ${Number(p.amount||0).toLocaleString()} Star Bits`;if(r.rewardType==='single_card')return `${p.quantity||1} card`;if(r.rewardType==='booster')return 'Booster Pack';return 'Card Bundle';}
function render(){const rows=rewards.filter(r=>filter==='all'||r.status===filter);list.innerHTML=rows.map(r=>`<article class="reward ${esc(r.status)}"><div class="icon">${r.sourceType==='twitch'?'📺':r.sourceType==='reward_code'?'🎟️':'🎁'}</div><div><h2>${esc(r.title)}</h2><div class="preview"><span class="chip">${esc(label(r))}</span><span class="chip">${esc(r.sourceType.replaceAll('_',' '))}</span></div><p class="desc">${esc(r.message||'A Starlight reward is waiting for you.')}</p><div class="meta">Received ${new Date(r.createdAt).toLocaleString()}${r.claimedAt?` · Claimed ${new Date(r.claimedAt).toLocaleString()}`:''}</div></div><div class="actions">${r.status==='pending'?`<button class="btn claim" data-claim="${r.id}">Open Reward</button>`:`<button class="btn secondary" data-dismiss="${r.id}">Remove</button>`}</div></article>`).join('')||'<div class="empty"><h2>No rewards here right now ✨</h2><p>Twitch redeems, codes, and gifts will appear here.</p></div>';document.querySelectorAll('[data-claim]').forEach(b=>b.onclick=()=>claim(b.dataset.claim));document.querySelectorAll('[data-dismiss]').forEach(b=>b.onclick=async()=>{await dismissReceivedReward(b.dataset.dismiss);await load()});}
async function claim(id){try{status.textContent='Opening your reward…';const out=await claimReceivedReward(id);const cards=out?.snapshot?.cards||out?.snapshot?.result?.cards||[];if(Array.isArray(cards)&&cards.length)await revealRewardSequence(cards);status.textContent='Reward claimed successfully!';await load()}catch(e){status.textContent=e.message||'Unable to claim reward.'}}
async function load(){try{const out=await getReceivedRewards(null);rewards=out.rewards||[];render();status.textContent=''}catch(e){status.textContent=e.message||'Unable to load received rewards.'}}
document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));b.classList.add('active');filter=b.dataset.filter;render()});load();
</script><script src="js/shared-ui.js"></script></body></html>
