<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Received Gifts | Starlight Cards</title><link rel="stylesheet" href="css/style.css"><link rel="stylesheet" href="css/shared-ui.css"><style>
body{min-height:100vh}.page{width:min(1180px,100%);margin:auto;padding:24px 16px 60px}.hero,.panel{background:rgba(255,255,255,.96);border:2px solid rgba(107,198,248,.38);border-radius:26px;box-shadow:0 18px 48px rgba(61,83,132,.13)}.hero{padding:28px;margin-bottom:18px;background:linear-gradient(135deg,#fff7fc,#f4fbff,#fff8da)}.hero h1{color:#405fa1;margin:.15rem 0}.hero p{color:#697591}.tabs{display:flex;gap:9px;flex-wrap:wrap;margin-top:18px}.tab{border:0;border-radius:999px;padding:10px 17px;font-weight:900;background:#edf7ff;color:#405fa1}.tab.active{color:#fff;background:linear-gradient(135deg,#ff82c8,#75c9f7)}.panel{padding:20px}.rewards{display:grid;gap:14px}.reward{display:grid;grid-template-columns:auto 1fr auto;gap:16px;align-items:center;padding:18px;border:1px solid rgba(255,130,200,.28);border-radius:20px;background:linear-gradient(145deg,#fff,#f8fbff)}.icon{width:58px;height:58px;border-radius:18px;display:grid;place-items:center;font-size:1.8rem;background:linear-gradient(135deg,#ffe2f2,#dff4ff)}.reward h2{margin:0;color:#405fa1;font-size:1.18rem}.meta{color:#75809a;font-size:.88rem;margin-top:5px}.desc{color:#596683;margin:.45rem 0 0}.actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}.btn{border:0;border-radius:999px;padding:10px 16px;font-weight:900;cursor:pointer}.claim{background:linear-gradient(135deg,#ff82c8,#75c9f7);color:#fff}.secondary{background:#edf7ff;color:#405fa1}.empty{text-align:center;padding:50px 20px;color:#73809b}.status{min-height:24px;font-weight:800;color:#b4233f}.reward.claimed{opacity:.76}.reward.targeted{outline:4px solid rgba(255,130,200,.55);box-shadow:0 0 0 8px rgba(107,198,248,.16),0 18px 42px rgba(61,83,132,.18);animation:giftPulse 1.2s ease 2}@keyframes giftPulse{50%{transform:scale(1.012)}}.preview{margin-top:8px;display:flex;gap:8px;flex-wrap:wrap}.chip{padding:5px 9px;border-radius:999px;background:#f4eefe;color:#65559b;font-size:.8rem;font-weight:850}@media(max-width:720px){.reward{grid-template-columns:auto 1fr}.actions{grid-column:1/-1;justify-content:flex-start}}
</style><script src="js/firefox-performance.js" defer></script><link rel="stylesheet" href="css/qol-ui.css?v=92.0.2">
</head><body><script type="module" src="js/embed-mode.js"></script><main class="page"><section class="hero"><p class="eyebrow">Your Starlight Mailbox</p><h1>🎁 Received Gifts</h1><p>Open gifts from Twitch redeems, reward codes, staff, events, and special promotions whenever you are ready.</p><div class="tabs"><button class="tab active" data-filter="pending">Ready to Claim</button><button class="tab" data-filter="claimed">Claimed</button><button class="tab" data-filter="all">All Gifts</button></div></section><section class="panel"><p id="status" class="status"></p><div id="list" class="rewards"></div></section></main><script type="module">
import{getReceivedRewards,claimReceivedReward,dismissReceivedReward}from'./js/received-rewards-service.js';import{revealRewardSequence}from'./js/reward-reveal.js?v=93.2';
const list=document.getElementById('list'),status=document.getElementById('status');let rewards=[],filter='pending';const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function label(r){const p=r.rewardPayload||{};if(r.rewardType==='star_bits')return `★ ${Number(p.amount||0).toLocaleString()} Star Bits`;if(r.rewardType==='single_card')return `${p.quantity||1} card${Number(p.quantity||1)===1?'':'s'}`;if(r.rewardType==='booster')return p.boosterName||'Booster Pack';return 'Card Bundle';}
function sourceLabel(r){return ({twitch:'Twitch Redeem',reward_code:'Reward Code',admin_gift:'Starlight Gift',event_reward:'Event Reward'}[r.sourceType]||String(r.sourceType||'Gift').replaceAll('_',' '));}
function render(){const rows=rewards.filter(r=>filter==='all'||r.status===filter);list.innerHTML=rows.map(r=>`<article id="gift-${esc(r.id)}" class="reward ${esc(r.status)}"><div class="icon">${r.sourceType==='twitch'?'📺':r.sourceType==='reward_code'?'🎟️':'🎁'}</div><div><h2>${esc(r.title)}</h2><div class="preview"><span class="chip">${esc(label(r))}</span><span class="chip">${esc(sourceLabel(r))}</span><span class="chip">${r.status==='pending'?'Ready to Open':'Claimed'}</span></div><p class="desc">${esc(r.message||'A Starlight reward is waiting for you.')}</p><div class="meta">Received ${new Date(r.createdAt).toLocaleString()}${r.claimedAt?` · Claimed ${new Date(r.claimedAt).toLocaleString()}`:''}</div></div><div class="actions">${r.status==='pending'?`<button class="btn claim" data-claim="${r.id}">Open Reward</button>`:`<button class="btn secondary" data-dismiss="${r.id}">Remove</button>`}</div></article>`).join('')||'<div class="empty"><h2>No gifts here right now ✨</h2><p>Twitch redeems, codes, and gifts will appear here.</p></div>';document.querySelectorAll('[data-claim]').forEach(b=>b.onclick=()=>claim(b.dataset.claim));document.querySelectorAll('[data-dismiss]').forEach(b=>b.onclick=async()=>{await dismissReceivedReward(b.dataset.dismiss);await load();window.parent?.postMessage({type:'starlight-rewards-changed'},location.origin)});}
async function claim(id){try{status.textContent='Opening your reward…';const reward=rewards.find(item=>String(item.id)===String(id));const out=await claimReceivedReward(id);const snapshot=out?.snapshot?.result||out?.snapshot||{};const payload=reward?.rewardPayload||snapshot?.rewardPayload||{};const cards=snapshot?.cards||[];if(Array.isArray(cards)&&cards.length)await revealRewardSequence(cards,{title:reward?.title||payload.boosterName||'Starlight Gift',packImageUrl:payload.packImageUrl||payload.pack_image_url||snapshot.packImageUrl||snapshot.pack_image_url||'',cardBackUrl:payload.cardBackUrl||payload.card_back_url||snapshot.cardBackUrl||snapshot.card_back_url||undefined});status.textContent='Reward claimed successfully!';await load();window.parent?.postMessage({type:'starlight-rewards-changed'},location.origin)}catch(e){status.textContent=e.message||'Unable to claim reward.'}}
async function load(){try{const out=await getReceivedRewards(null);rewards=out.rewards||[];const target=new URLSearchParams(location.search).get('rewardId')||new URLSearchParams(location.search).get('gift');if(target){filter='all';document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x.dataset.filter==='all'))}render();if(target){requestAnimationFrame(()=>{const el=document.getElementById('gift-'+CSS.escape(target));if(el){el.classList.add('targeted');el.scrollIntoView({behavior:'smooth',block:'center'})}})}status.textContent=''}catch(e){status.textContent=e.message||'Unable to load received rewards.'}}
document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));b.classList.add('active');filter=b.dataset.filter;render()});load();
</script><script src="js/shared-ui.js"></script><script src="js/qol-ui.js?v=92.0.2" defer></script>
</body></html>
