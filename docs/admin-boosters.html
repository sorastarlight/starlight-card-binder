<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Content Studio | Starlight Card Binder</title><link rel="stylesheet" href="css/style.css"><style>
:root{--b:#6bc6f8;--p:#ff82c8;--g:#fed334;--ink:#30406c;--muted:#6d7692}*{box-sizing:border-box}body{min-height:100vh}.studio{width:min(100%,1500px);margin:auto;padding:22px 16px 60px}.shell{padding:26px;border:2px solid rgba(107,198,248,.46);border-radius:26px;background:rgba(255,255,255,.97);box-shadow:0 22px 60px rgba(61,83,132,.16)}h1,h2,h3{color:#405fa1}.lead{color:var(--muted);line-height:1.55}.status{min-height:24px;font-weight:850}.status.error{color:#b4233f}.status.success{color:#167048}.tabs{display:flex;flex-wrap:wrap;gap:9px;margin:22px 0}.tabs button,.btn{border:1px solid rgba(107,198,248,.42);border-radius:999px;padding:10px 16px;background:#fff;color:#405fa1;font-weight:900;cursor:pointer}.tabs button.active,.btn.primary{border-color:transparent;background:linear-gradient(135deg,var(--b),var(--p));color:#fff}.btn.danger{border-color:#f2a7b5;color:#a52c47}.hidden{display:none!important}.top-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px}.metric{padding:18px;border:1px solid rgba(255,130,200,.28);border-radius:18px;background:linear-gradient(145deg,#fff,#f6fbff)}.metric strong{display:block;font-size:2rem;color:#405fa1}.panel{margin-top:16px;padding:20px;border:1px solid rgba(107,198,248,.32);border-radius:20px;background:linear-gradient(145deg,rgba(249,253,255,.98),rgba(255,247,252,.96))}.toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;justify-content:space-between;margin-bottom:14px}.toolbar input,.toolbar select{min-height:42px;padding:9px 12px;border:2px solid rgba(107,198,248,.28);border-radius:11px;font:inherit}.library{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px}.item{padding:15px;border:1px solid rgba(255,130,200,.26);border-radius:17px;background:#fff;box-shadow:0 8px 20px rgba(61,83,132,.08)}.item img{display:block;width:100%;height:170px;object-fit:contain;border-radius:12px;background:linear-gradient(145deg,#f2f9ff,#fff1f8)}.item-meta{display:flex;justify-content:space-between;gap:10px;color:var(--muted);font-size:.85rem}.form-grid{display:grid;grid-template-columns:repeat(2,minmax(220px,1fr));gap:14px}.form-grid .full{grid-column:1/-1}.field label{display:block;margin-bottom:5px;color:#405fa1;font-weight:850}.field input,.field textarea,.field select{width:100%;padding:10px 12px;border:2px solid rgba(107,198,248,.28);border-radius:11px;font:inherit;background:#fff}.field textarea{min-height:100px;resize:vertical}.checks{display:flex;flex-wrap:wrap;gap:14px;align-items:center}.image-editor{display:grid;grid-template-columns:180px 1fr;gap:15px;align-items:start}.image-editor img{width:180px;height:240px;object-fit:contain;border-radius:13px;background:#fff;box-shadow:0 9px 22px rgba(61,83,132,.12)}.upload{display:inline-flex;align-items:center;justify-content:center;width:100%;margin-top:9px;padding:9px;border:1px dashed rgba(64,95,161,.45);border-radius:10px;color:#405fa1;font-weight:900;cursor:pointer}.upload input{display:none}.upload-meta{margin-top:9px;padding:10px;border-radius:10px;background:#f5f9ff;color:#536184;font-size:.82rem;line-height:1.45;overflow-wrap:anywhere}.upload-meta strong{display:block;color:#405fa1}.editor-actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:18px}.btn.archive{border-color:#e9bd58;color:#806000}.asset-url{display:block;margin-top:5px;font-size:.68rem;color:#6d7692;overflow-wrap:anywhere}.editor{position:fixed;inset:0;z-index:5000;display:grid;place-items:center;padding:20px;background:rgba(31,39,75,.62);backdrop-filter:blur(7px)}.editor-card{width:min(100%,1050px);max-height:92vh;overflow:auto;padding:24px;border-radius:24px;background:#fff;box-shadow:0 26px 80px rgba(0,0,0,.3)}.editor-head{display:flex;justify-content:space-between;gap:15px;align-items:center}.close{border:0;background:#edf7ff;border-radius:50%;width:42px;height:42px;font-size:1.2rem;cursor:pointer}.reward-builder{margin-top:16px;padding:16px;border:1px solid rgba(254,211,52,.4);border-radius:16px;background:#fffbed}.reward-row{display:grid;grid-template-columns:minmax(220px,1fr) 100px 100px auto;gap:9px;align-items:end;margin-top:9px}.slot-row{display:grid;grid-template-columns:170px 90px repeat(5,minmax(80px,1fr)) auto;gap:8px;align-items:end;margin-top:10px}.asset-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:12px}.asset{padding:10px;border:1px solid rgba(107,198,248,.25);border-radius:14px;background:#fff}.asset img{width:100%;height:160px;object-fit:contain;border-radius:9px;background:#f7fbff}.asset code{display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:.72rem}.empty{padding:36px;text-align:center;color:var(--muted)}@media(max-width:900px){.top-grid,.form-grid,.image-editor{grid-template-columns:1fr}.form-grid .full{grid-column:auto}.reward-row,.slot-row{grid-template-columns:1fr 1fr}.image-editor img{margin:auto}.editor{padding:8px}.editor-card{padding:17px}}
</style><script src="js/firefox-performance.js" defer></script></head><body><script src="js/embed-mode.js" type="module"></script><div class="sky"></div><main class="studio"><section class="shell"><p class="eyebrow">Administration Hub</p><h1>Starlight Content Studio</h1><p class="lead">Manage series, cards, booster packs, reward pools, and uploaded artwork from one organized workspace.</p><p id="status" class="status">Loading Content Studio…</p><div id="app" class="hidden"><div class="top-grid" id="metrics"></div><div class="tabs"><button class="active" data-tab="overview">Overview</button><button data-tab="series">Series</button><button data-tab="cards">Cards</button><button data-tab="boosters">Booster Packs</button><button data-tab="assets">Asset Library</button></div><section id="overviewTab"></section><section id="seriesTab" class="hidden"></section><section id="cardsTab" class="hidden"></section><section id="boostersTab" class="hidden"></section><section id="assetsTab" class="hidden"></section></div></section></main><div id="editor" class="editor hidden" role="dialog" aria-modal="true"><section class="editor-card"><div class="editor-head"><h2 id="editorTitle">Editor</h2><button id="closeEditor" class="close" aria-label="Close">×</button></div><div id="editorBody"></div></section></div>
<script type="module">
import{loadContentStudio,saveSeries,saveCard,saveBooster,deleteSeries,deleteCard,deleteBooster,setDailyMode,uploadStudioAsset,listStudioAssets,deleteStudioAsset,storagePathFromUrl,saveBoosterSlot,refreshPublicCardCatalog}from'./js/content-studio-service.js';
const $=s=>document.querySelector(s), status=$('#status'),app=$('#app'),editor=$('#editor'),body=$('#editorBody');let data={series:[],cards:[],boosters:[],dailyMode:'daily'},assets=[];
const esc=v=>String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
function say(t,type=''){status.textContent=t;status.className=`status ${type}`}
function openEditor(title,html){$('#editorTitle').textContent=title;body.innerHTML=html;editor.classList.remove('hidden');document.body.style.overflow='hidden'}function close(){editor.classList.add('hidden');document.body.style.overflow=''}$('#closeEditor').onclick=close;editor.onclick=e=>{if(e.target===editor)close()};
function options(items,value,label=x=>x.name){return items.map(x=>`<option value="${esc(x.id)}" ${x.id===value?'selected':''}>${esc(label(x))}</option>`).join('')}
function metrics(){return `<div class="metric"><strong>${data.series.length}</strong>Series</div><div class="metric"><strong>${data.cards.length}</strong>Cards</div><div class="metric"><strong>${data.boosters.filter(x=>!x.archived).length}</strong>Booster Packs</div><div class="metric"><strong>${assets.length}</strong>Managed Assets</div>`}
function overview(){return `<section class="panel"><div class="toolbar"><div><h2>Free Daily Booster</h2><p class="lead">Control whether collectors receive one pack daily, unlimited packs, or no free packs.</p></div><div><select id="dailyMode"><option value="daily">Daily</option><option value="unlimited">Unlimited</option><option value="disabled">Disabled</option></select> <button id="saveDaily" class="btn primary">Save Availability</button></div></div></section><section class="panel"><div class="toolbar"><div><h2>Live Card Catalog</h2><p class="lead">Supabase is now the source of truth for card names, descriptions, rarities, artwork, thumbnails, artists, and series details. Card and series edits automatically refresh the public site.</p></div><button id="refreshCatalog" class="btn">↻ Refresh Site Catalog</button></div></section><section class="panel"><h2>Quick Start</h2><div class="library"><button class="item" data-new="series"><h3>＋ New Series</h3><p>Create a set before assigning cards.</p></button><button class="item" data-new="card"><h3>＋ New Card</h3><p>Upload artwork and assign it to a series.</p></button><button class="item" data-new="booster"><h3>＋ New Booster Pack</h3><p>Choose slots, a series, exact cards, or a custom pool.</p></button></div></section>`}
function seriesView(){return `<section class="panel"><div class="toolbar"><div><h2>Card Series</h2><p class="lead">Organize cards into clean collectible sets.</p></div><button class="btn primary" data-new="series">＋ Add Series</button></div><div class="library">${data.series.map(s=>`<article class="item"><img src="${esc(s.boosterImageUrl||'site_assets/series01_rising_star_booster.png')}" alt=""><h3>${esc(s.name)}</h3><div class="item-meta"><span>${esc(s.id)}</span><span>${s.cardCount||0} cards</span></div><p>${esc(s.description||'No description')}</p><button class="btn" data-edit-series="${esc(s.id)}">Edit Series</button></article>`).join('')||'<div class="empty">No series yet.</div>'}</div></section>`}
function cardsView(){return `<section class="panel"><div class="toolbar"><div><h2>Card Catalog</h2><p class="lead">Search, edit, upload, and reassign cards.</p></div><div><input id="cardSearch" type="search" placeholder="Search cards…"> <select id="cardSeriesFilter"><option value="">All series</option>${options(data.series,'')}</select> <button class="btn primary" data-new="card">＋ Add Card</button></div></div><div id="cardLibrary" class="library"></div></section>`}
function renderCardLibrary(){const q=($('#cardSearch')?.value||'').toLowerCase(),sid=$('#cardSeriesFilter')?.value||'';$('#cardLibrary').innerHTML=data.cards.filter(c=>(!sid||c.seriesId===sid)&&(!q||`${c.name} ${c.cardNumber} ${c.id}`.toLowerCase().includes(q))).map(c=>`<article class="item"><img src="${esc(c.thumbnailUrl||c.imageUrl)}" alt=""><h3>#${esc(c.cardNumber)} ${esc(c.name)}</h3><div class="item-meta"><span>${esc(c.rarity)}</span><span>${esc(data.series.find(s=>s.id===c.seriesId)?.name||c.seriesId)}</span></div><p>${c.isPullable?'Pullable':'Not pullable'} · Weight ${c.pullWeight}</p><button class="btn" data-edit-card="${esc(c.id)}">Edit Card</button></article>`).join('')||'<div class="empty">No matching cards.</div>'}
function boostersView(){return `<section class="panel"><div class="toolbar"><div><h2>Booster Packs</h2><p class="lead">Build exactly what each pack opens.</p></div><button class="btn primary" data-new="booster">＋ Create Booster</button></div><div class="library">${data.boosters.filter(b=>!b.archived).map(b=>`<article class="item"><img src="${esc(b.packImageUrl||'site_assets/series01_rising_star_booster.png')}" alt=""><h3>${esc(b.name)}</h3><div class="item-meta"><span>${esc(b.rewardMode)}</span><span>${b.starBitsCost} ✦</span></div><p>${esc(b.description||'No description')}</p><button class="btn" data-edit-booster="${esc(b.id)}">Configure Pack</button></article>`).join('')||'<div class="empty">No boosters yet.</div>'}</div></section>`}
function assetsView(){return `<section class="panel"><div class="toolbar"><div><h2>Asset Library</h2><p class="lead">Artwork uploaded through the Content Studio.</p></div><label class="btn primary">Upload Artwork<input id="assetUpload" type="file" accept="image/*" hidden></label></div><div class="asset-grid">${assets.map(a=>`<article class="asset"><img src="${esc(a.url)}" alt=""><strong>${esc(a.folder)}</strong><code title="${esc(a.path)}">${esc(a.name)}</code><button class="btn danger" data-delete-asset="${esc(a.path)}">Delete</button></article>`).join('')||'<div class="empty">No uploaded assets yet.</div>'}</div></section>`}
function render(){ $('#metrics').innerHTML=metrics();$('#overviewTab').innerHTML=overview();$('#seriesTab').innerHTML=seriesView();$('#cardsTab').innerHTML=cardsView();$('#boostersTab').innerHTML=boostersView();$('#assetsTab').innerHTML=assetsView();$('#dailyMode').value=data.dailyMode||'daily';renderCardLibrary();wire();}
function imageBlock(prefix,url,folder,label){const path=storagePathFromUrl(url),name=path?path.split('/').pop():(url?url.split('/').pop():'No image selected');return `<div class="image-editor"><img id="${prefix}Preview" src="${esc(url||'site_assets/StarlightCard_Back_NewLogo.png')}" alt=""><div class="field"><label>${label} URL</label><input id="${prefix}Url" value="${esc(url||'')}"><label class="upload">Browse & Upload ${label}<input id="${prefix}File" type="file" accept="image/*"></label><div class="upload-meta" id="${prefix}Meta"><strong>${esc(name)}</strong>${path?`Supabase Storage: ${esc(path)}<br><span class="asset-url">${esc(url)}</span>`:'Bundled site asset or external URL. Upload a replacement to store it in Supabase.'}</div><button class="btn danger" type="button" id="${prefix}Delete" ${path?'':'disabled'}>Delete Uploaded Image</button></div></div>`}
function seriesEditor(s={}){openEditor(s.id?'Edit Series':'Create Series',`<div class="form-grid"><div class="field"><label>Series ID</label><input id="eSeriesId" value="${esc(s.id||'')}" ${s.id?'readonly':''}></div><div class="field"><label>Series Name</label><input id="eSeriesName" value="${esc(s.name||'')}"></div><div class="field full"><label>Description</label><textarea id="eSeriesDescription">${esc(s.description||'')}</textarea></div><div class="field"><label>Sort Order</label><input id="eSeriesSort" type="number" value="${s.sortOrder||0}"></div><div class="checks"><label><input id="eSeriesVisible" type="checkbox" ${s.isVisible!==false?'checked':''}> Visible</label></div><div class="full">${imageBlock('eSeriesImage',s.boosterImageUrl||'site_assets/series01_rising_star_booster.png','series','Series Artwork')}</div></div><div class="editor-actions"><button id="saveSeries" class="btn primary">Save Series</button>${s.id?'<button id="hideSeries" class="btn archive">Hide Series</button><button id="deleteSeries" class="btn danger">Delete Series</button>':''}</div>`);wireUpload('eSeriesImage','series');$('#saveSeries').onclick=async()=>{try{await saveSeries({id:$('#eSeriesId').value,name:$('#eSeriesName').value,description:$('#eSeriesDescription').value,boosterImageUrl:$('#eSeriesImageUrl').value,sortOrder:Number($('#eSeriesSort').value),isVisible:$('#eSeriesVisible').checked});await reload('Series saved. The live site catalog has been refreshed.')}catch(e){say(e.message,'error')}};if(s.id){$('#hideSeries').onclick=async()=>{try{$('#eSeriesVisible').checked=false;$('#saveSeries').click()}catch(e){say(e.message,'error')}};$('#deleteSeries').onclick=async()=>{if(!confirm('Permanently delete this empty series? This cannot be undone.'))return;try{await deleteSeries(s.id);await reload('Series deleted. The live site catalog has been refreshed.')}catch(e){say(e.message,'error')}}}}
function cardEditor(c={}){openEditor(c.id?'Edit Card':'Add New Card',`<div class="form-grid"><div class="field"><label>Card ID</label><input id="eCardId" value="${esc(c.id||'')}" ${c.id?'readonly':''}></div><div class="field"><label>Series</label><select id="eCardSeries">${options(data.series,c.seriesId)}</select></div><div class="field"><label>Card Number</label><input id="eCardNumber" value="${esc(c.cardNumber||'')}"></div><div class="field"><label>Name</label><input id="eCardName" value="${esc(c.name||'')}"></div><div class="field"><label>Rarity</label><select id="eCardRarity">${['Common','Uncommon','Rare','Epic','Legendary'].map(r=>`<option ${r===c.rarity?'selected':''}>${r}</option>`).join('')}</select></div><div class="field"><label>Artist</label><input id="eCardArtist" value="${esc(c.artist||'')}"></div><div class="field full"><label>Description</label><textarea id="eCardDescription">${esc(c.description||'')}</textarea></div><div class="field"><label>Pull Weight</label><input id="eCardWeight" type="number" min="0" step=".01" value="${c.pullWeight??1}"></div><div class="field"><label>Sort Order</label><input id="eCardSort" type="number" value="${c.sortOrder||0}"></div><div class="checks full"><label><input id="eCardVisible" type="checkbox" ${c.isVisible!==false?'checked':''}> Visible</label><label><input id="eCardCollectible" type="checkbox" ${c.isCollectible!==false?'checked':''}> Collectible</label><label><input id="eCardPullable" type="checkbox" ${c.isPullable!==false?'checked':''}> Pullable</label></div><div>${imageBlock('eCardFront',c.imageUrl||'','card-fronts','Card Front')}</div><div>${imageBlock('eCardThumb',c.thumbnailUrl||c.imageUrl||'','thumbnails','Thumbnail')}</div></div><div class="editor-actions"><button id="saveCard" class="btn primary">Save Card</button>${c.id?'<button id="archiveCard" class="btn archive">Archive Card</button><button id="deleteCard" class="btn danger">Delete Card</button>':''}</div>`);wireUpload('eCardFront','card-fronts');wireUpload('eCardThumb','thumbnails');$('#saveCard').onclick=async()=>{try{await saveCard({id:$('#eCardId').value,seriesId:$('#eCardSeries').value,cardNumber:$('#eCardNumber').value,name:$('#eCardName').value,rarity:$('#eCardRarity').value,artist:$('#eCardArtist').value,description:$('#eCardDescription').value,pullWeight:Number($('#eCardWeight').value),sortOrder:Number($('#eCardSort').value),isVisible:$('#eCardVisible').checked,isCollectible:$('#eCardCollectible').checked,isPullable:$('#eCardPullable').checked,imageUrl:$('#eCardFrontUrl').value,thumbnailUrl:$('#eCardThumbUrl').value||$('#eCardFrontUrl').value});await reload('Card saved. The live site catalog has been refreshed.')}catch(e){say(e.message,'error')}};if(c.id){$('#archiveCard').onclick=async()=>{try{$('#eCardVisible').checked=false;$('#eCardCollectible').checked=false;$('#eCardPullable').checked=false;$('#saveCard').click()}catch(e){say(e.message,'error')}};$('#deleteCard').onclick=async()=>{if(!confirm('Permanently delete this unused card? Owned or referenced cards must be archived instead.'))return;try{await deleteCard(c.id);await reload('Card deleted. The live site catalog has been refreshed.')}catch(e){say(e.message,'error')}}}}
function rewardRows(b){return (b.rewardCards||[]).map((r,i)=>rewardRow(r,i)).join('')}
function rewardRow(r={},i=0){return `<div class="reward-row" data-reward-row><div class="field"><label>Card</label><select data-card>${options(data.cards,r.cardId,c=>`#${c.cardNumber} ${c.name}`)}</select></div><div class="field"><label>Quantity</label><input data-qty type="number" min="1" value="${r.quantity||1}"></div><div class="field"><label>Weight</label><input data-weight type="number" min="0" step=".01" value="${r.weight??1}"></div><button class="btn danger" data-remove-reward>Remove</button></div>`}
function slotsHtml(b){return (b.slots||[]).map(s=>`<div class="slot-row" data-slot="${s.id}"><div class="field"><label>${esc(s.name)}</label><input data-slot-name value="${esc(s.name)}" disabled></div><div class="field"><label>Cards</label><input data-slot-qty type="number" min="1" value="${s.quantity}"></div>${['Common','Uncommon','Rare','Epic','Legendary'].map(r=>`<div class="field"><label>${r} %</label><input data-rate="${r}" type="number" min="0" max="100" step=".01" value="${s.rates?.[r]||0}"></div>`).join('')}<button class="btn" data-save-slot>Save Slot</button></div>`).join('')||'<p class="lead">This booster has no rarity slots. Clone a default slot-based booster to begin with the standard slots.</p>'}
function boosterEditor(b={rewardMode:'slots',packImageUrl:'site_assets/series01_rising_star_booster.png',cardBackUrl:'site_assets/StarlightCard_Back_NewLogo.png',cardCount:4,rewardCards:[],slots:[]}){openEditor(b.id?'Configure Booster Pack':'Create Booster Pack',`<div class="form-grid"><div class="field"><label>Booster ID</label><input id="eBoosterId" value="${esc(b.id||'')}" ${b.id?'readonly':''}></div><div class="field"><label>Name</label><input id="eBoosterName" value="${esc(b.name||'')}"></div><div class="field full"><label>Description</label><textarea id="eBoosterDescription">${esc(b.description||'')}</textarea></div><div class="field"><label>Reward Type</label><select id="eRewardMode"><option value="slots">Rarity Slots</option><option value="series">Random Cards From One Series</option><option value="exact">Exact Cards</option><option value="weighted_pool">Weighted Custom Pool</option><option value="single">Single Card</option><option value="mixed">Cards + Star Bits</option></select></div><div class="field"><label>Series (for Series mode)</label><select id="eBoosterSeries"><option value="">Choose series</option>${options(data.series,b.seriesId)}</select></div><div class="field"><label>Number of Random Cards</label><input id="eBoosterCount" type="number" min="1" max="50" value="${b.cardCount||4}"></div><div class="field"><label>Bonus Star Bits</label><input id="eBoosterBits" type="number" min="0" value="${b.bonusStarBits||0}"></div><div class="field"><label>Star Bits Cost</label><input id="eBoosterCost" type="number" min="0" value="${b.starBitsCost||0}"></div><div class="field"><label>Sort Order</label><input id="eBoosterSort" type="number" value="${b.sortOrder||0}"></div><div class="checks full"><label><input id="eBoosterActive" type="checkbox" ${b.isActive?'checked':''}> Active</label><label><input id="eBoosterArchived" type="checkbox" ${b.archived?'checked':''}> Archived</label></div><div>${imageBlock('ePackImage',b.packImageUrl,'booster-packs','Pack Artwork')}</div><div>${imageBlock('eBackImage',b.cardBackUrl,'card-backs','Card Back')}</div></div><div id="slotBuilder" class="reward-builder"><h3>Rarity Slot Configuration</h3>${slotsHtml(b)}</div><div id="rewardBuilder" class="reward-builder"><div class="toolbar"><div><h3>Card Rewards / Custom Pool</h3><p class="lead">Used for exact, single, weighted-pool, and mixed packs.</p></div><button id="addReward" class="btn">＋ Add Card</button></div><div id="rewardRows">${rewardRows(b)}</div></div><div class="editor-actions"><button id="saveBooster" class="btn primary">Save Booster Pack</button>${b.id?'<button id="archiveBooster" class="btn archive">Archive Booster</button><button id="deleteBooster" class="btn danger">Delete Booster</button>':''}</div>`);$('#eRewardMode').value=b.rewardMode||'slots';wireUpload('ePackImage','booster-packs');wireUpload('eBackImage','card-backs');const toggle=()=>{const m=$('#eRewardMode').value;$('#slotBuilder').classList.toggle('hidden',m!=='slots');$('#rewardBuilder').classList.toggle('hidden',!['exact','weighted_pool','single','mixed'].includes(m));$('#eBoosterSeries').disabled=m!=='series';$('#eBoosterCount').disabled=!['series','weighted_pool'].includes(m);$('#eBoosterBits').disabled=m!=='mixed'};$('#eRewardMode').onchange=toggle;toggle();$('#addReward').onclick=()=>$('#rewardRows').insertAdjacentHTML('beforeend',rewardRow({},Date.now()));body.onclick=async e=>{const rem=e.target.closest('[data-remove-reward]');if(rem)rem.closest('[data-reward-row]').remove();const save=e.target.closest('[data-save-slot]');if(save){const row=save.closest('[data-slot]'),rates={};row.querySelectorAll('[data-rate]').forEach(x=>rates[x.dataset.rate]=Number(x.value)||0);try{await saveBoosterSlot(row.dataset.slot,row.querySelector('[data-slot-qty]').value,rates);say('Slot saved.','success')}catch(err){say(err.message,'error')}}};$('#saveBooster').onclick=async()=>{try{const rewardCards=[...body.querySelectorAll('[data-reward-row]')].map((row,i)=>({cardId:row.querySelector('[data-card]').value,quantity:Number(row.querySelector('[data-qty]').value)||1,weight:Number(row.querySelector('[data-weight]').value)||0,guaranteed:true,sortOrder:i}));await saveBooster({id:$('#eBoosterId').value,name:$('#eBoosterName').value,description:$('#eBoosterDescription').value,rewardMode:$('#eRewardMode').value,seriesId:$('#eBoosterSeries').value||null,cardCount:Number($('#eBoosterCount').value)||1,bonusStarBits:Number($('#eBoosterBits').value)||0,starBitsCost:Number($('#eBoosterCost').value)||0,sortOrder:Number($('#eBoosterSort').value)||0,isActive:$('#eBoosterActive').checked,archived:$('#eBoosterArchived').checked,packImageUrl:$('#ePackImageUrl').value,cardBackUrl:$('#eBackImageUrl').value,rewardCards});await reload('Booster pack saved.')}catch(err){say(err.message,'error')}};if(b.id){$('#archiveBooster').onclick=async()=>{try{$('#eBoosterArchived').checked=true;$('#eBoosterActive').checked=false;$('#saveBooster').click()}catch(e){say(e.message,'error')}};$('#deleteBooster').onclick=async()=>{if(!confirm('Permanently delete this booster pack? This cannot be undone.'))return;try{await deleteBooster(b.id);await reload('Booster deleted.')}catch(e){say(e.message,'error')}}}}
function wireUpload(prefix,folder){const file=$(`#${prefix}File`),url=$(`#${prefix}Url`),preview=$(`#${prefix}Preview`),meta=$(`#${prefix}Meta`),del=$(`#${prefix}Delete`);const refresh=()=>{const path=storagePathFromUrl(url.value),name=path?path.split('/').pop():(url.value?url.value.split('/').pop():'No image selected');preview.src=url.value||'site_assets/StarlightCard_Back_NewLogo.png';meta.innerHTML=`<strong>${esc(name)}</strong>${path?`Supabase Storage: ${esc(path)}<br><span class="asset-url">${esc(url.value)}</span>`:'Bundled site asset or external URL. Upload a replacement to store it in Supabase.'}`;del.disabled=!path};url.oninput=refresh;file.onchange=async()=>{const chosen=file.files?.[0];if(!chosen)return;meta.innerHTML=`<strong>${esc(chosen.name)}</strong>Uploading to Supabase Storage folder <code>${esc(folder)}</code>…`;del.disabled=true;try{const uploaded=await uploadStudioAsset(chosen,folder);url.value=uploaded.url;preview.src=uploaded.url;meta.innerHTML=`<strong>${esc(uploaded.name)}</strong>Uploaded to <code>${esc(uploaded.path)}</code><br><span class="asset-url">${esc(uploaded.url)}</span>`;del.disabled=false;say('Artwork uploaded to Supabase Storage. Save the item to keep this URL.','success')}catch(e){meta.innerHTML=`<strong>${esc(chosen.name)}</strong>Upload failed.`;say(e.message,'error')}};del.onclick=async()=>{const path=storagePathFromUrl(url.value);if(!path||!confirm('Delete this uploaded image from Supabase Storage?'))return;try{await deleteStudioAsset(path);url.value='';file.value='';refresh();say('Uploaded image deleted. Choose a replacement and save the item.','success')}catch(e){say(e.message,'error')}};refresh()}
function wire(){document.querySelectorAll('[data-new]').forEach(x=>x.onclick=()=>({series:seriesEditor,card:cardEditor,booster:boosterEditor}[x.dataset.new])());document.querySelectorAll('[data-edit-series]').forEach(x=>x.onclick=()=>seriesEditor(data.series.find(s=>s.id===x.dataset.editSeries)));document.querySelectorAll('[data-edit-card]').forEach(x=>x.onclick=()=>cardEditor(data.cards.find(c=>c.id===x.dataset.editCard)));document.querySelectorAll('[data-edit-booster]').forEach(x=>x.onclick=()=>boosterEditor(data.boosters.find(b=>b.id===x.dataset.editBooster)));$('#saveDaily')?.addEventListener('click',async()=>{try{await setDailyMode($('#dailyMode').value);say('Free Daily Booster availability saved.','success')}catch(e){say(e.message,'error')}});$('#refreshCatalog')?.addEventListener('click',async()=>{try{say('Refreshing the public card catalog…');const result=await refreshPublicCardCatalog();say(`Public catalog refreshed: ${result.cards.length} visible card(s).`,'success')}catch(e){say(e.message,'error')}});$('#cardSearch')?.addEventListener('input',renderCardLibrary);$('#cardSeriesFilter')?.addEventListener('change',renderCardLibrary);$('#assetUpload')?.addEventListener('change',async e=>{try{await uploadStudioAsset(e.target.files[0],'uploads');await reload('Artwork uploaded.')}catch(err){say(err.message,'error')}});document.querySelectorAll('[data-delete-asset]').forEach(x=>x.onclick=async()=>{if(!confirm('Delete this uploaded asset?'))return;try{await deleteStudioAsset(x.dataset.deleteAsset);await reload('Asset deleted.')}catch(e){say(e.message,'error')}})}
document.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>{document.querySelectorAll('[data-tab]').forEach(x=>x.classList.toggle('active',x===b));['overview','series','cards','boosters','assets'].forEach(t=>$(`#${t}Tab`).classList.toggle('hidden',b.dataset.tab!==t))});
async function reload(message=''){close();say('Loading Content Studio…');try{[data,assets]=await Promise.all([loadContentStudio(),listStudioAssets()]);render();app.classList.remove('hidden');say(message,message?'success':'')}catch(e){say(e.message,'error')}}reload();
</script></body></html>
