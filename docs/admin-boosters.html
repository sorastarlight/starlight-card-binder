x;align-items:center}.close{border:0;background:#edf7ff;border-radius:50%;width:42px;height:42px;font-size:1.2rem;cursor:pointer}.reward-builder{margin-top:16px;padding:16px;border:1px solid rgba(254,211,52,.4);border-radius:16px;background:#fffbed}.reward-row{display:grid;grid-template-columns:minmax(220px,1fr) 100px 100px auto;gap:9px;align-items:end;margin-top:9px}.slot-row{display:grid;grid-template-columns:170px 90px repeat(5,minmax(80px,1fr)) auto;gap:8px;align-items:end;margin-top:10px}.asset-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:12px}.asset{padding:10px;border:1px solid rgba(107,198,248,.25);border-radius:14px;background:#fff}.asset img{width:100%;height:160px;object-fit:contain;border-radius:9px;background:#f7fbff}.asset code{display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:.72rem}.asset small{display:block;margin-top:6px;color:var(--muted);font-size:.72rem}.asset-tools{display:grid;grid-template-columns:minmax(220px,1fr) 220px;gap:10px;margin:12px 0}.asset-tools input,.asset-tools select{min-height:42px;padding:9px 12px;border:2px solid rgba(107,198,248,.28);border-radius:11px;font:inherit}.asset-actions{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}.asset-actions .btn{padding:7px 10px;font-size:.78rem}.empty{padding:36px;text-align:center;color:var(--muted)}@media(max-width:900px){.top-grid,.form-grid,.image-editor,.asset-tools{grid-template-columns:1fr}.form-grid .full{grid-column:auto}.reward-row,.slot-row{grid-template-columns:1fr 1fr}.image-editor img{margin:auto}.editor{padding:8px}.editor-card{padding:17px}}

</head><body><script src="js/embed-mode.js" type="module"></script><div class="sky"></div><main class="studio"><section class="shell"><p class="eyebrow">Administration Hub</p><h1>Starlight Card Management</h1><p class="lead">Manage series, cards, booster packs, reward pools, and uploaded artwork from one organized workspace.</p><p id="status" class="status">Loading Starlight Card Management…</p><div id="app" class="hidden"><div class="top-grid" id="metrics"></div><div class="tabs"><button class="active" data-tab="overview">Dashboard</button><button data-tab="series">Series</button><button data-tab="cards">Cards</button><button data-tab="boosters">Booster Packs</button><button data-tab="assets">Asset Library</button><button data-tab="events">Events</button><button data-tab="maintenance">Maintenance</button></div><section id="overviewTab"></section><section id="seriesTab" class="hidden"></section><section id="cardsTab" class="hidden"></section><section id="boostersTab" class="hidden"></section><section id="assetsTab" class="hidden"></section><section id="eventsTab" class="hidden"></section><section id="maintenanceTab" class="hidden"></section></div></section></main><div id="editor" class="editor hidden" role="dialog" aria-modal="true"><section class="editor-card"><div class="editor-head"><h2 id="editorTitle">Editor</h2><button id="closeEditor" class="close" aria-label="Close">×</button></div><div id="editorBody"></div></section></div>
<script type="module">
import{loadContentStudio,saveSeries,saveCard,saveBooster,deleteSeries,deleteCard,deleteBooster,setDailyMode,uploadStudioAsset,listStudioAssets,deleteStudioAsset,storagePathFromUrl,saveBoosterSlot,refreshPublicCardCatalog,getSystemDiagnostics,exportAssetManifest,getAdminEvents,saveEvent,deleteEvent}from'./js/content-studio-service.js';
const $=s=>document.querySelector(s), status=$('#status'),app=$('#app'),editor=$('#editor'),body=$('#editorBody');let data={series:[],cards:[],boosters:[],events:[],dailyMode:'daily'},assets=[];
const esc=v=>String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
function say(t,type=''){status.textContent=t;status.className=`status ${type}`}
function openEditor(title,html){$('#editorTitle').textContent=title;body.innerHTML=html;editor.classList.remove('hidden');document.body.style.overflow='hidden'}function close(){editor.classList.add('hidden');document.body.style.overflow=''}$('#closeEditor').onclick=close;editor.onclick=e=>{if(e.target===editor)close()};
function options(items,value,label=x=>x.name){return items.map(x=>`<option value="${esc(x.id)}" ${x.id===value?'selected':''}>${esc(label(x))}</option>`).join('')}
function metrics(){return `<div class="metric"><strong>${data.series.length}</strong>Series</div><div class="metric"><strong>${data.cards.length}</strong>Cards</div><div class="metric"><strong>${data.boosters.filter(x=>!x.archived).length}</strong>Booster Packs</div><div class="metric"><strong>${data.events.length}</strong>Events</div>`}
function overview(){return `<section class="panel"><div class="toolbar"><div><h2>Free Daily Booster</h2><p class="lead">Control whether collectors receive one pack daily, unlimited packs, or no free packs.</p></div><div><select id="dailyMode"><option value="daily">Daily</option><option value="unlimited">Unlimited</option><option value="disabled">Disabled</option></select> <button id="saveDaily" class="btn primary">Save Availability</button></div></div></section><section class="panel"><h2>Quick Start</h2><p class="lead">Create and manage the content collectors see throughout the Binder.</p><div class="library"><button class="item" data-new="series"><h3>＋ New Series</h3><p>Create a set before assigning cards.</p></button><button class="item" data-new="card"><h3>＋ New Card</h3><p>Upload artwork and assign it to a series.</p></button><button class="item" data-new="booster"><h3>＋ New Booster Pack</h3><p>Choose slots, a series, exact cards, or a custom pool.</p></button></div></section><section class="panel"><h2>Content Architecture</h2><div class="library"><article class="item"><h3>Supabase Database</h3><p>Names, descriptions, rarities, pull rules, and image URLs.</p></article><article class="item"><h3>Supabase Storage</h3><p>Editable card, series, booster, and card-back artwork.</p></article><article class="item"><h3>GitHub Pages</h3><p>Application code, sounds, and permanent fallback assets.</p></article></div></section>`}
function seriesView(){return `<section class="panel"><div class="toolbar"><div><h2>Card Series</h2><p class="lead">Organize cards into clean collectible sets.</p></div><button class="btn primary" data-new="series">＋ Add Series</button></div><div class="library">${data.series.map(s=>`<article class="item"><img src="${esc(s.boosterImageUrl||'site_assets/series01_rising_star_booster.png')}" alt=""><h3>${esc(s.name)}</h3><div class="item-meta"><span>${esc(s.id)}</span><span>${s.cardCount||0} cards</span></div><p>${esc(s.description||'No description')}</p><button class="btn" data-edit-series="${esc(s.id)}">Edit Series</button></article>`).join('')||'<div class="empty">No series yet.</div>'}</div></section>`}
function cardsView(){return `<section class="panel"><div class="toolbar"><div><h2>Card Catalog</h2><p class="lead">Search, edit, upload, and reassign cards.</p></div><div><input id="cardSearch" type="search" placeholder="Search cards…"> <select id="cardSeriesFilter"><option value="">All series</option>${options(data.series,'')}</select> <button class="btn primary" data-new="card">＋ Add Card</button></div></div><div id="cardLibrary" class="library"></div></section>`}
function renderCardLibrary(){const q=($('#cardSearch')?.value||'').toLowerCase(),sid=$('#cardSeriesFilter')?.value||'';$('#cardLibrary').innerHTML=data.cards.filter(c=>(!sid||c.seriesId===sid)&&(!q||`${c.name} ${c.cardNumber} ${c.id}`.toLowerCase().includes(q))).map(c=>`<article class="item"><img src="${esc(c.thumbnailUrl||c.imageUrl)}" alt=""><h3>#${esc(c.cardNumber)} ${esc(c.name)}</h3><div class="item-meta"><span>${esc(c.rarity)}</span><span>${esc(data.series.find(s=>s.id===c.seriesId)?.name||c.seriesId)}</span></div><p>${c.isPullable?'Pullable':'Not pullable'} · Weight ${c.pullWeight}</p><button class="btn" data-edit-card="${esc(c.id)}">Edit Card</button></article>`).join('')||'<div class="empty">No matching cards.</div>'}
function boostersView(){return `<section class="panel"><div class="toolbar"><div><h2>Booster Packs</h2><p class="lead">Build exactly what each pack opens.</p></div><button class="btn primary" data-new="booster">＋ Create Booster</button></div><div class="library">${data.boosters.filter(b=>!b.archived).map(b=>`<article class="item"><img src="${esc(b.packImageUrl||'site_assets/series01_rising_star_booster.png')}" alt=""><h3>${esc(b.name)}</h3><div class="item-meta"><span>${esc(b.rewardMode)}</span><span>${b.starBitsCost} ✦</span></div><p>${esc(b.description||'No description')}</p><button class="btn" data-edit-booster="${esc(b.id)}">Configure Pack</button></article>`).join('')||'<div class="empty">No boosters yet.</div>'}</div></section>`}
function assetsView(){const folders=[...new Set(assets.map(a=>a.folder))].sort();return `<section class="panel"><div class="toolbar"><div><h2>Asset Library</h2><p class="lead">Browse, upload, copy, open, and remove artwork stored in Supabase Storage.</p></div><label class="btn primary">Upload Artwork<input id="assetUpload" type="file" accept="image/*" hidden></label></div><div class="asset-tools"><input id="assetSearch" type="search" placeholder="Search filename or path…"><select id="assetFolder"><option value="">All folders</option>${folders.map(f=>`<option value="${esc(f)}">${esc(f)}</option>`).join('')}</select></div><div id="assetResults" class="asset-grid"></div></section>`}

function eventsView(){return `<section class="panel"><div class="toolbar"><div><h2>Events & Seasonal Content</h2><p class="lead">Create timed celebrations that can group exclusive cards, booster packs, achievements, and titles.</p></div><button class="btn primary" data-new-event>＋ New Event</button></div><div class="library">${data.events.map(e=>`<article class="item">${e.bannerImageUrl?`<img src="${esc(e.bannerImageUrl)}" alt="">`:''}<div class="item-meta"><span>${new Date(e.startAt).toLocaleDateString()} – ${new Date(e.endAt).toLocaleDateString()}</span><span>${e.isActive?'Active':'Inactive'}</span></div><h3>${esc(e.name)}</h3><p>${esc(e.description||'No description')}</p><p class="lead">${e.cardCount||0} card(s) • ${e.boosterCount||0} booster(s) • ${(e.achievements||[]).length} achievement(s)</p><button class="btn" data-edit-event="${esc(e.id)}">Edit Event</button></article>`).join('')||'<div class="empty">No events yet. Create your first seasonal celebration.</div>'}</div></section>`}
function eventEditor(e={}){const achievements=e.achievements||[];openEditor(e.id?'Edit Event':'New Event',`<div class="form-grid"><div class="field"><label>Event ID</label><input id="eventId" value="${esc(e.id||'')}"></div><div class="field"><label>Event Name</label><input id="eventName" value="${esc(e.name||'')}"></div><div class="field full"><label>Description</label><textarea id="eventDescription">${esc(e.description||'')}</textarea></div><div class="field"><label>Start</label><input id="eventStart" type="datetime-local" value="${e.startAt?new Date(e.startAt).toISOString().slice(0,16):''}"></div><div class="field"><label>End</label><input id="eventEnd" type="datetime-local" value="${e.endAt?new Date(e.endAt).toISOString().slice(0,16):''}"></div><div class="field"><label>Accent Color</label><input id="eventColor" type="color" value="${esc(e.accentColor||'#ff82c8')}"></div><div class="field"><label>Sort Order</label><input id="eventSort" type="number" value="${Number(e.sortOrder||0)}"></div><div class="field full"><label>Banner Image URL</label><input id="eventBanner" value="${esc(e.bannerImageUrl||'')}"><label class="upload">Browse & Upload Banner<input id="eventBannerFile" type="file" accept="image/*"></label><div id="eventBannerMeta" class="upload-meta">${e.bannerImageUrl?esc(e.bannerImageUrl):'No banner uploaded.'}</div></div><div class="checks full"><label><input id="eventActive" type="checkbox" ${e.isActive!==false?'checked':''}> Active</label><label><input id="eventHidden" type="checkbox" ${e.isHidden?'checked':''}> Hidden</label></div></div><section class="reward-builder"><h3>Event Content</h3><div class="form-grid"><div class="field"><label>Event Cards</label><select id="eventCards" multiple size="8">${data.cards.map(c=>`<option value="${esc(c.id)}" ${(e.cardIds||[]).includes(c.id)?'selected':''}>#${esc(c.cardNumber)} ${esc(c.name)}</option>`).join('')}</select></div><div class="field"><label>Event Booster Packs</label><select id="eventBoosters" multiple size="8">${data.boosters.map(b=>`<option value="${esc(b.id)}" ${(e.boosterIds||[]).includes(b.id)?'selected':''}>${esc(b.name)}</option>`).join('')}</select></div></div></section><section class="reward-builder"><div class="toolbar"><div><h3>Event Achievements</h3><p class="lead">Add profile titles or Star Bits rewards for event milestones.</p></div><button id="addEventAchievement" class="btn" type="button">＋ Achievement</button></div><div id="eventAchievements">${achievements.map((a,i)=>eventAchievementRow(a,i)).join('')}</div></section><div class="editor-actions"><button id="saveEventBtn" class="btn primary">Save Event</button>${e.id?'<button id="deleteEventBtn" class="btn danger">Delete Event</button>':''}</div>`);const file=$('#eventBannerFile'),url=$('#eventBanner'),meta=$('#eventBannerMeta');file.onchange=async()=>{const f=file.files?.[0];if(!f)return;try{const up=await uploadStudioAsset(f,'events',{path:`events/${cleanFileName($('#eventId').value||f.name)}`});url.value=up.url;meta.textContent=`Uploaded: ${up.path}`;say('Event banner uploaded.','success')}catch(err){say(err.message,'error')}};$('#addEventAchievement').onclick=()=>{$('#eventAchievements').insertAdjacentHTML('beforeend',eventAchievementRow({},Date.now()))};$('#saveEventBtn').onclick=async()=>{try{const rows=[...document.querySelectorAll('.event-achievement-row')].map((r,i)=>({key:r.querySelector('[data-a-key]').value,name:r.querySelector('[data-a-name]').value,description:r.querySelector('[data-a-desc]').value,requirementType:r.querySelector('[data-a-type]').value,requirementValue:Number(r.querySelector('[data-a-value]').value||1),rewardStarBits:Number(r.querySelector('[data-a-bits]').value||0),rewardTitle:r.querySelector('[data-a-title]').value,isActive:true,sortOrder:i})).filter(a=>a.key&&a.name);await saveEvent({id:$('#eventId').value,name:$('#eventName').value,description:$('#eventDescription').value,startAt:new Date($('#eventStart').value).toISOString(),endAt:new Date($('#eventEnd').value).toISOString(),accentColor:$('#eventColor').value,sortOrder:Number($('#eventSort').value||0),bannerImageUrl:url.value,isActive:$('#eventActive').checked,isHidden:$('#eventHidden').checked,cardIds:[...$('#eventCards').selectedOptions].map(x=>x.value),boosterIds:[...$('#eventBoosters').selectedOptions].map(x=>x.value),achievements:rows});await reload('Event saved.')}catch(err){say(err.message,'error')}};$('#deleteEventBtn')?.addEventListener('click',async()=>{if(await StarlightUI.confirm({title:'Delete event?',message:'Linked cards and boosters must be removed from the event first.',confirmText:'Delete Event',danger:true})){try{await deleteEvent(e.id);await reload('Event deleted.')}catch(err){say(err.message,'error')}}})}
function eventAchievementRow(a={},i=0){return `<div class="reward-row event-achievement-row"><input data-a-key placeholder="achievement-key" value="${esc(a.key||'')}"><input data-a-name placeholder="Achievement name" value="${esc(a.name||'')}"><input data-a-value type="number" min="1" value="${Number(a.requirementValue||1)}"><button type="button" class="btn danger" onclick="this.parentElement.remove()">Remove</button><textarea data-a-desc placeholder="Description">${esc(a.description||'')}</textarea><select data-a-type><option value="collect_event_cards">Collect Event Cards</option><option value="open_event_boosters">Open Event Boosters</option></select><input data-a-bits type="number" min="0" placeholder="Star Bits" value="${Number(a.rewardStarBits||0)}"><input data-a-title placeholder="Reward title" value="${esc(a.rewardTitle||'')}"></div>`}
function cleanFileName(v){return String(v||'event-banner').toLowerCase().replace(/[^a-z0-9._-]+/g,'-').replace(/^-+|-+$/g,'')+'.png'}
function maintenanceView(){return `<section class="panel"><div class="toolbar"><div><h2>Catalog & Cache</h2><p class="lead">Refresh live content after administrative changes or clear this browser's local catalog cache.</p></div><div class="editor-actions"><button id="refreshCatalog" class="btn primary">↻ Refresh Site Catalog</button><button id="clearCatalogCache" class="btn">Clear Local Catalog Cache</button></div></div></section><section class="panel"><div class="toolbar"><div><h2>Content Integrity Audit</h2><p class="lead">Check for duplicate IDs, numbering conflicts, missing artwork, orphaned cards, empty booster pools, and legacy external image links.</p><pre id="integrityOutput" class="upload-meta">Not checked yet.</pre></div><button id="runIntegrityAudit" class="btn">Run Integrity Audit</button></div></section><section class="panel"><div class="toolbar"><div><h2>System Diagnostics</h2><p class="lead">Check database connectivity, storage availability, catalog totals, managed assets, browser state, and the active site version.</p><pre id="diagnosticsOutput" class="upload-meta">Not checked yet.</pre></div><div class="editor-actions"><button id="runDiagnostics" class="btn primary">Run Diagnostics</button><button id="copyDiagnostics" class="btn">Copy Report</button><button id="downloadDiagnostics" class="btn">Download Report</button></div></div></section><section class="panel"><div class="toolbar"><div><h2>Security & Database Audit</h2><p class="lead">Use the included read-only Supabase audit to review RLS coverage, policies, privileged functions, indexes, foreign keys, and Storage bucket settings.</p></div><div class="editor-actions"><button id="copyAuditPath" class="btn">Copy Audit File Path</button></div></div><p class="lead"><code>docs/supabase/v87_4_security_performance_audit.sql</code></p></section><section class="panel"><div class="toolbar"><div><h2>Backups & Portability</h2><p class="lead">Download a complete content backup or a focused asset manifest. These files contain configuration and URLs, not the image binaries themselves.</p></div><div class="editor-actions"><button id="exportFullBackup" class="btn primary">Export Full Content Backup</button><button id="exportManifest" class="btn">Export Asset Manifest</button></div></div></section><section class="panel"><h2>Recovery Files</h2><p class="lead">Keep the included <code>docs/supabase/v87_1_database_schema_inventory.sql</code> with your repository. Run it in Supabase whenever you need a fresh schema inventory for disaster recovery planning.</p></section>`}
function renderAssetLibrary(){const q=($('#assetSearch')?.value||'').trim().toLowerCase(),folder=$('#assetFolder')?.value||'';const rows=assets.filter(a=>(!folder||a.folder===folder)&&(!q||`${a.name} ${a.path} ${a.folder}`.toLowerCase().includes(q)));$('#assetResults').innerHTML=rows.map(a=>`<article class="asset"><img src="${esc(a.url)}" alt="${esc(a.name)}" loading="lazy"><strong>${esc(a.folder)}</strong><code title="${esc(a.path)}">${esc(a.name)}</code><small>${a.createdAt?new Date(a.createdAt).toLocaleString():'Upload date unavailable'}</small><div class="asset-actions"><button class="btn" data-copy-asset="${esc(a.url)}">Copy URL</button><a class="btn" href="${esc(a.url)}" target="_blank" rel="noopener">Open</a><button class="btn danger" data-delete-asset="${esc(a.path)}">Delete</button></div></article>`).join('')||'<div class="empty">No matching assets.</div>';wireAssetButtons()}

function buildIntegrityReport(content,assetRows){
  const series=content?.series||[],cards=content?.cards||[],boosters=content?.boosters||[];
  const issues=[];const warnings=[];
  const seriesIds=new Set(series.map(x=>String(x.id)));
  const duplicate=(rows,key,label)=>{const seen=new Map();for(const row of rows){const value=String(key(row)||'').trim();if(!value)continue;if(seen.has(value))issues.push(`${label} duplicated: ${value}`);else seen.set(value,true)}};
  duplicate(cards,c=>c.id,'Card ID');
  duplicate(series,s=>s.id,'Series ID');
  duplicate(boosters,b=>b.id,'Booster ID');
  duplicate(cards,c=>`${c.seriesId||c.series_id}:${c.cardNumber||c.card_number}`,'Card number within series');
  for(const card of cards){
    const sid=String(card.seriesId||card.series_id||'');
    if(!seriesIds.has(sid))issues.push(`Card ${card.id} references missing series ${sid||'(blank)'}.`);
    const front=card.imageUrl||card.image_url||'';const thumb=card.thumbnailUrl||card.thumbnail_url||'';
    if(!front)issues.push(`Card ${card.id} has no front artwork URL.`);
    if(!thumb)warnings.push(`Card ${card.id} has no thumbnail URL.`);
    if(/pages\.dev|starlightcardsbinder/i.test(front)||/pages\.dev|starlightcardsbinder/i.test(thumb))warnings.push(`Card ${card.id} still uses a legacy external artwork URL.`);
    if(Number(card.pullWeight??card.pull_weight)<0)issues.push(`Card ${card.id} has a negative pull weight.`);
  }
  for(const booster of boosters){
    const mode=booster.rewardMode||booster.reward_mode||'rarity_slots';
    const slots=booster.slots||[];const rewards=booster.rewards||booster.exactCards||booster.exact_cards||[];
    if((booster.isActive??booster.is_active) && mode==='rarity_slots' && !slots.length)issues.push(`Active booster ${booster.id} has no rarity slots.`);
    if((booster.isActive??booster.is_active) && ['exact_cards','single_card','weighted_pool'].includes(mode) && !rewards.length)issues.push(`Active booster ${booster.id} has an empty reward pool.`);
    const pack=booster.packImageUrl||booster.pack_image_url||'';const back=booster.cardBackUrl||booster.card_back_url||'';
    if(!pack)warnings.push(`Booster ${booster.id} has no pack artwork.`);
    if(!back)warnings.push(`Booster ${booster.id} has no card-back artwork.`);
  }
  const storagePaths=new Set((assetRows||[]).map(a=>a.path));
  return {checkedAt:new Date().toISOString(),summary:{series:series.length,cards:cards.length,boosters:boosters.length,managedAssets:storagePaths.size,errors:issues.length,warnings:warnings.length},errors:issues,warnings};
}

t getFullDiagnostics()};downloadJson(`starlight-full-content-backup-${new Date().toISOString().slice(0,10)}.json`,backup);say('Full content backup downloaded.','success')}catch(e){say(e.message,'error')}});$('#runIntegrityAudit')?.addEventListener('click',()=>{try{const report=buildIntegrityReport(data,assets);$('#integrityOutput').textContent=JSON.stringify(report,null,2);say(report.summary.errors?`Integrity audit found ${report.summary.errors} issue(s).`:'Integrity audit completed with no blocking issues.',report.summary.errors?'error':'success')}catch(e){$('#integrityOutput').textContent=e.message;say(e.message,'error')}});$('#runDiagnostics')?.addEventListener('click',async()=>{try{const d=await getFullDiagnostics();$('#diagnosticsOutput').textContent=JSON.stringify(d,null,2);say('Diagnostics completed.','success')}catch(e){$('#diagnosticsOutput').textContent=e.message;say(e.message,'error')}});$('#copyDiagnostics')?.addEventListener('click',async()=>{try{let text=$('#diagnosticsOutput').textContent;if(!text||text==='Not checked yet.'){const d=await getFullDiagnostics();text=JSON.stringify(d,null,2);$('#diagnosticsOutput').textContent=text}await navigator.clipboard.writeText(text);say('Diagnostics copied to clipboard.','success')}catch(e){say(e.message,'error')}});$('#downloadDiagnostics')?.addEventListener('click',async()=>{try{let d;try{d=JSON.parse($('#diagnosticsOutput').textContent)}catch{d=await getFullDiagnostics();$('#diagnosticsOutput').textContent=JSON.stringify(d,null,2)}downloadJson(`starlight-diagnostics-${new Date().toISOString().replace(/[:.]/g,'-')}.json`,d);say('Diagnostics report downloaded.','success')}catch(e){say(e.message,'error')}});$('#copyAuditPath')?.addEventListener('click',async()=>{try{await navigator.clipboard.writeText('docs/supabase/v87_4_security_performance_audit.sql');say('Audit file path copied.','success')}catch(e){say(e.message,'error')}});$('#cardSearch')?.addEventListener('input',renderCardLibrary);$('#cardSeriesFilter')?.addEventListener('change',renderCardLibrary);$('#assetUpload')?.addEventListener('change',async e=>{try{const file=e.target.files?.[0];if(!file)return;await uploadStudioAsset(file,'uploads');e.target.value='';await reload('Artwork uploaded to Supabase Storage.')}catch(err){say(err.message,'error')}});$('#assetSearch')?.addEventListener('input',renderAssetLibrary);$('#assetFolder')?.addEventListener('change',renderAssetLibrary);renderAssetLibrary()}
