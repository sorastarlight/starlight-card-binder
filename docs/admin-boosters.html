pace-between;gap:10px;color:var(--muted);font-size:.85rem}.form-grid{display:grid;grid-template-columns:repeat(2,minmax(220px,1fr));gap:14px}.form-grid .full{grid-column:1/-1}.field label{display:block;margin-bottom:5px;color:#405fa1;font-weight:850}.field input,.field textarea,.field select{width:100%;padding:10px 12px;border:2px solid rgba(107,198,248,.28);border-radius:11px;font:inherit;background:#fff}.field textarea{min-height:100px;resize:vertical}.checks{display:flex;flex-wrap:wrap;gap:14px;align-items:center}.auto-card-row{padding:13px 15px;border:1px solid rgba(254,211,52,.48);border-radius:14px;background:linear-gradient(135deg,#fffbed,#fff5fb);align-items:flex-start}.auto-card-row small{display:block;width:100%;color:var(--muted);padding-left:25px}.image-editor{display:grid;grid-template-columns:180px 1fr;gap:15px;align-items:start}.image-editor img{width:180px;height:240px;object-fit:contain;border-radius:13px;background:#fff;box-shadow:0 9px 22px rgba(61,83,132,.12)}.upload{display:inline-flex;align-items:center;justify-content:center;width:100%;margin-top:9px;padding:9px;border:1px dashed rgba(64,95,161,.45);border-radius:10px;color:#405fa1;font-weight:900;cursor:pointer}.upload input{display:none}.upload-meta{margin-top:9px;padding:10px;border-radius:10px;background:#f5f9ff;color:#536184;font-size:.82rem;line-height:1.45;overflow-wrap:anywhere}.upload-meta strong{display:block;color:#405fa1}.editor-actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:18px}.btn.archive{border-color:#e9bd58;color:#806000}.asset-url{display:block;margin-top:5px;font-size:.68rem;color:#6d7692;overflow-wrap:anywhere}.editor{position:fixed;inset:0;z-index:5000;display:grid;place-items:center;padding:20px;background:rgba(31,39,75,.62);backdrop-filter:blur(7px)}.editor-card{width:min(100%,1050px);max-height:92vh;overflow:auto;padding:24px;border-radius:24px;background:#fff;box-shadow:0 26px 80px rgba(0,0,0,.3)}.editor-head{display:flex;justify-content:space-between;gap:15px;align-items:center}.close{border:0;background:#edf7ff;border-radius:50%;width:42px;height:42px;font-size:1.2rem;cursor:pointer}.reward-builder{margin-top:16px;padding:16px;border:1px solid rgba(254,211,52,.4);border-radius:16px;background:#fffbed}.reward-row{display:grid;grid-template-columns:minmax(220px,1fr) 100px 100px auto;gap:9px;align-items:end;margin-top:9px}.slot-row{display:grid;grid-template-columns:170px 90px repeat(5,minmax(80px,1fr)) auto;gap:8px;align-items:end;margin-top:10px}.asset-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:12px}.asset{padding:10px;border:1px solid rgba(107,198,248,.25);border-radius:14px;background:#fff}.asset img{width:100%;height:160px;object-fit:contain;border-radius:9px;background:#f7fbff}.asset code{display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:.72rem}.asset small{display:block;margin-top:6px;color:var(--muted);font-size:.72rem}.asset-tools{display:grid;grid-template-columns:minmax(220px,1fr) 220px;gap:10px;margin:12px 0}.asset-tools input,.asset-tools select{min-height:42px;padding:9px 12px;border:2px solid rgba(107,198,248,.28);border-radius:11px;font:inherit}.asset-actions{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}.asset-actions .btn{padding:7px 10px;font-size:.78rem}.empty{padding:36px;text-align:center;color:var(--muted)}@media(max-width:900px){.top-grid,.form-grid,.image-editor,.asset-tools{grid-template-columns:1fr}.form-grid .full{grid-column:auto}.reward-row,.slot-row{grid-template-columns:1fr 1fr}.image-editor img{margin:auto}.editor{padding:8px}.editor-card{padding:17px}}

</head><body><script src="js/embed-mode.js" type="module"></script><div class="sky"></div><main class="studio"><section class="shell"><p class="eyebrow">Administration Hub</p><h1>Starlight Card Management</h1><p class="lead">Manage series, cards, booster packs, reward pools, and uploaded artwork from one organized workspace.</p><p id="status" class="status">Loading Starlight Card Management…</p><div id="app" class="hidden"><div class="top-grid" id="metrics"></div><div class="tabs"><button class="active" data-tab="overview">Dashboard</button><button data-tab="series">Series</button><button data-tab="cards">Cards</button><button data-tab="boosters">Booster Packs</button><button data-tab="assets">Asset Library</button><button data-tab="events">Events</button><button data-tab="maintenance">Maintenance</button></div><section id="overviewTab"></section><section id="seriesTab" class="hidden"></section><section id="cardsTab" class="hidden"></section><section id="boostersTab" class="hidden"></section><section id="assetsTab" class="hidden"></section><section id="eventsTab" class="hidden"></section><section id="maintenanceTab" class="hidden"></section></div></section></main><div id="editor" class="editor hidden" role="dialog" aria-modal="true"><section class="editor-card"><div class="editor-head"><h2 id="editorTitle">Editor</h2><button id="closeEditor" class="close" aria-label="Close">×</button></div><div id="editorBody"></div></section></div>
<script type="module">
import {
  loadContentStudio,
  saveSeries,
  saveCard,
  saveBooster,
  cloneBooster,
  createBoosterFromTemplate,
  deleteSeries,
  deleteCard,
  deleteBooster,
  inspectBoosterReferences,
  renameBoosterId,
  detachBoosterFromShop,
  safeDeleteBooster,
  setDailyMode,
  uploadStudioAsset,
  uploadCardArtworkPair,
  listStudioAssets,
  deleteStudioAsset,
  storagePathFromUrl,
  saveBoosterSlot,
  refreshPublicCardCatalog,
  getSystemDiagnostics,
  exportAssetManifest,
  getAdminEvents,
  saveEvent,
  deleteEvent,
} from "./js/content-studio-service.js";
const $ = (s) => document.querySelector(s),
  status = $("#status"),
  app = $("#app"),
  editor = $("#editor"),
  body = $("#editorBody");
let data = {
    series: [],
    cards: [],
    boosters: [],
    events: [],
    dailyMode: "daily",
  },
  assets = [];
const esc = (v) =>
  String(v ?? "").replace(
    /[&<>"']/g,
    (m) =>
      ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;",
      })[m],
  );
function say(t, type = "") {
  status.textContent = t;
  status.className = `status ${type}`;
}
function openEditor(title, html) {
  $("#editorTitle").textContent = title;
  body.innerHTML = html;
  editor.classList.remove("hidden");
  document.body.style.overflow = "hidden";
}
function close() {
  editor.classList.add("hidden");
  document.body.style.overflow = "";
}
$("#closeEditor").onclick = close;
editor.onclick = (e) => {
  if (e.target === editor) close();
};
function options(items, value, label = (x) => x.name) {
  return items
    .map(
      (x) =>
        `<option value="${esc(x.id)}" ${x.id === value ? "selected" : ""}>${esc(label(x))}</option>`,
    )
    .join("");
}

function taxonomyOptions(items, value, emptyLabel = "Choose…") {
  return `<option value="">${emptyLabel}</option>${(items || [])
    .filter((x) => x.isActive !== false)
    .map(
      (x) =>
        `<option value="${esc(x.id)}" ${x.id === value ? "selected" : ""}>${esc(x.name)}</option>`,
    )
    .join("")}`;
}
function selectedValues(select) {
  return [...select.selectedOptions].map((o) => o.value).filter(Boolean);
}
function chipPicker(id, items, selected = []) {
  const chosen = new Set(selected || []);
  return `<div class="chip-picker-tools"><button type="button" class="btn" data-chip-all="${id}">Select All</button><button type="button" class="btn" data-chip-clear="${id}">Clear All</button><span class="lead" id="${id}Summary">${chosen.size ? `${chosen.size} selected` : "All allowed"}</span></div><div class="chip-picker" data-chip-picker="${id}">${(items || []).filter(x=>x.isActive!==false).map(x=>`<button type="button" data-chip-value="${esc(x.id)}" class="${chosen.has(x.id) ? "selected" : ""}">${esc(x.name)}</button>`).join("")}</div><select id="${id}" multiple class="hidden">${(items || []).filter(x=>x.isActive!==false).map(x=>`<option value="${esc(x.id)}" ${chosen.has(x.id) ? "selected" : ""}>${esc(x.name)}</option>`).join("")}</select>`;
}
function wireChipPicker(id, onChange = () => {}) {
  const picker = body.querySelector(`[data-chip-picker="${id}"]`), select = $(`#${id}`), summary = $(`#${id}Summary`);
  if (!picker || !select) return;
  const sync = (notify = true) => {
    const selected = new Set(selectedValues(select));
    picker.querySelectorAll("[data-chip-value]").forEach(btn => btn.classList.toggle("selected", selected.has(btn.dataset.chipValue)));
    if (summary) summary.textContent = selected.size ? `${selected.size} selected` : "All allowed";
    if (notify) onChange();
  };
  picker.onclick = e => {
    const btn = e.target.closest("[data-chip-value]");
    if (!btn) return;
    const option = [...select.options].find(o => o.value === btn.dataset.chipValue);
    if (option) option.selected = !option.selected;
    sync();
  };
  body.querySelector(`[data-chip-all="${id}"]`)?.addEventListener("click",()=>{[...select.options].forEach(o=>o.selected=true);sync();});
  body.querySelector(`[data-chip-clear="${id}"]`)?.addEventListener("click",()=>{[...select.options].forEach(o=>o.selected=false);sync();});
  sync(false);
}
function toggleControl(id, label, checked, detail = "") {
  return `<div class="toggle-card"><div><strong>${esc(label)}</strong>${detail ? `<small>${esc(detail)}</small>` : ""}</div><label class="toggle-switch"><input id="${id}" type="checkbox" ${checked ? "checked" : ""}><span></span></label></div>`;
}
function categoryName(id) {
  return data.categories?.find((x) => x.id === id)?.name || "Uncategorized";
}
function variantName(id) {
  return data.variants?.find((x) => x.id === id)?.name || "Standard Art";
}
function finishName(id) {
  return data.finishes?.find((x) => x.id === id)?.name || "Standard";
}
function distributionName(id) {
  return (
    {
      booster_pull: "Booster Pull",
      redeem_code: "Redeem Code",
      twitch_reward: "Twitch Reward",
      event_reward: "Event Reward",
      admin_gift: "Admin Gift",
      promo: "Promo",
      special: "Special Distribution",
    }[id] || id
  );
}

function metrics() {
  return `<div class="metric"><strong>${data.series.length}</strong>Series</div><div class="metric"><strong>${data.cards.length}</strong>Cards</div><div class="metric"><strong>${data.boosters.filter((x) => !x.archived).length}</strong>Booster Packs</div><div class="metric"><strong>${data.events.length}</strong>Events</div>`;
}
function overview() {
  return `<section class="panel"><div class="toolbar"><div><h2>Free Daily Booster</h2><p class="lead">Control whether collectors receive one pack daily, unlimited packs, or no free packs.</p></div><div><select id="dailyMode"><option value="daily">Daily</option><option value="unlimited">Unlimited</option><option value="disabled">Disabled</option></select> <button id="saveDaily" class="btn primary">Save Availability</button></div></div></section><section class="panel"><h2>Quick Start</h2><p class="lead">Create and manage the content collectors see throughout the Binder.</p><div class="library"><button class="item" data-new="series"><h3>＋ New Series</h3><p>Create a set before assigning cards.</p></button><button class="item" data-new="card"><h3>＋ New Card</h3><p>Upload artwork and assign it to a series.</p></button><button class="item" data-new="booster"><h3>＋ New Booster Pack</h3><p>Choose slots, a series, exact cards, or a custom pool.</p></button></div></section><section class="panel"><h2>Content Architecture</h2><div class="library"><article class="item"><h3>Supabase Database</h3><p>Names, descriptions, rarities, pull rules, and image URLs.</p></article><article class="item"><h3>Supabase Storage</h3><p>Editable card, series, booster, and card-back artwork.</p></article><article class="item"><h3>GitHub Pages</h3><p>Application code, sounds, and permanent fallback assets.</p></article></div></section>`;
}
function seriesView() {
  return `<section class="panel"><div class="toolbar"><div><h2>Card Series</h2><p class="lead">Organize cards into clean collectible sets.</p></div><button class="btn primary" data-new="series">＋ Add Series</button></div><div class="library">${data.series.map((s) => `<article class="item"><img src="${esc(s.boosterImageUrl || "site_assets/series01_rising_star_booster.png")}" alt=""><h3>${esc(s.name)}</h3><div class="item-meta"><span>${esc(s.id)}</span><span>${s.cardCount || 0} cards</span></div><p>${esc(s.description || "No description")}</p><button class="btn" data-edit-series="${esc(s.id)}">Edit Series</button></article>`).join("") || '<div class="empty">No series yet.</div>'}</div></section>`;
}
function cardsView() {
  return `<section class="panel"><div class="toolbar"><div><h2>Card Database 2.0</h2><p class="lead">Manage cards using Pokémon-style classifications: series, category, rarity, variant, finish, distribution, and tags.</p></div><div><button class="btn" id="bulkUploadCards">⇧ Mass Upload Set</button> <button class="btn primary" data-new="card">＋ Add Card</button></div></div><div class="catalog-filters"><input id="cardSearch" type="search" placeholder="Search name, number, category, artist, or tag…"><select id="cardSeriesFilter"><option value="">All series</option>${options(data.series, "")}</select><select id="cardCategoryFilter"><option value="">All categories</option>${taxonomyOptions(data.categories, "", "All categories").replace('<option value="">All categories</option>', "")}</select><select id="cardRarityFilter"><option value="">All rarities</option>${["Common", "Uncommon", "Rare", "Epic", "Legendary"].map((r) => `<option>${r}</option>`).join("")}</select><select id="cardStatusFilter"><option value="">All statuses</option><option value="published">Published</option><option value="draft">Draft</option><option value="archived">Archived</option></select></div><div id="cardLibrary" class="library"></div></section>`;
}
function renderCardLibrary() {
  const q = ($("#cardSearch")?.value || "").toLowerCase(),
    sid = $("#cardSeriesFilter")?.value || "",
    cat = $("#cardCategoryFilter")?.value || "",
    rar = $("#cardRarityFilter")?.value || "",
    status = $("#cardStatusFilter")?.value || "";
  $("#cardLibrary").innerHTML =
    data.cards
      .filter(
        (c) =>
          (!sid || c.seriesId === sid) &&
          (!cat || c.categoryId === cat) &&
          (!rar || c.rarity === rar) &&
          (!status || (c.publishStatus || "published") === status) &&
          (!q ||
            `${c.name} ${c.cardNumber} ${c.collectorNumber || ""} ${c.id} ${categoryName(c.categoryId)} ${c.artist || ""} ${(c.tags || []).join(" ")}`
              .toLowerCase()
              .includes(q)),
      )
      .map(
        (c) =>
          `<article class="item card-db-item"><img src="${esc(c.thumbnailUrl || c.imageUrl)}" alt=""><h3>${esc(c.collectorNumber || c.cardNumber)} · ${esc(c.name)}</h3><div class="item-meta"><span class="taxonomy-chip">${esc(categoryName(c.categoryId))}</span><span>${esc(c.rarity)}</span></div><p>${esc(data.series.find((s) => s.id === c.seriesId)?.name || c.seriesId)}<br>${esc(variantName(c.variantId))} · ${esc(finishName(c.finishId))}<br>${esc(distributionName(c.distributionType || "booster_pull"))} · ${esc(c.publishStatus || "published")}</p><button class="btn" data-edit-card="${esc(c.id)}">Edit Card</button></article>`,
      )
      .join("") || '<div class="empty">No matching cards.</div>';
}

function boostersView() {
  return `<section class="panel"><div class="toolbar"><div><h2>Booster Packs</h2><p class="lead">Start from a template or copy a pack that already works. Advanced odds remain available when you need them.</p></div><button class="btn primary" id="newBoosterWizard">＋ Create Booster</button></div><section class="helper-card"><h4>Quick guide</h4><p><strong>Rarity</strong> is the card category. <strong>Pull rate</strong> is the chance a slot chooses that rarity. <strong>Pull frequency</strong> only changes how often one card appears compared with cards of the same rarity. Leave most cards on <em>Normal</em>.</p></section><div class="library">${
    data.boosters
      .filter((b) => !b.archived)
      .map(
        (b) =>
          `<article class="item"><img src="${esc(b.packImageUrl || "site_assets/series01_rising_star_booster.png")}" alt=""><h3>${esc(b.name)}</h3><div class="item-meta"><span>${esc(friendlyRewardMode(b.rewardMode))}</span><span>${b.starBitsCost} ✦</span></div><p>${esc(b.description || "No description")}</p><div class="booster-actions"><button class="btn" data-edit-booster="${esc(b.id)}">Configure Pack</button><button class="btn" data-copy-booster="${esc(b.id)}">Copy Booster</button></div></article>`,

function nextCardDefaults(seriesId) {
  const cards = (data.cards || []).filter(
    (x) => String(x.seriesId) === String(seriesId),
  );
  const nums = cards
    .map((x) =>
      Number.parseInt(String(x.cardNumber || "").replace(/\D/g, ""), 10),
    )
    .filter(Number.isFinite);
  const next = (nums.length ? Math.max(...nums) : 0) + 1;
  const cardNumber = String(next).padStart(3, "0");
  const seriesRaw = String(seriesId || "").trim();
  const seriesNum = Number.parseInt(seriesRaw.replace(/\D/g, ""), 10);
  const prefix = Number.isFinite(seriesNum)
    ? `s${String(seriesNum).padStart(2, "0")}`
    : `s_${
        seriesRaw
          .toLowerCase()
          .replace(/[^a-z0-9]+/g, "_")
          .replace(/^_|_$/g, "") || "series"
      }`;
  const base = `${prefix}_${cardNumber}`;
  return {
    cardNumber,
    id: base,
    sortOrder: next,
    frontFilename: `${base}.png`,
    thumbFilename: `${base}.png`,
    baseFilename: base,
  };
}
function safeStorageFilename(value, file) {
  const ext = (file?.name?.split(".").pop() || "png").toLowerCase();
  let name = String(value || "")
    .trim()
    .replace(/^.*[\\/]/, "")
    .replace(/[^a-zA-Z0-9._-]+/g, "-")
    .replace(/-+/g, "-");
  if (!name) name = `image.${ext}`;
  if (!/\.[a-z0-9]+$/i.test(name)) name += `.${ext}`;
  return name.toLowerCase();
}

leUntil)}"></div><div class="checks full"><label><input id="eCardVisible" type="checkbox" ${c.isVisible !== false ? "checked" : ""}> Visible</label><label><input id="eCardCollectible" type="checkbox" ${c.isCollectible !== false ? "checked" : ""}> Collectible</label><label><input id="eCardPullable" type="checkbox" ${c.isPullable !== false ? "checked" : ""}> Pullable</label><label><input id="eCardPromo" type="checkbox" ${c.isPromo ? "checked" : ""}> Promo</label><label><input id="eCardEvent" type="checkbox" ${c.isEventExclusive ? "checked" : ""}> Event Exclusive</label></div><div class="full">${isNew ? `<div class="image-editor"><img id="eCardArtworkPreview" src="${esc(c.imageUrl || c.thumbnailUrl || "site_assets/StarlightCard_Back_NewLogo.png")}" alt=""><div class="field"><label>Card Artwork</label><input id="eCardArtworkUrl" value="${esc(c.imageUrl || "")}" readonly><label>Automatic Filename</label><input id="eCardArtworkFilename" value="${esc(defaults.frontFilename)}"><label class="upload">Browse & Upload Card Artwork<input id="eCardArtworkFile" type="file" accept="image/*"></label><div class="upload-meta" id="eCardArtworkMeta"><strong>One upload creates both files.</strong> Artwork is copied to card-fronts and thumbnails.</div></div></div>` : `<div>${imageBlock("eCardFront", c.imageUrl || "", "card-fronts", "Card Front")}</div><div>${imageBlock("eCardThumb", c.thumbnailUrl || c.imageUrl || "", "thumbnails", "Thumbnail")}</div>`}</div></div><div class="editor-actions"><button id="saveCard" class="btn primary">${isNew ? "Create Card" : "Save Card"}</button>${c.id ? '<button id="archiveCard" class="btn archive">Archive Card</button><button id="deleteCard" class="btn danger">Delete Card</button>' : ""}</div>`,

        say(e.message, "error");
      }

        String(seriesId).replace(/\D/g, ""),

          upsert: false,

          id,
          seriesId,
          cardNumber: num,
          name: file.name.replace(/\.[^.]+$/, "").replace(/[_-]+/g, " "),
          rarity: $("#bulkRarity").value,
          artist: $("#bulkArtist").value,
          description: $("#bulkDescription").value,
          pullWeight: 1,
          sortOrder: Number(num),
          isVisible: true,
          isCollectible: true,
          isPullable: true,
          imageUrl: uploaded.frontUrl,
          thumbnailUrl: uploaded.thumbnailUrl,
        });

        results.push({ id, ok: false, error: error.message || String(error) });

      `Mass upload completed: ${results.length - failed.length} created${failed.length ? `, ${failed.length} failed` : ""}.`,
    );

      window.StarlightUI?.toast?.(
        `${failed.length} card${failed.length === 1 ? "" : "s"} failed. Check naming conflicts or Storage permissions.`,
        "error",
      );
  };
}

function wireUpload(prefix, folder, options = {}) {
  const file = $(`#${prefix}File`),
    url = $(`#${prefix}Url`),
    preview = $(`#${prefix}Preview`),
    meta = $(`#${prefix}Meta`),
    del = $(`#${prefix}Delete`),
    filename = $(`#${prefix}Filename`);
  const refresh = () => {
    const path = storagePathFromUrl(url.value),
      name = path
        ? path.split("/").pop()
        : url.value
          ? url.value.split("/").pop()
          : "No image selected";
    preview.src = url.value || "site_assets/StarlightCard_Back_NewLogo.png";
    if (filename && path) filename.value = name;
    meta.innerHTML = `<strong>${esc(name)}</strong>${path ? `Supabase Storage: ${esc(path)}<br><span class="asset-url">${esc(url.value)}</span>` : "Bundled site asset or external URL. Upload a replacement to store it in Supabase."}`;
    del.disabled = !path;
  };
  url.oninput = refresh;
  file.onchange = async () => {
    const chosen = file.files?.[0];
    if (!chosen) return;
    const targetPath =
      typeof options.path === "function" ? options.path(chosen) : options.path;
    meta.innerHTML = `<strong>${esc(chosen.name)}</strong>Will upload as <code>${esc(targetPath || `${folder}/generated-name`)}</code>…`;
    del.disabled = true;
    try {
      const uploaded = await uploadStudioAsset(chosen, folder, {
        path: targetPath,
        upsert: false,
      });
      url.value = uploaded.url;
      preview.src = uploaded.url;
      if (filename) filename.value = uploaded.path.split("/").pop();
      meta.innerHTML = `<strong>${esc(uploaded.path.split("/").pop())}</strong>Uploaded to <code>${esc(uploaded.path)}</code><br><span class="asset-url">${esc(uploaded.url)}</span>`;
      del.disabled = false;
      say(
        "Artwork uploaded to Supabase Storage. Save the item to keep this URL.",
        "success",
      );
    } catch (e) {
      meta.innerHTML = `<strong>${esc(chosen.name)}</strong>${esc(e.message || "Upload failed.")}`;
      say(e.message, "error");
    }
  };
  del.onclick = async () => {
    const path = storagePathFromUrl(url.value);
    if (
      !path ||
      !(await StarlightUI.confirm({
        title: "Delete uploaded image?",
        message:
          "This removes the image from Supabase Storage. Choose a replacement before saving if the content still needs artwork.",
        confirmText: "Delete Image",
        danger: true,
      }))
    )
      return;
    try {
      await deleteStudioAsset(path);
      url.value = "";
      file.value = "";
      refresh();
      say(
        "Uploaded image deleted. Choose a replacement and save the item.",
        "success",
      );
    } catch (e) {
      say(e.message, "error");
    }
  };
  refresh();
}
function downloadJson(name, value) {
  const blob = new Blob([JSON.stringify(value, null, 2)], {
      type: "application/json",
    }),
    url = URL.createObjectURL(blob),
    a = document.createElement("a");
  a.href = url;
  a.download = name;
  a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}
function buildIntegrityReport(content, assetRows) {
  const series = content?.series || [],
    cards = content?.cards || [],
    boosters = content?.boosters || [];
  const issues = [];
  const warnings = [];
  const seriesIds = new Set(series.map((x) => String(x.id)));
  const duplicate = (rows, key, label) => {
    const seen = new Map();
    for (const row of rows) {
      const value = String(key(row) || "").trim();
      if (!value) continue;
      if (seen.has(value)) issues.push(`${label} duplicated: ${value}`);
      else seen.set(value, true);
    }
  };
  duplicate(cards, (c) => c.id, "Card ID");
  duplicate(series, (s) => s.id, "Series ID");
  duplicate(boosters, (b) => b.id, "Booster ID");
  duplicate(
    cards,
    (c) => `${c.seriesId || c.series_id}:${c.cardNumber || c.card_number}`,
    "Card number within series",
  );
  for (const card of cards) {
    const sid = String(card.seriesId || card.series_id || "");
    if (!seriesIds.has(sid))
      issues.push(
        `Card ${card.id} references missing series ${sid || "(blank)"}.`,
      );
    const front = card.imageUrl || card.image_url || "";
    const thumb = card.thumbnailUrl || card.thumbnail_url || "";
    if (!front) issues.push(`Card ${card.id} has no front artwork URL.`);
    if (!thumb) warnings.push(`Card ${card.id} has no thumbnail URL.`);
    if (
      /pages\.dev|starlightcardsbinder/i.test(front) ||
      /pages\.dev|starlightcardsbinder/i.test(thumb)
    )
      warnings.push(
        `Card ${card.id} still uses a legacy external artwork URL.`,
      );
    if (Number(card.pullWeight ?? card.pull_weight) < 0)
      issues.push(`Card ${card.id} has a negative pull weight.`);
  }
  for (const booster of boosters) {
    const mode = booster.rewardMode || booster.reward_mode || "rarity_slots";
    const slots = booster.slots || [];
    const rewards =
      booster.rewards || booster.exactCards || booster.exact_cards || [];
    if (
      (booster.isActive ?? booster.is_active) &&
      mode === "rarity_slots" &&
      !slots.length
    )
      issues.push(`Active booster ${booster.id} has no rarity slots.`);
    if (
      (booster.isActive ?? booster.is_active) &&
      ["exact_cards", "single_card", "weighted_pool"].includes(mode) &&
      !rewards.length
    )
      issues.push(`Active booster ${booster.id} has an empty reward pool.`);
    const pack = booster.packImageUrl || booster.pack_image_url || "";
    const back = booster.cardBackUrl || booster.card_back_url || "";
    if (!pack) warnings.push(`Booster ${booster.id} has no pack artwork.`);
    if (!back) warnings.push(`Booster ${booster.id} has no card-back artwork.`);
  }
  const storagePaths = new Set((assetRows || []).map((a) => a.path));
  return {
    checkedAt: new Date().toISOString(),
    summary: {
      series: series.length,
      cards: cards.length,
      boosters: boosters.length,
      managedAssets: storagePaths.size,
      errors: issues.length,
      warnings: warnings.length,
    },
    errors: issues,
    warnings,
  };
}
function buildRuntimeDiagnostics(base = {}) {
  return {
    ...base,
    siteVersion: "87.4",
    generatedAt: new Date().toISOString(),
    page: location.href,
    browser: {
      userAgent: navigator.userAgent,
      language: navigator.language,
      online: navigator.onLine,
      visibility: document.visibilityState,
      deviceMemory: navigator.deviceMemory || null,
      hardwareConcurrency: navigator.hardwareConcurrency || null,
    },
    cache: {
      catalogKeys: Object.keys(localStorage).filter((k) =>
        /card|catalog|binder/i.test(k),
      ),
      localStorageEntries: localStorage.length,
    },
    content: {
      series: data.series.length,
      cards: data.cards.length,
      boosters: data.boosters.length,
      managedAssets: assets.length,
    },
  };
}

        .forEach((x) => x.classList.toggle("active", x === b));
      [
        "overview",
        "series",
        "cards",
        "boosters",
        "assets",
        "events",
        "maintenance",
      ].forEach((t) =>
        $(`#${t}Tab`).classList.toggle("hidden", b.dataset.tab !== t),
      );
    }),
);
async function reload(message = "") {
  close();
  say("Loading Starlight Card Management…");
  try {
    {
      const [content, assetRows, eventRows] = await Promise.all([
        loadContentStudio(),
        listStudioAssets(),
        getAdminEvents(),
      ]);
      data = { ...content, events: eventRows };
      assets = assetRows;
    }
    render();
    app.classList.remove("hidden");
    say(message, message ? "success" : "");
  } catch (e) {
    say(e.message, "error");
  }
}
reload();

</script>    <script src="js/shared-ui.js"></script>
