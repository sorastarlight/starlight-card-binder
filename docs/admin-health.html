<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Database Health | Starlight Card Binder</title><link rel="stylesheet" href="css/style.css"><link rel="stylesheet" href="css/shared-ui.css"><style>
.health-page{width:min(1180px,100%);margin:auto;padding:28px 18px 60px}.health-shell{background:rgba(255,255,255,.97);border:2px solid rgba(107,198,248,.45);border-radius:28px;padding:28px;box-shadow:0 20px 55px rgba(61,83,132,.16)}.health-head{display:flex;gap:18px;justify-content:space-between;align-items:flex-start;flex-wrap:wrap}.health-head h1{margin:.2rem 0;color:#405fa1}.health-actions{display:flex;gap:10px;flex-wrap:wrap}.health-summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:12px;margin:22px 0}.health-stat{padding:16px;border:1px solid #d9e9ff;border-radius:18px;background:linear-gradient(145deg,#fff,#f5faff)}.health-stat strong{display:block;font-size:1.65rem;color:#405fa1}.health-list{display:grid;gap:14px}.health-check{border:1px solid #dce9fb;border-radius:20px;padding:18px;background:#fff}.health-check.error{border-color:#ffc5d4;background:#fff9fb}.health-check.warning{border-color:#ffe2a7;background:#fffdf7}.check-top{display:flex;justify-content:space-between;align-items:center;gap:14px}.check-title{font-weight:900;color:#27468b;font-size:1.08rem}.count-pill{min-width:38px;text-align:center;padding:6px 10px;border-radius:999px;background:#edf5ff;color:#34599c;font-weight:900}.check-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:12px}.item-list{margin:12px 0 0;padding:0;list-style:none;display:grid;gap:7px;max-height:220px;overflow:auto}.item-list li{padding:9px 11px;border-radius:12px;background:#f6f8fd;font-size:.91rem}.good{color:#238454;font-weight:900}.status{font-weight:800;margin:14px 0}.error-text{color:#b4233f}.hidden{display:none!important}
</style><script src="js/firefox-performance.js" defer></script><link rel="stylesheet" href="css/qol-ui.css?v=92.0.2">
</head><body><script src="js/embed-mode.js" type="module"></script><div class="sky"></div><main class="health-page"><section class="health-shell"><div class="health-head"><div><p class="eyebrow">Administration Hub</p><h1>🩺 Database Health & Backup</h1><p>Find data problems before they become haunted buttons, broken packs, or missing cards.</p></div><div class="health-actions"><button class="secondary-btn" id="refresh">↻ Run Health Check</button><button class="primary-btn" id="backup">⬇ Download Backup</button></div></div><p id="status" class="status">Loading database health…</p><div id="content" class="hidden"><div id="summary" class="health-summary"></div><div id="checks" class="health-list"></div></div></section></main><script type="module">
import {getDatabaseHealth,repairDatabaseHealth,exportDatabaseBackup,downloadJson} from './js/database-health-service.js';
const status=document.getElementById('status'),content=document.getElementById('content'),summary=document.getElementById('summary'),checks=document.getElementById('checks');
const esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function describe(item){return item.name||item.cardName||item.slotName||item.id||item.cardId||item.boosterId||item.collectorNumber||JSON.stringify(item)}
async function load(){status.textContent='Running database health checks…';status.className='status';content.classList.add('hidden');try{const data=await getDatabaseHealth();const s=data.summary||{};summary.innerHTML=[['Cards',s.cards],['Published',s.publishedCards],['Series',s.series],['Active Boosters',s.activeBoosters],['Categories',s.categories]].map(([label,value])=>`<div class="health-stat"><strong>${Number(value||0)}</strong><span>${label}</span></div>`).join('');checks.innerHTML=(data.checks||[]).map(c=>{const count=Number(c.count||0),items=c.items||[];return `<article class="health-check ${esc(c.severity)}"><div class="check-top"><div class="check-title">${count===0?'✓ ':''}${esc(c.title)}</div><span class="count-pill">${count}</span></div>${count===0?'<p class="good">No issues found.</p>':`<ul class="item-list">${items.slice(0,100).map(i=>`<li>${esc(describe(i))}${i.seriesId?` · ${esc(i.seriesId)}`:''}${i.total!==undefined?` · Total ${esc(i.total)}%`:''}</li>`).join('')}</ul>`}<div class="check-actions">${c.repairable&&count>0?`<button class="secondary-btn" data-repair="${esc(c.id)}">Repair Safe Issues</button>`:''}${items.length>100?`<span>Showing first 100 of ${items.length}</span>`:''}</div></article>`}).join('');status.textContent=`Health check completed ${new Date(data.generatedAt).toLocaleString()}.`;content.classList.remove('hidden');}catch(e){status.textContent=e.message;status.className='status error-text';}}
checks.addEventListener('click',async e=>{const button=e.target.closest('[data-repair]');if(!button)return;const action=button.dataset.repair;if(!confirm('Run the safe repair for this issue? A backup is recommended first.'))return;button.disabled=true;try{const result=await repairDatabaseHealth(action);window.StarlightUI?.toast?.(`Repair complete: ${result.affected||0} row(s) updated.`);await load();}catch(err){window.StarlightUI?.toast?.(err.message,{type:'error'});button.disabled=false;}});
document.getElementById('refresh').onclick=load;document.getElementById('backup').onclick=async()=>{const b=document.getElementById('backup');b.disabled=true;b.textContent='Preparing…';try{const data=await exportDatabaseBackup();downloadJson(data,`starlight-database-backup-${new Date().toISOString().slice(0,10)}.json`);window.StarlightUI?.toast?.('Database backup downloaded.');}catch(e){window.StarlightUI?.toast?.(e.message,{type:'error'});}finally{b.disabled=false;b.textContent='⬇ Download Backup';}};load();
</script><script src="js/shared-ui.js"></script><script src="js/qol-ui.js?v=92.0.2" defer></script>
</body></html>
