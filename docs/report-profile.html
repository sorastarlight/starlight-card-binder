<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"/><meta content="width=device-width,initial-scale=1" name="viewport"/><title>Report Collector Profile | Starlight Card Binder</title><link href="css/style.css" rel="stylesheet"/><style>
body{min-height:100vh}.report-page{width:min(100%,720px);margin:auto;padding:35px 18px}.panelx{padding:30px;border:2px solid rgba(107,198,248,.5);border-radius:26px;background:rgba(255,255,255,.96);box-shadow:0 20px 55px rgba(61,83,132,.17)}h1{color:#405fa1}.field{margin-top:18px}.field label{display:block;font-weight:900;margin-bottom:7px}.field input,.field select,.field textarea{width:100%;padding:12px;border:2px solid #c9e8fb;border-radius:12px;font:inherit}.field textarea{min-height:150px;resize:vertical}.actions{display:flex;flex-wrap:wrap;gap:12px;margin-top:22px}.actions button,.actions a{padding:11px 18px;border-radius:999px;font-weight:900;text-decoration:none}.actions button{border:0;background:linear-gradient(135deg,#6bc6f8,#ff82c8);color:#fff;cursor:pointer}.actions a{border:2px solid #c9e8fb;color:#405fa1}.status{font-weight:900;margin-top:17px}.error{color:#b4233f}.success{color:#167048}
</style><script src="js/firefox-performance.js" defer></script>
</head><body><script src="js/embed-mode.js" type="module"></script><div class="sky"></div><main class="report-page"><section class="panelx"><p class="eyebrow">Collector Safety</p><h1>Report a Collector Profile</h1><p>Reports are private and visible only to authorized Starlight staff.</p><form id="form"><div class="field"><label for="username">Collector username</label><input id="username" maxlength="24" required=""/></div><div class="field"><label for="category">Reason</label><select id="category"><option value="impersonation">Impersonation</option><option value="harassment">Harassment</option><option value="inappropriate_profile">Inappropriate profile</option><option value="spam">Spam</option><option value="other">Other</option></select></div><div class="field"><label for="details">What happened?</label><textarea id="details" maxlength="1000" minlength="10" required=""></textarea></div><div class="actions"><button id="submit" type="submit">Submit Report</button><a href="binder.html">Cancel</a></div><p class="status" id="status" role="status"></p></form></section></main><script type="module">
import {submitProfileReport} from './js/moderation-service.js';
const params=new URLSearchParams(location.search),username=document.getElementById('username'),status=document.getElementById('status'),button=document.getElementById('submit');username.value=params.get('username')||'';
document.getElementById('form').addEventListener('submit',async e=>{e.preventDefault();button.disabled=true;status.className='status';status.textContent='Submitting report…';try{await submitProfileReport(username.value,document.getElementById('category').value,document.getElementById('details').value);status.className='status success';status.textContent='Your report was submitted to the moderation team.';e.target.reset();username.value=params.get('username')||''}catch(err){status.className='status error';status.textContent=err.message}finally{button.disabled=false}});
</script></body></html>
