<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>User Rankings | Starlight Card Binder</title>
  <link rel="stylesheet" href="css/style.css?v=1.0.2">
  <link rel="stylesheet" href="css/shared-ui.css?v=1.6.15">
  <link rel="stylesheet" href="css/pages/user-rankings.css?v=1.2.0">
  <link rel="stylesheet" href="css/qol-ui.css?v=94.2.8">
  <script src="js/browser-performance.js?v=1.0.0" defer></script>
</head>
<body>
  <script type="module" src="js/embed-mode.js"></script>
  <main class="rankings-page">
    <header class="rankings-header">
      <p class="eyebrow" data-content="rankings.eyebrow">Community</p>
      <h1 data-content="rankings.title">User Rankings</h1>
      <p data-content="rankings.lead">Browse public collectors by display name, see profile photos, titles, levels, and collection progress. Open a wishlist to find cards they’re searching for, then propose a trade.</p>
    </header>

    <section class="rankings-toolbar" aria-label="Rankings filters">
      <div class="rankings-toolbar-row">
        <label class="rankings-search" for="rankingsSearch">
          <span data-content="rankings.searchLabel">Search collectors</span>
          <input id="rankingsSearch" type="search" placeholder="Display name or username…" autocomplete="off" aria-controls="rankingsList" data-content-placeholder="rankings.searchPlaceholder">
        </label>
        <label class="rankings-sort" for="rankingsSort">
          <span data-content="rankings.sortLabel">Sort</span>
          <select id="rankingsSort">
            <option value="level" selected data-content="rankings.sortLevel">Highest level</option>
            <option value="collection" data-content="rankings.sortCollection">Collection %</option>
            <option value="unique" data-content="rankings.sortUnique">Most unique cards</option>
            <option value="name" data-content="rankings.sortName">Display name A–Z</option>
          </select>
        </label>
      </div>
      <p id="rankingsMeta" class="rankings-meta" aria-live="polite"></p>
    </section>

    <div id="rankingsStatus" class="rankings-status" role="status">
      <h2 data-content="rankings.loadingTitle">Loading rankings…</h2>
      <p data-content="rankings.loadingLead">Gathering public collectors.</p>
    </div>

    <ol id="rankingsList" class="rankings-list" aria-label="Collector rankings"></ol>
    <div id="rankingsPager" class="rankings-pager" hidden></div>
    <div id="rankingsLive" class="visually-hidden" aria-live="polite"></div>
  </main>
  <script type="module" src="js/pages/website-content-hydrate-page.js?v=1.3"></script>
  <script type="module" src="js/pages/user-rankings-page.js?v=1.3.1"></script>
  <script src="js/shared-ui.js?v=1.6.15"></script>
  <script src="js/qol-ui.js?v=94.2.8" defer></script>
</body>
</html>
