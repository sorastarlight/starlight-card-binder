<body><script src="js/embed-mode.js?v=1.1.1" type="module"></script><div class="sky"></div><main class="redeem-page">
<section class="redeem-panel"><p class="eyebrow" data-content="redeem.eyebrow">Special Rewards</p><h1 data-content="redeem.title">🎟 Redeem a Code</h1><p data-content="redeem.lead">Enter a Starlight code from streams, events, giveaways, or promotions. Rewards are saved directly to your account.</p>

<section class="reward-box hidden" id="reward-box"><h2 id="reward-title"></h2><p id="reward-description"></p></section><p aria-live="polite" class="status" id="status" role="status"></p>
</section></main>
