<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/><meta content="width=device-width,initial-scale=1" name="viewport"/>
<title>Redeem Code | Starlight Card Binder</title>
<link href="css/style.css" rel="stylesheet"/>
<style>
body{min-height:100vh}.redeem-page{width:min(100%,900px);margin:auto;padding:28px 18px 60px}.redeem-nav{display:flex;flex-wrap:wrap;justify-content:center;gap:10px;margin-bottom:22px;padding:14px;border:1px solid rgba(107,198,248,.46);border-radius:18px;background:rgba(255,255,255,.94)}.redeem-nav a{padding:9px 15px;border-radius:999px;color:#405fa1;font-weight:800;text-decoration:none}.redeem-panel{padding:34px;border:2px solid rgba(107,198,248,.5);border-radius:28px;background:rgba(255,255,255,.95);box-shadow:0 22px 60px rgba(61,83,132,.18);text-align:center}.redeem-panel h1{margin:0 0 12px;color:#405fa1;font-size:clamp(2.2rem,7vw,4rem)}.redeem-panel>p{max-width:650px;margin:0 auto;color:#6b7089;line-height:1.6}.redeem-form{max-width:620px;margin:28px auto 0}.redeem-input{width:100%;min-height:60px;padding:14px 18px;border:2px solid rgba(107,198,248,.5);border-radius:16px;background:white;color:#30344f;font:inherit;font-size:1.2rem;font-weight:900;letter-spacing:.08em;text-align:center;text-transform:uppercase}.redeem-actions{display:flex;flex-wrap:wrap;justify-content:center;gap:12px;margin-top:18px}.redeem-button,.redeem-link{min-height:50px;padding:12px 22px;border:0;border-radius:999px;background:linear-gradient(135deg,#6bc6f8,#ff82c8);color:white;font:inherit;font-weight:900;text-decoration:none;cursor:pointer}.redeem-link.secondary{border:2px solid rgba(107,198,248,.55);background:white;color:#405fa1}.redeem-button:disabled{opacity:.6;cursor:wait}.reward-box{margin-top:26px;padding:22px;border:1px solid rgba(255,130,200,.35);border-radius:18px;background:linear-gradient(135deg,rgba(255,245,252,.96),rgba(239,249,255,.96))}.reward-box h2{margin:0 0 8px;color:#405fa1}.status{min-height:28px;margin-top:20px;font-weight:800}.status.success{color:#167048}.status.error{color:#b4233f}.hidden{display:none!important}
</style>
<script src="js/firefox-performance.js" defer></script>
    <link rel="stylesheet" href="css/shared-ui.css">
<link rel="stylesheet" href="css/qol-ui.css?v=91.1.1">
</head>
<body><script src="js/embed-mode.js" type="module"></script><div class="sky"></div><main class="redeem-page">
<nav class="redeem-nav"><a href="binder.html">🗂 Binder</a><a href="collection.html">♡ Collection</a><a href="daily-booster.html">✨ Daily Booster</a><a href="star-bits.html">✦ Star Bits</a><a href="profile-settings.html">⚙ Profile</a></nav>
<section class="redeem-panel"><p class="eyebrow">Special Rewards</p><h1>🎟 Redeem a Code</h1><p>Enter a Starlight code from streams, events, giveaways, or promotions. Rewards are saved directly to your account.</p>
<form class="redeem-form" id="redeem-form"><label class="sr-only" for="code">Redemption code</label><input autocomplete="off" class="redeem-input" id="code" maxlength="48" placeholder="ENTER CODE" required=""/><div class="redeem-actions"><button class="redeem-button" id="redeem-button" type="submit">Redeem Code</button><a class="redeem-link secondary" href="binder.html">Return to Binder</a></div></form>
<section class="reward-box hidden" id="reward-box"><h2 id="reward-title"></h2><p id="reward-description"></p></section><p aria-live="polite" class="status" id="status" role="status"></p>
</section></main>
<script type="module">
import { supabase } from './js/supabase-client.js';
import { redeemRewardCode } from './js/redemption-service.js';
import { revealRewardSequence } from './js/reward-reveal.js?v=92.0';
const form=document.getElementById('redeem-form'),input=document.getElementById('code'),button=document.getElementById('redeem-button'),status=document.getElementById('status'),box=document.getElementById('reward-box'),title=document.getElementById('reward-title'),description=document.getElementById('reward-description');
function showStatus(message,type=''){status.textContent=message;status.className=`status ${type}`.trim()}
const {data}=await supabase.auth.getUser();if(!data.user){showStatus('Please sign in before redeeming a code.','error');button.disabled=true;setTimeout(()=>location.href='login.html',1400)}
form.addEventListener('submit',async e=>{e.preventDefault();button.disabled=true;button.textContent='Redeeming…';box.classList.add('hidden');showStatus('Checking your code…');try{const result=await redeemRewardCode(input.value);if(!result?.success){showStatus(result?.message||'That code could not be redeemed.','error');return}title.textContent=result.label||'Reward Ready!';description.textContent='Your reward is waiting in Received Gifts, where you can open it when you are ready.';box.classList.remove('hidden');showStatus('Code accepted! Opening Received Gifts…','success');input.value='';setTimeout(()=>{window.parent!==window?window.parent.postMessage({type:'starlight-navigate',view:'rewards'},location.origin):location.href='binder.html?view=rewards'},850)}catch(error){showStatus(error.message||'The code could not be redeemed.','error')}finally{button.disabled=false;button.textContent='Redeem Code'}});
</script>    <script src="js/shared-ui.js"></script>
<script src="js/qol-ui.js?v=91.1.1" defer></script>
</body></html>
